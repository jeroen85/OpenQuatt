# ==============================================================================
# OpenQuatt - Package Includes (Single topology)
# ==============================================================================
# Single topology uses the shared package graph and omits Duo-only overlays.
# A lightweight HP2-compat package keeps shared YAML ID contracts intact
# without instantiating a second Modbus controller.
# ==============================================================================
oq_common: !include oq_common.yaml
oq_hp2_single_compat: !include oq_hp2_single_compat.yaml
oq_supervisory_controlmode: !include oq_supervisory_controlmode.yaml
oq_heating_strategy: !include oq_heating_strategy.yaml
oq_heat_control: !include oq_heat_control.yaml
oq_flow_control: !include oq_flow_control.yaml
oq_flow_autotune: !include oq_flow_autotune.yaml
oq_boiler_control: !include oq_boiler_control.yaml
oq_energy: !include oq_energy.yaml
oq_cic: !include oq_cic.yaml
oq_ha_inputs: !include oq_ha_inputs.yaml
oq_local_sensors: !include oq_local_sensors.yaml
oq_sensor_sources: !include oq_sensor_sources.yaml
oq_debug_testing: !include oq_debug_testing.yaml
oq_webserver: !include oq_webserver.yaml
heatpump1: !include
  file: oq_HP_io.yaml
  vars:
    hp_id: "hp1"
    prefix: "HP1 - "
    device_address: 0x01
