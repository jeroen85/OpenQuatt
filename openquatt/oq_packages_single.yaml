# ==============================================================================
# OpenQuatt - Package Includes (Single topology)
# ==============================================================================
# Single topology reuses the same shared modules as Duo.
# `*_secondary_*` vars map to HP1 to satisfy ESPHome ID validation, while actual
# Duo-only behavior is still removed at compile-time via `#if OQ_TOPOLOGY_DUO`.
# ==============================================================================
oq_common: !include oq_common.yaml
oq_supervisory_controlmode: !include
  file: oq_supervisory_controlmode.yaml
  vars:
    supervisory_secondary_last_applied_level_id: "hp1_last_applied_level"
    supervisory_secondary_working_mode_id: "hp1_working_mode"
    supervisory_secondary_set_working_mode_id: "hp1_set_working_mode"
    supervisory_secondary_compressor_level_id: "hp1_compressor_level"
    supervisory_secondary_defrost_id: "hp1_defrost"
    supervisory_secondary_low_noise_mode_id: "hp1_low_noise_mode"
    supervisory_secondary_set_pump_mode_id: "hp1_set_pump_mode"
    supervisory_secondary_pump_speed_id: "hp1_pump_speed"
oq_thermal_limits: !include
  file: oq_thermal_limits.yaml
  vars:
    secondary_water_out_temp_id: "hp1_water_out_temp"
oq_strategy_manager: !include
  file: oq_strategy_manager.yaml
  vars:
    secondary_outside_temp_id: "hp1_outside_temp"
    secondary_outside_last_change_ms_id: "hp1_outside_temp_last_change_ms"
    secondary_outside_activity_ms_id: "hp1_outside_temp_activity_ms"
    secondary_outside_is_distinct: "0"
    secondary_last_applied_level_id: "hp1_last_applied_level"
    secondary_working_mode_id: "hp1_working_mode"
oq_cooling_strategy: !include
  file: oq_cooling_strategy.yaml
  vars:
    cc_secondary_minutes_id: "hp1_minutes"
    cc_secondary_last_applied_level_id: "hp1_last_applied_level"
    cc_secondary_last_start_ms_id: "hp1_last_start_ms"
    cc_secondary_last_stop_ms_id: "hp1_last_stop_ms"
    cc_secondary_excluded_level_a_id: "hp1_excluded_level_a"
    cc_secondary_excluded_level_b_id: "hp1_excluded_level_b"
oq_heating_curve_strategy: !include
  file: oq_heating_curve_strategy.yaml
  vars:
    curve_secondary_minutes_id: "hp1_minutes"
    curve_secondary_last_applied_level_id: "hp1_last_applied_level"
    curve_secondary_last_start_ms_id: "hp1_last_start_ms"
    curve_secondary_working_mode_id: "hp1_working_mode"
    curve_secondary_4_way_valve_id: "hp1_4_way_valve"
    curve_secondary_oil_return_id: "hp1_prot_oil_return"
    curve_secondary_excluded_level_a_id: "hp1_excluded_level_a"
    curve_secondary_excluded_level_b_id: "hp1_excluded_level_b"
oq_power_house_strategy: !include
  file: oq_power_house_strategy.yaml
  vars:
    ph_secondary_minutes_id: "hp1_minutes"
    ph_secondary_defrost_id: "hp1_defrost"
    ph_secondary_last_applied_level_id: "hp1_last_applied_level"
    ph_secondary_4_way_valve_id: "hp1_4_way_valve"
    ph_secondary_excluded_level_a_id: "hp1_excluded_level_a"
    ph_secondary_excluded_level_b_id: "hp1_excluded_level_b"
oq_thermal_request_control: !include
  file: oq_thermal_request_control.yaml
  vars:
    hc_secondary_power_input_id: "hp1_power_input"
    hc_secondary_heat_power_id: "hp1_heat_power"
    hc_secondary_compressor_level_id: "hp1_compressor_level"
    hc_secondary_defrost_id: "hp1_defrost"
    hc_secondary_last_applied_level_id: "hp1_last_applied_level"
    hc_secondary_last_start_ms_id: "hp1_last_start_ms"
    hc_secondary_last_stop_ms_id: "hp1_last_stop_ms"
    hc_secondary_minutes_id: "hp1_minutes"
    hc_secondary_set_working_mode_id: "hp1_set_working_mode"
    hc_secondary_working_mode_id: "hp1_working_mode"
    hc_secondary_4_way_valve_id: "hp1_4_way_valve"
    hc_secondary_excluded_level_a_id: "hp1_excluded_level_a"
    hc_secondary_excluded_level_b_id: "hp1_excluded_level_b"
    hc_dual_tuning_internal: "true"
    hc_hp2_diag_internal: "true"
    hc_runtime_reset_button_name: "Reset Runtime Counters (HP1)"
oq_thermal_actuator: !include
  file: oq_thermal_actuator.yaml
  vars:
    ta_secondary_compressor_level_id: "hp1_compressor_level"
    ta_secondary_last_applied_level_id: "hp1_last_applied_level"
    ta_secondary_last_start_ms_id: "hp1_last_start_ms"
    ta_secondary_last_stop_ms_id: "hp1_last_stop_ms"
    ta_secondary_minutes_id: "hp1_minutes"
    ta_secondary_set_working_mode_id: "hp1_set_working_mode"
    ta_secondary_working_mode_id: "hp1_working_mode"
    ta_secondary_4_way_valve_id: "hp1_4_way_valve"
    ta_secondary_excluded_level_a_id: "hp1_excluded_level_a"
    ta_secondary_excluded_level_b_id: "hp1_excluded_level_b"
oq_flow_control: !include
  file: oq_flow_control.yaml
  vars:
    # Secondary path disabled in Single; IDs remain mapped for template validity.
    flow_secondary_enabled: "0"
    flow_secondary_flow_sensor_id: "hp1_flow"
    flow_secondary_pump_speed_id: "hp1_pump_speed"
    flow_mismatch_internal: "true"
oq_flow_autotune: !include oq_flow_autotune.yaml
oq_boiler_control: !include
  file: oq_boiler_control.yaml
  vars:
    heatpump_outlet_temp_id: "hp1_water_out_temp"
oq_energy: !include oq_energy.yaml
oq_cic: !include
  file: oq_cic.yaml
  vars:
    cic_secondary_enabled: "0"
    cic_hp2_sensor_internal: "true"
oq_ha_inputs: !include oq_ha_inputs.yaml
oq_local_sensors: !include oq_local_sensors.yaml
oq_sensor_sources: !include
  file: oq_sensor_sources.yaml
  vars:
    sensor_sources_duo_flow_internal: "true"
    flow_secondary_flow_sensor_id: "hp1_flow"
oq_ot_slave: !include
  file: oq_ot_slave.yaml
  vars:
    ot_secondary_present: "0"
    ot_secondary_last_applied_level_id: "hp1_last_applied_level"
    ot_secondary_working_mode_id: "hp1_working_mode"
    ot_secondary_fault_binary_sensor_id: "hp1_ot_fault_active"
oq_debug_testing: !include
  file: oq_debug_testing.yaml
  vars:
    debug_hp2_internal: "true"
    debug_secondary_hp_id: "hp1"
oq_webserver: !include oq_webserver.yaml
heatpump1: !include
  file: oq_HP_io.yaml
  vars:
    hp_id: "hp1"
    prefix: "HP1 - "
    device_address: 0x01
