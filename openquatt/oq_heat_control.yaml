# ==============================================================================
# OpenQuatt – Heat Control (demand filtering + HP allocation)
# ==============================================================================
#
# Goal:
#   Consumes normalized heat demand `f` (from strategy), computes an explicit
#   dispatch contract, and maps that dispatch to compressor levels for HP1/HP2.
#
# Role in architecture:
#   Owns compressor-level control, processes `f` (0-20), and distributes it over two heat pumps.
#
# What this package DOES do:
#   - Consumes oq_demand_raw (producer in oq_heating_strategy)
#   - Consumes producer outputs from oq_cooling_control / oq_heating_curve_control / oq_power_house_control
#   - Applies demand filtering to damp noise/jitter in heat demand
#   - Applies caps/limits on `f` before split
#   - Publishes `oq_dispatch_*` as the explicit pre-actuator handoff
#   - Publishes finalized actuator requests for the downstream thermal actuator
#   - Owns generic post-dispatch shaping before the thermal actuator applies writes
#   - Computes shared HP capacity/deficit (`oq_P_hp_cap_w`, `oq_P_deficit_w`) for supervisory CM3 logic
#
# What this package DOES NOT do:
#   - Has no dedicated temperature PID loop (strategy owns temperature-loop behavior)
#   - Does not implement flow interlock (flow-control + supervisory are leading)
#   - Does not determine Control Mode
#   - Does not control boiler directly (boiler follows CM3)
#   - Does not write HP working mode or compressor levels directly
#
# Key assumptions:
#   - `oq_demand_raw` is available from strategy and scaled to `f` range (0-20)
#   - Compressor levels are `select` entities with options '0'..'10'
#
# Interaction with Control Modes:
#   - Active in CM2/CM3 (heating)
#   - In CM0/CM1/CM98, compressor levels are forced to 0
#
# Safety / fail-safe:
#   - With inactive CM: compressor levels 0 (no heat production)
#   - Heat control is always subordinate to flow interlock via CM1
#
# Notes:
#   - Demand filter and runtime guards intentionally favor stability over fast level changes.
#   - This file now mixes:
#     1) shared gating / runtime anchors
#     2) dispatch-contract publication
#     3) actuator-request preparation and safety gating
#
# ==============================================================================

# ----------------------------
# INTERNAL STATE
# ----------------------------
globals:
  # Explicit pre-actuator dispatch contract.
  - id: oq_dispatch_mode_code
    type: int
    restore_value: false
    initial_value: '0'

  - id: oq_dispatch_hp1_req
    type: int
    restore_value: false
    initial_value: '0'

  - id: oq_dispatch_hp2_req
    type: int
    restore_value: false
    initial_value: '0'

  - id: oq_dispatch_owner_hp
    type: int
    restore_value: false
    initial_value: '0'

  - id: oq_dispatch_topology_code
    type: int
    restore_value: false
    initial_value: '0'

  - id: oq_dispatch_strategy_code
    type: int
    restore_value: false
    initial_value: '0'

  # Final per-HP requests consumed by oq_thermal_actuator.
  - id: oq_actuator_hp1_req
    type: int
    restore_value: false
    initial_value: '0'

  - id: oq_actuator_hp2_req
    type: int
    restore_value: false
    initial_value: '0'

  # Shared filtered demand owned by the active dispatch producer.
  - id: oq_demand_filtered
    type: int
    restore_value: false
    initial_value: '0'

  # Previous filtered demand sample published by the active dispatch producer.
  - id: oq_demand_filtered_prev
    type: int
    restore_value: false
    initial_value: '0'

  # Shared heating-only filtered demand, kept separate from CM5 cooling demand.
  - id: oq_heating_demand_filtered
    type: int
    restore_value: false
    initial_value: '0'

  # Power House telemetry (W)
  - id: oq_P_hp_cap_w
    type: float
    restore_value: false
    initial_value: '0.0'

  - id: oq_P_deficit_w
    type: float
    restore_value: false
    initial_value: '0.0'

  # Shared curve dispatch state, currently published by the curve producer.
  - id: oq_dual_hp_enabled
    type: bool
    restore_value: false
    initial_value: 'false'

  # Dual-enable hold counters (elapsed minutes, derived from wall-clock time).
  - id: oq_dual_hp_enable_hold_elapsed_min
    type: int
    restore_value: false
    initial_value: '0'
  - id: oq_dual_hp_disable_hold_elapsed_min
    type: int
    restore_value: false
    initial_value: '0'

  # Fractional elapsed minutes for dual-enable hold timing.
  - id: oq_dual_hp_enable_hold_elapsed_accum_min
    type: float
    restore_value: false
    initial_value: '0.0'
  - id: oq_dual_hp_disable_hold_elapsed_accum_min
    type: float
    restore_value: false
    initial_value: '0.0'

  # Emergency dual-enable hold timing (curve mode capacity/deficit override).
  - id: oq_dual_hp_emergency_hold_elapsed_min
    type: int
    restore_value: false
    initial_value: '0'
  - id: oq_dual_hp_emergency_hold_elapsed_accum_min
    type: float
    restore_value: false
    initial_value: '0.0'

  # Shared Power House demand-filter state used by the Power House producer.
  - id: oq_demand_filter_ramp_up_budget
    type: float
    restore_value: false
    initial_value: '0.0'

  # Last loop timestamp for elapsed-time scaling.
  - id: oq_heat_last_loop_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'

  # Last control flavor observed by heat-control loop (0=Power House, 1=Heating Curve, 2=Cooling).
  - id: oq_heat_last_mode_code
    type: int
    restore_value: false
    initial_value: '-1'

  # Fractional runtime accumulation; converted to whole minutes.
  - id: hp1_runtime_accum_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: hp2_runtime_accum_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'

  # Per-HP timestamp of the last measured transition into working_mode=Heating.
  # Minimum runtime is enforced from this real heating start, not from an earlier
  # request/apply transition that can happen before the compressor truly runs.
  - id: hp1_last_real_heat_start_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: hp2_last_real_heat_start_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: hp1_prev_heating_mode_active
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: hp2_prev_heating_mode_active
    type: bool
    restore_value: false
    initial_value: 'false'

  # Diagnostic: last computed lead pump based on runtime minutes.
  - id: oq_last_lead_hp
    type: int
    restore_value: false
    initial_value: '0'

  # Latched single-HP owner in heating-curve mode (0=none, 1=HP1, 2=HP2).
  # This prevents lead handovers while demand is continuously active.
  - id: oq_curve_single_owner_hp
    type: int
    restore_value: false
    initial_value: '0'

  # Per-HP timestamp for explicit level slew limiting.
  - id: hp1_last_level_change_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: hp2_last_level_change_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'

  # Holds the current single-vs-dual choice briefly after an actual topology change.
  - id: oq_duo_dispatch_hold_until_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: oq_boot_startup_inhibit_logged
    type: bool
    restore_value: false
    initial_value: 'false'

# ----------------------------
# TUNING INPUTS
# ----------------------------
number:
  - platform: template
    id: oq_min_runtime_min
    name: "Minimum runtime"
    icon: mdi:timer-cog-outline
    unit_of_measurement: "s"
    min_value: 300
    max_value: 3600
    step: 30
    mode: slider
    restore_value: true
    optimistic: true
    initial_value: 300
    web_server:
      sorting_group_id: oq_tuning_heat

  - platform: template
    id: oq_demand_filter_ramp_up_step_min
    name: "Demand filter ramp up"
    icon: mdi:stairs-up
    unit_of_measurement: "step/min"
    min_value: 1
    max_value: 20
    step: 1
    mode: slider
    restore_value: true
    optimistic: true
    initial_value: 1
    web_server:
      sorting_group_id: oq_tuning_heat

  # Dual-HP enable threshold on single-HP compressor level request (1..10).
  # Disable threshold is derived internally as max(1, enable - 1) to keep parameter count low.
  - platform: template
    id: oq_dual_hp_enable_level
    name: "Dual HP Enable Level"
    internal: ${hc_dual_tuning_internal}
    icon: mdi:arrow-up-bold-hexagon-outline
    unit_of_measurement: "lvl"
    min_value: 1
    max_value: 10
    step: 1
    mode: slider
    restore_value: true
    optimistic: true
    initial_value: 5
    web_server:
      sorting_group_id: oq_tuning_heat

  # Hold time before enabling dual-HP in curve mode.
  - platform: template
    id: oq_dual_hp_enable_hold_min
    name: "Dual HP Enable Hold"
    internal: ${hc_dual_tuning_internal}
    icon: mdi:timer-plus-outline
    unit_of_measurement: "min"
    min_value: 1
    max_value: 60
    step: 1
    mode: slider
    restore_value: true
    optimistic: true
    initial_value: 3
    web_server:
      sorting_group_id: oq_tuning_heat

  # Hold time before disabling dual-HP in curve mode.
  - platform: template
    id: oq_dual_hp_disable_hold_min
    name: "Dual HP Disable Hold"
    internal: ${hc_dual_tuning_internal}
    icon: mdi:timer-minus-outline
    unit_of_measurement: "min"
    min_value: 1
    max_value: 60
    step: 1
    mode: slider
    restore_value: true
    optimistic: true
    initial_value: 5
    web_server:
      sorting_group_id: oq_tuning_heat

# ----------------------------
# BUTTON
# ----------------------------
button:
  - platform: template
    id: oq_reset_runtime
    name: "${hc_runtime_reset_button_name}"
    icon: mdi:restart
    web_server:
      sorting_group_id: oq_tuning_heat
    on_press:
      - lambda: |-
          // Reset accumulated runtime counters and measured-start latches together,
          // so fairness and minimum-runtime diagnostics restart from a clean state.
          #if OQ_TOPOLOGY_DUO
          id(hp1_minutes) = 0;
          id(${hc_secondary_minutes_id}) = 0;
          id(hp1_runtime_accum_ms) = 0;
          id(hp2_runtime_accum_ms) = 0;
          id(hp1_last_real_heat_start_ms) = 0;
          id(hp2_last_real_heat_start_ms) = 0;
          id(hp1_prev_heating_mode_active) = false;
          id(hp2_prev_heating_mode_active) = false;
          ESP_LOGW("quatt", "Runtime counters reset (HP1+HP2).");
          #else
          id(hp1_minutes) = 0;
          id(hp1_runtime_accum_ms) = 0;
          id(hp1_last_real_heat_start_ms) = 0;
          id(hp1_prev_heating_mode_active) = false;
          ESP_LOGW("quatt", "Runtime counters reset (HP1).");
          #endif

# ----------------------------
# SENSORS (energie + status)
# ----------------------------
sensor:
  - platform: template
    id: oq_total_power_input
    name: "Total Power Input"
    icon: mdi:flash
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 10s
    web_server:
      sorting_group_id: oq_performance
    lambda: |-
      auto nz = [](float value) -> float { return isnan(value) ? 0.0f : value; };
      const float hp1_power_w = nz(id(hp1_power_input).state);
      #if OQ_TOPOLOGY_DUO
      const float hp2_power_w = nz(id(${hc_secondary_power_input_id}).state);
      const float total_input_w = hp1_power_w + hp2_power_w;
      #else
      const float total_input_w = hp1_power_w;
      #endif
      // Safety clamp against tiny negative noise from upstream math/rounding.
      return (total_input_w < 0.0f) ? 0.0f : total_input_w;

  - platform: template
    id: oq_total_heat_power
    name: "Total Heat Power"
    icon: mdi:radiator
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 10s
    web_server:
      sorting_group_id: oq_performance
    lambda: |-
      const float hp1_heat_w = id(hp1_heat_power).state;
      #if OQ_TOPOLOGY_DUO
      const float hp2_heat_w = id(${hc_secondary_heat_power_id}).state;

      if (isnan(hp1_heat_w) && isnan(hp2_heat_w)) return NAN;
      if (isnan(hp1_heat_w)) return hp2_heat_w;
      if (isnan(hp2_heat_w)) return hp1_heat_w;

      return hp1_heat_w + hp2_heat_w;
      #else
      if (isnan(hp1_heat_w)) return NAN;
      return hp1_heat_w;
      #endif

  - platform: template
    id: oq_total_cop
    name: "Total COP"
    icon: mdi:chart-bell-curve-cumulative
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 10s
    web_server:
      sorting_group_id: oq_performance
    lambda: |-
      const float total_input_w = id(oq_total_power_input).state;
      const float total_heat_w = id(oq_total_heat_power).state;

      if (isnan(total_input_w) || isnan(total_heat_w)) return NAN;
      if (fabsf(total_input_w) < ${oq_cop_min_input_w}) return NAN;

      return total_heat_w / total_input_w;

  - platform: template
    id: oq_demand_raw_sensor
    name: "Demand raw"
    icon: mdi:chart-line
    unit_of_measurement: "step"
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 5s
    web_server:
      sorting_group_id: oq_diagnostics
    lambda: |-
      return (float) id(oq_demand_raw);

  - platform: template
    id: oq_demand_filtered_sensor
    name: "Demand filtered"
    icon: mdi:chart-line-variant
    unit_of_measurement: "step"
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 5s
    web_server:
      sorting_group_id: oq_diagnostics
    lambda: |-
      return (float) id(oq_demand_filtered);

  - platform: template
    id: oq_hp1_compressor_level_sensor
    name: "HP1 compressor level"
    icon: mdi:stairs
    unit_of_measurement: "lvl"
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 5s
    web_server:
      sorting_group_id: oq_diagnostics
    lambda: |-
      if (!id(hp1_compressor_level).has_state()) return NAN;
      auto idx = id(hp1_compressor_level).active_index();
      if (!idx.has_value()) return NAN;
      return (float) idx.value();

  - platform: template
    id: oq_hp2_compressor_level_sensor
    name: "HP2 compressor level"
    internal: ${hc_hp2_diag_internal}
    icon: mdi:stairs
    unit_of_measurement: "lvl"
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 5s
    web_server:
      sorting_group_id: oq_diagnostics
    lambda: |-
      #if OQ_TOPOLOGY_DUO
      if (!id(${hc_secondary_compressor_level_id}).has_state()) return NAN;
      auto idx = id(${hc_secondary_compressor_level_id}).active_index();
      if (!idx.has_value()) return NAN;
      return (float) idx.value();
      #else
      return NAN;
      #endif

# ----------------------------
# Extra overview sensors for capacity deficit
# ----------------------------

  - platform: template
    id: oq_hp_capacity_w_sensor
    name: "HP capacity (W)"
    icon: mdi:radiator
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 5s
    web_server:
      sorting_group_id: oq_overview
    lambda: |-
      return id(oq_P_hp_cap_w);

  - platform: template
    id: oq_hp_deficit_w_sensor
    name: "HP deficit (W)"
    icon: mdi:alert-circle-outline
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 5s
    web_server:
      sorting_group_id: oq_overview
    lambda: |-
      return id(oq_P_deficit_w);

text_sensor:
  - platform: template
    id: oq_dispatch_reason
    name: "Dispatch Reason"
    icon: mdi:source-branch
    entity_category: diagnostic
    disabled_by_default: true
    update_interval: never
    web_server:
      sorting_group_id: oq_diagnostics
    lambda: |-
      return std::string("inactive");

  - platform: template
    id: oq_runtime_lead_hp_sensor
    name: "Runtime lead HP"
    icon: mdi:source-branch
    update_interval: 10s
    web_server:
      sorting_group_id: oq_diagnostics
    lambda: |-
      #if OQ_TOPOLOGY_DUO
      const bool lead_is_hp1 = (id(hp1_minutes) <= id(${hc_secondary_minutes_id}));
      return std::string(lead_is_hp1 ? "HP1" : "HP2");
      #else
      return std::string("HP1");
      #endif

  - platform: template
    id: oq_heating_debug_state
    name: "Heating Debug State"
    icon: mdi:bug-outline
    entity_category: diagnostic
    disabled_by_default: true
    update_interval: never
    web_server:
      sorting_group_id: oq_diagnostics

  # DEBUG-RUNTIME START: Duo Power House dispatch reason
  - platform: template
    id: oq_duo_optimizer_reason
    name: "Duo optimizer reason"
    icon: mdi:swap-horizontal
    entity_category: diagnostic
    disabled_by_default: true
    update_interval: never
    web_server:
      sorting_group_id: oq_diagnostics
    lambda: |-
      #if OQ_TOPOLOGY_DUO
      return std::string("inactive");
      #else
      return std::string("single_topology");
      #endif
  # DEBUG-RUNTIME END

# ----------------------------
# MAIN LOOP
# ----------------------------
interval:

# ----------------------------
# LOOP (mode cadence on ${oq_heat_loop_tick_s}s scheduler)
# Fasen:
# - demand filtering + power cap
# - CM-gating (only CM2/CM3)
# - strategy pad:
#   heating curve => single-HP/split
#   power-house => compare best single-vs-duo candidates, prefer lower electrical input, then apply anti-flip guards
# - shared capacity/deficit publication
# - dispatch contract publication
# - allowed-level mapping + min-runtime + apply + runtime bookkeeping
# ----------------------------
  - interval: ${oq_heat_loop_tick_s}s
    startup_delay: 4000ms
    then:
      - lambda: |-
          const uint32_t now_ms = (uint32_t) millis();
          const int cm_code = id(oq_control_mode_code);
          const bool is_cooling_mode = (cm_code == 5);
          const int heat_mode_code = id(oq_heat_mode_code);
          const bool is_curve_mode = (heat_mode_code == 1) || is_cooling_mode;
          const int control_flavor_code = is_cooling_mode ? 2 : heat_mode_code;
          const char* active_thermal_mode_opt = is_cooling_mode ? "Cooling" : "Heating";
          const int active_thermal_mode_code = is_cooling_mode ? 1 : 2;
          const uint32_t loop_target_ms = (uint32_t) ((is_curve_mode ? ${oq_heat_loop_curve_s} : ${oq_heat_loop_powerhouse_s}) * 1000UL);

          // After any controller reboot we intentionally keep all heat outputs blocked for a while.
          // This makes the compressor restart guard reboot-safe without relying on lost pre-crash timestamps.
          if (id(oq_boot_startup_inhibit_until_ms) == 0) {
            const uint32_t inhibit_ms = (uint32_t) ${oq_hp_min_off_s} * 1000UL;
            id(oq_boot_startup_inhibit_until_ms) = now_ms + inhibit_ms;
            id(oq_boot_startup_inhibit_active) = (inhibit_ms > 0);
            if (!id(oq_boot_startup_inhibit_logged) && inhibit_ms > 0) {
              ESP_LOGW("quatt", "Startup inhibit armed for %us after reboot; compressors and boiler remain blocked.", (unsigned int) ${oq_hp_min_off_s});
              id(oq_boot_startup_inhibit_logged) = true;
            }
          }
          const bool startup_inhibit_active =
              id(oq_boot_startup_inhibit_until_ms) > 0 &&
              now_ms < id(oq_boot_startup_inhibit_until_ms);
          id(oq_boot_startup_inhibit_active) = startup_inhibit_active;

          // On mode switch, execute immediately on this tick instead of waiting for previous cadence window.
          if (id(oq_heat_last_mode_code) != control_flavor_code) {
            id(oq_heat_last_mode_code) = control_flavor_code;
            id(oq_heat_last_loop_ms) = 0;
          }

          uint32_t dt_ms = loop_target_ms;
          if (id(oq_heat_last_loop_ms) > 0 && now_ms > id(oq_heat_last_loop_ms)) {
            const uint32_t elapsed_ms = now_ms - id(oq_heat_last_loop_ms);
            if (elapsed_ms < loop_target_ms) return;
            dt_ms = elapsed_ms;
            const uint32_t dt_cap_ms = loop_target_ms * 2UL;
            if (dt_cap_ms > 0 && dt_ms > dt_cap_ms) dt_ms = dt_cap_ms;
          }
          id(oq_heat_last_loop_ms) = now_ms;
          const int demand_max_f = (int) ${oq_strategy_demand_max_f};
          constexpr int dispatch_strategy_inactive = 0;
          constexpr int dispatch_strategy_cooling = 1;
          constexpr int dispatch_strategy_curve = 2;
          constexpr int dispatch_strategy_power_house = 3;

          // =========================
          // 1) Demand path (0..20)
          // Producer files now own the active demand path.
          // Heat control reads the shared filtered demand as dispatch input.
          // =========================
          int raw = is_cooling_mode ? id(oq_cooling_demand_raw) : id(oq_demand_raw);
          raw = std::max(0, std::min(demand_max_f, raw));
          const int prev_f = id(oq_demand_filtered_prev);
          const bool is_power_house = !is_cooling_mode && (id(oq_heat_mode_code) != 1);
          int f = std::max(0, std::min(demand_max_f, id(oq_demand_filtered)));

          // =========================
          // 1a-2) Power limiter cap (diagnostic)
          // Producers already apply this cap before publishing requests.
          int f_cap = id(oq_power_cap_f);
          f_cap = std::max(0, std::min(demand_max_f, f_cap));
          const int f_post_cap = std::min(f, f_cap);

          // =========================
          // 1a-3) Shared runtime anchors
          // Track the moment each HP is actually measured in an active thermal mode.
          // This is the runtime anchor for the minimum runtime guard. It avoids
          // starting the timer too early on request/apply transitions that occur
          // before the compressor truly enters Heating/Cooling mode.
          // =========================
          const float hp1_mode_runtime_raw = id(hp1_working_mode).state;
          const bool hp1_measured_thermal =
              !isnan(hp1_mode_runtime_raw) &&
              ((((int) roundf(hp1_mode_runtime_raw)) == 1) || (((int) roundf(hp1_mode_runtime_raw)) == 2));
          if (hp1_measured_thermal && !id(hp1_prev_heating_mode_active)) {
            id(hp1_last_real_heat_start_ms) = now_ms;
          }
          id(hp1_prev_heating_mode_active) = hp1_measured_thermal;
          #if OQ_TOPOLOGY_DUO
          const float hp2_mode_runtime_raw = id(${hc_secondary_working_mode_id}).state;
          const bool hp2_measured_thermal =
              !isnan(hp2_mode_runtime_raw) &&
              ((((int) roundf(hp2_mode_runtime_raw)) == 1) || (((int) roundf(hp2_mode_runtime_raw)) == 2));
          if (hp2_measured_thermal && !id(hp2_prev_heating_mode_active)) {
            id(hp2_last_real_heat_start_ms) = now_ms;
          }
          id(hp2_prev_heating_mode_active) = hp2_measured_thermal;
          #else
          const bool hp2_measured_thermal = false;
          #endif

          // =========================
          // 1b) Control Mode gating
          // CM2/CM3/CM5 may activate HPs.
          // In CM0/CM1/CM98: force Standby + level 0 and stop further HP control.
          // =========================
          const bool cm_allows_hp = (cm_code == 2 || cm_code == 3 || cm_code == 5);

          // =========================
          // 1c) Shared debug + actuator helper layer
          // These lambdas are strategy-agnostic and form the future extraction seam
          // for the dedicated thermal actuator package.
          // =========================
          auto publish_debug = [&](int req1, int req2, int app1, int app2)->void {
            static std::string last_debug = "";
            const char *mode_s = is_cooling_mode ? "COOL" : (is_curve_mode ? "CURVE" : "PH");
            const int phase_code = id(oq_curve_phase_code);
            const char *phase_s = "OFF";
            if (phase_code == 1) phase_s = "HEAT";
            else if (phase_code == 2) phase_s = "COAST";
            const uint32_t off_since_ms = id(oq_curve_off_since_ms);
            uint32_t off_age_s = 0;
            if (off_since_ms > 0 && now_ms > off_since_ms) off_age_s = (now_ms - off_since_ms) / 1000UL;
            const float spw = is_cooling_mode ? id(cooling_supply_target).state : id(oq_supply_target_temp).state;
            const float pv = id(oq_system_supply_temp).state;
            const float room_c = id(room_temp_selected).state;
            const float room_sp_c = id(room_setpoint_selected).state;
            const float phouse_w = id(oq_phouse_house_w).state;
            const float preq_w = id(oq_phouse_req_w);
            const float room_target_c = id(oq_ph_room_target_effective_c);
            const float tout_c = id(outside_temp_selected).state;
            const float wm1 = id(hp1_working_mode).state;
            float wm2 = 0.0f;
            int cur1 = -1;
            int cur2 = -1;
            int rt2 = 0;
            if (id(hp1_compressor_level).has_state()) cur1 = (int) id(hp1_compressor_level).active_index().value_or(-1);
            #if OQ_TOPOLOGY_DUO
            wm2 = id(${hc_secondary_working_mode_id}).state;
            if (id(${hc_secondary_compressor_level_id}).has_state()) cur2 = (int) id(${hc_secondary_compressor_level_id}).active_index().value_or(-1);
            rt2 = id(${hc_secondary_minutes_id});
            #endif
            char buf[768];
            snprintf(
              buf, sizeof(buf),
              "mode=%s cm=%d phase=%s raw=%d f=%d cap=%d pre=%d post=%d dual=%d on=%d off=%d em=%d lead=%d owner=%d req=%d+%d app=%d+%d cur=%d+%d wm=%.0f/%.0f sp=%.2f pv=%.2f room=%.2f/%.2f rtgt=%.2f phouse=%.0f preq=%.0f out=%.2f ri=%d off_age=%lus rt=%d/%d",
              mode_s, cm_code, phase_s, raw, f_post_cap, f_cap,
              id(oq_curve_demand_pre_guardrail), id(oq_demand_curve),
              (int) id(oq_dual_hp_enabled),
              id(oq_dual_hp_enable_hold_elapsed_min),
              id(oq_dual_hp_disable_hold_elapsed_min),
              id(oq_dual_hp_emergency_hold_elapsed_min),
              id(oq_last_lead_hp), id(oq_curve_single_owner_hp),
              req1, req2, app1, app2,
              cur1, cur2, wm1, wm2, spw, pv, room_c, room_sp_c, room_target_c, phouse_w, preq_w, tout_c,
              (int) id(oq_curve_restart_inhibit_active),
              (unsigned long) off_age_s,
              id(hp1_minutes), rt2);
            const std::string s(buf);
            if (s != last_debug) {
              id(oq_heating_debug_state).publish_state(s.c_str());
              last_debug = s;
            }
          };

          // DEBUG-RUNTIME: hidden text sensor that explains why the duo optimizer kept or changed dispatch.
          auto publish_optimizer_reason = [&](const char* reason)->void {
            #if OQ_TOPOLOGY_DUO
            static std::string last_optimizer_reason = "";
            const std::string s(reason);
            if (s != last_optimizer_reason) {
              id(oq_duo_optimizer_reason).publish_state(s.c_str());
              last_optimizer_reason = s;
            }
            #else
            (void) reason;
            #endif
          };

          auto publish_dispatch = [&](int mode_code, int req1, int req2, int strategy_code, int owner_hp, const char* reason)->void {
            constexpr int dispatch_max_level = 10;
            req1 = std::max(0, std::min(dispatch_max_level, req1));
            req2 = std::max(0, std::min(dispatch_max_level, req2));
            if (mode_code < 0 || mode_code > 2) mode_code = 0;
            if (strategy_code < 0 || strategy_code > 3) strategy_code = 0;

            int topology_code = 0;
            if (req1 > 0 && req2 > 0) topology_code = 3;
            else if (req1 > 0) topology_code = 1;
            else if (req2 > 0) topology_code = 2;

            if (topology_code == 1) owner_hp = 1;
            else if (topology_code == 2) owner_hp = 2;
            else owner_hp = 0;

            id(oq_dispatch_mode_code) = mode_code;
            id(oq_dispatch_hp1_req) = req1;
            id(oq_dispatch_hp2_req) = req2;
            id(oq_dispatch_owner_hp) = owner_hp;
            id(oq_dispatch_topology_code) = topology_code;
            id(oq_dispatch_strategy_code) = strategy_code;

            static std::string last_dispatch_reason = "";
            const std::string s = reason ? std::string(reason) : std::string("inactive");
            if (s != last_dispatch_reason) {
              id(oq_dispatch_reason).publish_state(s.c_str());
              last_dispatch_reason = s;
            }
          };

          auto hp_selected_level = [&](bool is_hp1)->int {
            if (is_hp1) {
              if (!id(hp1_compressor_level).has_state()) return -1;
              auto idx = id(hp1_compressor_level).active_index();
              return idx.has_value() ? (int) idx.value() : -1;
            }
            if (!id(${hc_secondary_compressor_level_id}).has_state()) return -1;
            auto idx = id(${hc_secondary_compressor_level_id}).active_index();
            return idx.has_value() ? (int) idx.value() : -1;
          };

          auto hp_mode_is_cooling = [&](bool is_hp1)->bool {
            const float mode_raw = is_hp1 ? id(hp1_working_mode).state : id(${hc_secondary_working_mode_id}).state;
            return !isnan(mode_raw) && ((int) roundf(mode_raw) == 1);
          };

          auto hp_mode_target_is_cooling = [&](bool is_hp1)->bool {
            if (is_hp1) {
              return id(hp1_set_working_mode).has_state() && id(hp1_set_working_mode).current_option() == "Cooling";
            }
            return id(${hc_secondary_set_working_mode_id}).has_state() &&
                   id(${hc_secondary_set_working_mode_id}).current_option() == "Cooling";
          };

          auto valve_defrost_active = [&](bool is_hp1)->bool {
            if (is_hp1) return id(hp1_4_way_valve).state;
            #if OQ_TOPOLOGY_DUO
            return id(${hc_secondary_4_way_valve_id}).state;
            #else
            return false;
            #endif
          };

          auto defrost_stop_hold_level = [&](bool is_hp1)->int {
            // Only keep the last non-zero level during real defrost, i.e. once the
            // 4-way valve is active. The broader defrost bit can assert earlier and
            // caused the duo optimizer to pre-load far too aggressively.
            const bool defrost_active = valve_defrost_active(is_hp1);
            if (!defrost_active) return 0;

            // During passive cooling the reverse valve is expected to be active; do not
            // mistake that for a heating defrost hold or CM1/CM0 transitions may re-arm
            // the unit in the wrong thermal mode while leaving CM5.
            if (hp_mode_is_cooling(is_hp1) || hp_mode_target_is_cooling(is_hp1)) return 0;

            const int selected_level = hp_selected_level(is_hp1);
            if (selected_level > 0) return selected_level;

            const int prev_applied = is_hp1 ? id(hp1_last_applied_level) : id(${hc_secondary_last_applied_level_id});
            if (prev_applied > 0) return prev_applied;

            return 0;
          };

          auto reset_dual_runtime_state = [&](int owner)->void {
            id(oq_dual_hp_enabled) = false;
            id(oq_dual_hp_enable_hold_elapsed_min) = 0;
            id(oq_dual_hp_disable_hold_elapsed_min) = 0;
            id(oq_dual_hp_enable_hold_elapsed_accum_min) = 0.0f;
            id(oq_dual_hp_disable_hold_elapsed_accum_min) = 0.0f;
            id(oq_dual_hp_emergency_hold_elapsed_min) = 0;
            id(oq_dual_hp_emergency_hold_elapsed_accum_min) = 0.0f;
            id(oq_curve_single_owner_hp) = owner;
            id(oq_duo_dispatch_hold_until_ms) = 0;
          };

          int min_rt_s = (int) roundf(id(oq_min_runtime_min).state);
          // Keep the runtime floor hard in code as well. Older installs may still
          // restore a pre-migration numeric value such as 60, even though the UI
          // slider now starts at 300 s.
          if (min_rt_s > 0 && min_rt_s < 300) min_rt_s = 300;
          const uint32_t min_rt_ms = (min_rt_s > 0) ? ((uint32_t) min_rt_s * 1000UL) : 0;
          auto min_runtime_hold_level = [&](bool is_hp1)->int {
            if (id(oq_water_temp_hard_trip_active) || min_rt_ms == 0) return 0;
            const uint32_t last_real_start_ms = is_hp1 ? id(hp1_last_real_heat_start_ms) : id(hp2_last_real_heat_start_ms);
            if (last_real_start_ms == 0 || now_ms <= last_real_start_ms) return 0;
            if ((uint32_t)(now_ms - last_real_start_ms) >= min_rt_ms) return 0;

            const int last_applied = is_hp1 ? id(hp1_last_applied_level) : id(${hc_secondary_last_applied_level_id});
            const bool measured_thermal = is_hp1 ? hp1_measured_thermal : hp2_measured_thermal;
            if (!(last_applied > 0 || measured_thermal)) return 0;

            (void) is_hp1;
            return 1;
          };

          // =========================
          // 1d) Inactive-CM fast exit
          // Shared standby/hold behavior runs before any dispatch logic.
          // =========================
          if (!cm_allows_hp) {
            // Outside CM2/CM3/CM5 we normally request Standby + level 0.
            // Two exceptions may keep a unit alive in the downstream actuator:
            // 1) real defrost hold while the 4-way valve is active
            // 2) per-compressor minimum runtime, so a recent real heating start is not
            //    cut short by a quick fallback to CM1/CM0 after a marginal start
            const int hp1_runtime_hold_level = min_runtime_hold_level(true);
            const int hp1_hold_level =
                (hp1_runtime_hold_level > 0) ? hp1_runtime_hold_level : defrost_stop_hold_level(true);
            #if OQ_TOPOLOGY_DUO
            const int hp2_runtime_hold_level = min_runtime_hold_level(false);
            const int hp2_hold_level =
                (hp2_runtime_hold_level > 0) ? hp2_runtime_hold_level : defrost_stop_hold_level(false);
            const bool any_hold = (hp1_hold_level > 0) || (hp2_hold_level > 0);
            #else
            const int hp2_hold_level = 0;
            const bool any_hold = (hp1_hold_level > 0);
            #endif
            reset_dual_runtime_state(0);
            #if OQ_TOPOLOGY_DUO
            publish_optimizer_reason(any_hold ? "keep_current" : "inactive");
            #else
            publish_optimizer_reason(hp1_hold_level > 0 ? "keep_current" : "inactive");
            #endif
            publish_dispatch(
              any_hold ? active_thermal_mode_code : 0,
              hp1_hold_level,
              hp2_hold_level,
              dispatch_strategy_inactive,
              0,
              any_hold ? "inactive_cm_hold" : "inactive_cm");
            id(oq_actuator_hp1_req) = hp1_hold_level;
            id(oq_actuator_hp2_req) = hp2_hold_level;
            #if OQ_TOPOLOGY_DUO
            const int debug_hp2_applied = id(${hc_secondary_last_applied_level_id});
            #else
            const int debug_hp2_applied = 0;
            #endif
            publish_debug(hp1_hold_level, hp2_hold_level, id(hp1_last_applied_level), debug_hp2_applied);
            return;
          }
          // =========================
          // 2) HP level selection
          //    - WATER TEMP: single-HP-first with dual-enable hysteresis
          //    - POWER HOUSE: level optimization on thermal power (W) via hp_perf_map.h
          // =========================

          // =========================
          // 2a) Shared dispatch context
          // From here down we only decide requested compressor levels per strategy.
          // Cooling must never inherit the selected heating strategy dispatcher.
          // =========================
          const int active_dispatch_strategy_code =
              is_cooling_mode ? dispatch_strategy_cooling
                              : (is_power_house ? dispatch_strategy_power_house : dispatch_strategy_curve);

          // Lead HP = fewest runtime minutes
          #if OQ_TOPOLOGY_DUO
          const bool lead_is_hp1 = (id(hp1_minutes) <= id(${hc_secondary_minutes_id}));
          #else
          const bool lead_is_hp1 = true;
          #endif

          const int lead_code = lead_is_hp1 ? 1 : 2;
          if (id(oq_last_lead_hp) != lead_code) {
            id(oq_last_lead_hp) = lead_code;
            #if OQ_TOPOLOGY_DUO
            ESP_LOGI("quatt", "Runtime lead changed: %s (hp1_minutes=%d, hp2_minutes=%d)",
                     lead_is_hp1 ? "HP1" : "HP2", id(hp1_minutes), id(${hc_secondary_minutes_id}));
            #else
            ESP_LOGI("quatt", "Runtime lead changed: HP1 (single topology)");
            #endif
          }

          int hp1_req = 0;
          int hp2_req = 0;
          int dispatch_owner_hp = 0;
          const char* dispatch_reason =
              is_cooling_mode ? "cooling_idle"
                              : (is_power_house ? "ph_idle" : "curve_idle");
          const int min_level = 0;
          const int max_level = 10;

          auto excluded_option_matches_level = [&](const std::string &opt, int level)->bool {
            switch (level) {
              case 1: return opt == "L1 (H30/C30)";
              case 2: return opt == "L2 (H39/C36)";
              case 3: return opt == "L3 (H49/C42)";
              case 4: return opt == "L4 (H55/C47)";
              case 5: return opt == "L5 (H61/C52)";
              case 6: return opt == "L6 (H67/C56)";
              case 7: return opt == "L7 (H72/C61)";
              case 8: return opt == "L8 (H79/C66)";
              case 9: return opt == "L9 (H85/C71)";
              case 10: return opt == "L10 (H90/C74)";
              default: return false;
            }
          };

          // Single source of truth for per-HP level exclusions to avoid drift between branches.
          auto level_allowed = [&](bool is_hp1, int level)->bool {
            if (level <= 0 || level > max_level) return true;

            if (is_hp1) {
              const std::string excl_a = id(hp1_excluded_level_a).has_state()
                                             ? id(hp1_excluded_level_a).current_option()
                                             : std::string("None");
              const std::string excl_b = id(hp1_excluded_level_b).has_state()
                                             ? id(hp1_excluded_level_b).current_option()
                                             : std::string("None");
              return !excluded_option_matches_level(excl_a, level) &&
                     !excluded_option_matches_level(excl_b, level);
            }
            #if OQ_TOPOLOGY_DUO
            const std::string excl_a = id(${hc_secondary_excluded_level_a_id}).has_state()
                                           ? id(${hc_secondary_excluded_level_a_id}).current_option()
                                           : std::string("None");
            const std::string excl_b = id(${hc_secondary_excluded_level_b_id}).has_state()
                                           ? id(${hc_secondary_excluded_level_b_id}).current_option()
                                           : std::string("None");
            return !excluded_option_matches_level(excl_a, level) &&
                   !excluded_option_matches_level(excl_b, level);
            #else
            return false;
            #endif
          };
          int level_cap = (int) roundf(id(oq_day_max_level).state);
          if (id(oq_silent_active).state) level_cap = (int) roundf(id(oq_silent_max_level).state);
          if (level_cap < 0) level_cap = 0;
          if (level_cap > max_level) level_cap = max_level;
          const bool hp1_valve_def = valve_defrost_active(true);
          #if OQ_TOPOLOGY_DUO
          const bool hp2_valve_def = valve_defrost_active(false);
          #else
          const bool hp2_valve_def = false;
          #endif

          #if OQ_TOPOLOGY_DUO
          if (!is_power_house) {
            id(oq_duo_dispatch_hold_until_ms) = 0;
            publish_optimizer_reason("curve_mode");
            if (is_cooling_mode) {
              hp1_req = id(oq_cooling_dispatch_hp1_req);
              hp2_req = id(oq_cooling_dispatch_hp2_req);
              dispatch_owner_hp = id(oq_cooling_dispatch_owner_hp);
              switch (id(oq_cooling_dispatch_reason_code)) {
                case 1: dispatch_reason = "cooling_owner_hp1"; break;
                case 2: dispatch_reason = "cooling_owner_hp2"; break;
                default: dispatch_reason = "cooling_idle"; break;
              }
            } else {
              hp1_req = id(oq_curve_dispatch_hp1_req);
              hp2_req = id(oq_curve_dispatch_hp2_req);
              dispatch_owner_hp = id(oq_curve_dispatch_owner_hp);
              switch (id(oq_curve_dispatch_reason_code)) {
                case 1: dispatch_reason = "curve_single_owner_hp1"; break;
                case 2: dispatch_reason = "curve_single_owner_hp2"; break;
                case 3: dispatch_reason = "curve_single_lead_hp1"; break;
                case 4: dispatch_reason = "curve_single_lead_hp2"; break;
                case 5: dispatch_reason = "curve_dual_emergency"; break;
                case 6: dispatch_reason = "curve_dual_defrost"; break;
                case 7: dispatch_reason = "curve_dual_enabled"; break;
                default: dispatch_reason = "curve_idle"; break;
              }
            }

          } else {
            hp1_req = id(oq_ph_dispatch_hp1_req);
            hp2_req = id(oq_ph_dispatch_hp2_req);
            dispatch_owner_hp = id(oq_ph_dispatch_owner_hp);
            switch (id(oq_ph_dispatch_reason_code)) {
              case 1: dispatch_reason = "ph_fallback_idle"; break;
              case 2: dispatch_reason = "ph_fallback_single_hp1"; break;
              case 3: dispatch_reason = "ph_fallback_single_hp2"; break;
              case 4: dispatch_reason = "ph_fallback_duo"; break;
              case 5: dispatch_reason = "keep_current"; break;
              case 6: dispatch_reason = "hold_active"; break;
              case 7: dispatch_reason = "defrost_hold"; break;
              case 8: dispatch_reason = "better_heat"; break;
              case 9: dispatch_reason = "soft_guard"; break;
              case 10: dispatch_reason = "less_power"; break;
              case 11: dispatch_reason = "no_candidate"; break;
              case 12: dispatch_reason = "defrost_boost"; break;
              case 13: dispatch_reason = "runtime_lead"; break;
              default: dispatch_reason = "ph_idle"; break;
            }
          }
          #else
          reset_dual_runtime_state(1);
          if (!is_power_house) {
            if (is_cooling_mode) {
              hp1_req = id(oq_cooling_dispatch_hp1_req);
              dispatch_owner_hp = id(oq_cooling_dispatch_owner_hp);
              dispatch_reason = (dispatch_owner_hp > 0) ? "cooling_owner_hp1" : "cooling_idle";
            } else {
              hp1_req = id(oq_curve_dispatch_hp1_req);
              dispatch_owner_hp = id(oq_curve_dispatch_owner_hp);
              dispatch_reason = (dispatch_owner_hp > 0) ? "curve_single_owner_hp1" : "curve_idle";
            }
          } else {
            hp1_req = id(oq_ph_dispatch_hp1_req);
            dispatch_owner_hp = id(oq_ph_dispatch_owner_hp);
            switch (id(oq_ph_dispatch_reason_code)) {
              case 1: dispatch_reason = "ph_fallback_idle"; break;
              case 2: dispatch_reason = "ph_fallback_single_hp1"; break;
              case 14: dispatch_reason = "ph_single_topology"; break;
              default: dispatch_reason = "ph_idle"; break;
            }
          }
          hp2_req = 0;
          #endif

          // =========================
          // 3) Dispatch contract handoff
          // Publish pre-protection requests so the downstream actuator path can
          // consume a stable interface before exclusions, slew limits and
          // runtime guards are applied.
          // =========================
          publish_dispatch(
            active_thermal_mode_code,
            hp1_req,
            hp2_req,
            active_dispatch_strategy_code,
            dispatch_owner_hp,
            dispatch_reason);
          hp1_req = id(oq_dispatch_hp1_req);
          hp2_req = id(oq_dispatch_hp2_req);

          // =========================
          // 4) Allowed levels after applying up to two explicit exclusions per HP.
          //    - level 0 always allowed
          //    - if requested level is excluded: search down first, then up
          // =========================
          auto pick_allowed = [&](int req, bool is_hp1)->int {
            if (req <= 0) return 0;
            req = std::max(1, std::min(max_level, req));

            if (level_allowed(is_hp1, req)) return req;

            // first down
            for (int l = req - 1; l >= 1; l--) if (level_allowed(is_hp1, l)) return l;
            // then up
            for (int l = req + 1; l <= max_level; l++) if (level_allowed(is_hp1, l)) return l;

            return 0;
          };

          // Like pick_allowed(), but never returns above cap_level.
          auto pick_allowed_capped = [&](int req, bool is_hp1, int cap_level)->int {
            if (req <= 0) return 0;
            cap_level = std::max(min_level, std::min(max_level, cap_level));
            if (cap_level <= 0) return 0;
            req = std::max(1, std::min(cap_level, req));

            if (level_allowed(is_hp1, req)) return req;

            // first down within cap
            for (int l = req - 1; l >= 1; l--) if (level_allowed(is_hp1, l)) return l;
            // then up within cap
            for (int l = req + 1; l <= cap_level; l++) if (level_allowed(is_hp1, l)) return l;

            return 0;
          };

          hp1_req = pick_allowed(hp1_req, true);
          #if OQ_TOPOLOGY_DUO
          hp2_req = pick_allowed(hp2_req, false);
          #else
          hp2_req = 0;
          #endif

          // =========================
          // 4b) Explicit per-HP slew-rate limiting (heating-curve mode)
          //    - max 1 level step per change
          //    - asymmetrical hold: slower up, faster down
          // =========================
          if (!is_power_house) {
            const bool demand_rundown = (raw < prev_f);
            int up_hold_s = 180;  // Balanced default
            int down_hold_s = 15; // Balanced default
            if (id(oq_curve_control_profile).has_state()) {
              const auto profile = id(oq_curve_control_profile).current_option();
              if (profile == "Comfort") {
                up_hold_s = 90;
                down_hold_s = 10;
              } else if (profile == "Stable") {
                up_hold_s = 300;
                down_hold_s = 30;
              }
            }

            auto limit_slew = [&](bool is_hp1, int req_level)->int {
              const int prev = is_hp1 ? id(hp1_last_applied_level) : id(${hc_secondary_last_applied_level_id});
              uint32_t &last_change_ms = is_hp1 ? id(hp1_last_level_change_ms) : id(hp2_last_level_change_ms);

              if (req_level == prev) return req_level;

              int limited = req_level;
              if (limited > prev + 1) limited = prev + 1;
              if (limited < prev - 1) limited = prev - 1;
              if (limited == prev) return limited;

              const bool moving_up = limited > prev;
              // Guardrail: when demand is already running down, never keep stepping levels up.
              if (demand_rundown && moving_up) return prev;
              const uint32_t hold_ms = (uint32_t) ((moving_up ? up_hold_s : down_hold_s) * 1000UL);
              if (last_change_ms > 0 && now_ms > last_change_ms) {
                const uint32_t dt_change_ms = now_ms - last_change_ms;
                if (dt_change_ms < hold_ms) return prev;
              }
              return limited;
            };

            hp1_req = limit_slew(true, hp1_req);
            #if OQ_TOPOLOGY_DUO
            hp2_req = limit_slew(false, hp2_req);

            // Global guardrail: in curve mode allow at most one HP level change per cycle.
            // This avoids tandem jumps like 1+1 -> 2+2 that create thermal overshoot.
            const int prev1 = id(hp1_last_applied_level);
            const int prev2 = id(${hc_secondary_last_applied_level_id});
            const int d_hp1 = hp1_req - prev1;
            const int d_hp2 = hp2_req - prev2;
            if (d_hp1 != 0 && d_hp2 != 0) {
              bool apply_hp1_change = true;
              if (d_hp1 > 0 && d_hp2 > 0) {
                // Ramp-up: prioritize runtime lead.
                apply_hp1_change = lead_is_hp1;
              } else if (d_hp1 < 0 && d_hp2 < 0) {
                // Ramp-down: shed lag first.
                apply_hp1_change = !lead_is_hp1;
              } else {
                // Mixed direction: prioritize the downward correction.
                apply_hp1_change = (d_hp1 < 0);
              }

              if (apply_hp1_change) hp2_req = prev2;
              else hp1_req = prev1;
            }
            #else
            hp2_req = 0;
            #endif
          }

          // =========================
          // 5) Absolute water-temperature hard trip
          // Shared with boiler-control and heating-strategy. This safety stop has
          // higher priority than compressor minimum runtime.
          // =========================
          if (id(oq_water_temp_hard_trip_active)) {
            hp1_req = 0;
            #if OQ_TOPOLOGY_DUO
            hp2_req = 0;
            #else
            hp2_req = 0;
            #endif
          }

          // Absolute boot-time startup inhibit: after a controller reboot, keep compressors
          // at level 0 until the configured compressor minimum off-time has elapsed.
          if (startup_inhibit_active) {
            hp1_req = 0;
            #if OQ_TOPOLOGY_DUO
            hp2_req = 0;
            #else
            hp2_req = 0;
            #endif
          }

          // =========================
          // 6) Post-dispatch runtime floor
          // Prevents very short compressor runs in both curve and Power House modes.
          // Runtime is per-compressor and user-tunable, with a hard lower bound of 300 s.
          // Skipped during an absolute water-temperature hard trip.
          // =========================
          if (!id(oq_water_temp_hard_trip_active) && min_rt_s > 0) {
            const bool cooling_floor_trip =
                is_cooling_mode &&
                id(minimum_safe_supply_temp).has_state() && !isnan(id(minimum_safe_supply_temp).state) &&
                id(oq_system_supply_temp).has_state() && !isnan(id(oq_system_supply_temp).state) &&
                (id(oq_system_supply_temp).state <= (id(minimum_safe_supply_temp).state + 0.10f));
            // HP1/HP2: if request is 0 but measured heating start is still within
            // the minimum runtime window, keep that compressor alive at >=1.
            // This guard intentionally keys off real heating start instead of the
            // earlier apply transition, so short mode-transition delays do not
            // silently consume most of the runtime window.
            const bool hp1_min_runtime_active =
                (id(hp1_last_real_heat_start_ms) > 0) &&
                (now_ms > id(hp1_last_real_heat_start_ms)) &&
                ((uint32_t)(now_ms - id(hp1_last_real_heat_start_ms)) < min_rt_ms);
            if (hp1_req == 0 && !cooling_floor_trip && hp1_min_runtime_active &&
                (id(hp1_last_applied_level) > 0 || hp1_measured_thermal)) {
              hp1_req = pick_allowed(1, true);
            }

            #if OQ_TOPOLOGY_DUO
            const bool hp2_min_runtime_active =
                (id(hp2_last_real_heat_start_ms) > 0) &&
                (now_ms > id(hp2_last_real_heat_start_ms)) &&
                ((uint32_t)(now_ms - id(hp2_last_real_heat_start_ms)) < min_rt_ms);
            if (hp2_req == 0 && !cooling_floor_trip && hp2_min_runtime_active &&
                (id(${hc_secondary_last_applied_level_id}) > 0 || hp2_measured_thermal)) {
              hp2_req = pick_allowed(1, false);
            }
            #else
            hp2_req = 0;
            #endif
          }

          // =========================
          // 7) Thermal actuator handoff
          // oq_thermal_actuator is now the only package that writes working mode
          // and compressor levels, and owns the post-apply bookkeeping.
          // =========================
          id(oq_actuator_hp1_req) = hp1_req;
          id(oq_actuator_hp2_req) = hp2_req;
          #if OQ_TOPOLOGY_DUO
          const int debug_hp2_applied = id(${hc_secondary_last_applied_level_id});
          #else
          const int debug_hp2_applied = 0;
          #endif
          publish_debug(hp1_req, hp2_req, id(hp1_last_applied_level), debug_hp2_applied);
