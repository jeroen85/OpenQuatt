# ==============================================================================
# OpenQuatt - Home Assistant Cooling Inputs (external proxy ingest)
# ==============================================================================
#
# Goal:
#   Ingest the fixed HA cooling proxy contracts used for passive-cooling safety.
#
# Scope:
#   - Cooling room count and safety margin
#   - Up to 6 rooms with direct dew point, temperature, and humidity proxies
#
# ==============================================================================

sensor:
  - platform: homeassistant
    id: cooling_room_count_ha
    name: "HA - Cooling Room Count"
    entity_id: ${ha_cooling_room_count_entity_id}
    internal: false
    icon: mdi:counter
    accuracy_decimals: 0
    web_server:
      sorting_group_id: oq_ha

  - platform: homeassistant
    id: cooling_safety_margin_ha
    name: "HA - Cooling Safety Margin"
    entity_id: ${ha_cooling_safety_margin_entity_id}
    internal: false
    icon: mdi:shield-thermometer
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    web_server:
      sorting_group_id: oq_ha

  - platform: homeassistant
    id: cooling_room_1_dew_point_direct_ha
    name: "HA - Cooling Room 1 Dew Point"
    entity_id: ${ha_cooling_room_1_dew_point_entity_id}
    internal: false
    icon: mdi:water-thermometer
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 2
    web_server:
      sorting_group_id: oq_ha

  - platform: homeassistant
    id: cooling_room_1_temp_ha
    name: "HA - Cooling Room 1 Temperature"
    entity_id: ${ha_cooling_room_1_temp_entity_id}
    internal: false
    icon: mdi:home-thermometer
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 2
    web_server:
      sorting_group_id: oq_ha

  - platform: homeassistant
    id: cooling_room_1_humidity_ha
    name: "HA - Cooling Room 1 Humidity"
    entity_id: ${ha_cooling_room_1_humidity_entity_id}
    internal: false
    icon: mdi:water-percent
    unit_of_measurement: "%"
