  auto oq_perf_find_interval = [](const float *bp, int n, float x) -> int {
    if (x <= bp[0]) return 0;
    if (x >= bp[n - 1]) return n - 2;
    for (int i = 0; i < n - 1; i++) {
      if (x >= bp[i] && x <= bp[i + 1]) return i;
    }
    return n - 2;
  };

  auto oq_perf_lerp = [](float a, float b, float t) -> float { return a + (b - a) * t; };
  auto oq_perf_bilerp = [&](float q11, float q21, float q12, float q22, float tx, float ty) -> float {
    const float r1 = oq_perf_lerp(q11, q21, tx);
    const float r2 = oq_perf_lerp(q12, q22, tx);
    return oq_perf_lerp(r1, r2, ty);
  };

  auto oq_perf_interp_3d = [&](const float data[oq_perf_n_amb][oq_perf_n_sup][oq_perf_n_lvl],
                               int level,
                               float Tamb,
                               float Tsup) -> float {
    if (level <= 0) return 0.0f;
    if (level > oq_perf_n_lvl) level = oq_perf_n_lvl;
    const int li = level - 1;

    const int ai = oq_perf_find_interval(oq_perf_t_amb_bp, oq_perf_n_amb, Tamb);
    const int si = oq_perf_find_interval(oq_perf_t_sup_bp, oq_perf_n_sup, Tsup);

    const float ax0 = oq_perf_t_amb_bp[ai];
    const float ax1 = oq_perf_t_amb_bp[ai + 1];
    const float sy0 = oq_perf_t_sup_bp[si];
    const float sy1 = oq_perf_t_sup_bp[si + 1];

    float tx = (ax1 == ax0) ? 0.0f : (Tamb - ax0) / (ax1 - ax0);
    float ty = (sy1 == sy0) ? 0.0f : (Tsup - sy0) / (sy1 - sy0);
    if (tx < 0.0f) tx = 0.0f;
    if (tx > 1.0f) tx = 1.0f;
    if (ty < 0.0f) ty = 0.0f;
    if (ty > 1.0f) ty = 1.0f;

    const float q11 = data[ai][si][li];
    const float q21 = data[ai + 1][si][li];
    const float q12 = data[ai][si + 1][li];
    const float q22 = data[ai + 1][si + 1][li];

    if (isnan(q11) || isnan(q21) || isnan(q12) || isnan(q22)) return NAN;

    return oq_perf_bilerp(q11, q21, q12, q22, tx, ty);
  };

  auto oq_perf_interp_power_th_w = [&](int level, float Tamb, float Tsup) -> float {
    return oq_perf_interp_3d(oq_perf_p_th_w, level, Tamb, Tsup);
  };

  auto oq_perf_interp_cop = [&](int level, float Tamb, float Tsup) -> float {
    return oq_perf_interp_3d(oq_perf_cop, level, Tamb, Tsup);
  };

  auto oq_perf_interp_power_el_w = [&](int level,
                                       float Tamb,
                                       float Tsup,
                                       float cop_fallback = 3.0f) -> float {
    const float pth = oq_perf_interp_power_th_w(level, Tamb, Tsup);
    if (isnan(pth) || pth <= 0.0f) return 0.0f;
    float cop = oq_perf_interp_cop(level, Tamb, Tsup);
    if (isnan(cop) || cop <= 0.1f) cop = cop_fallback;
    return pth / cop;
  };
