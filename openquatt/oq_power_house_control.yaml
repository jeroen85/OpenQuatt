# ==============================================================================
# OpenQuatt - Power House Control
# ==============================================================================
#
# Goal:
#   Owns the complete Power House strategy implementation and dispatch producer.
#
# Ownership:
#   - Computes Power House requested heat and compatible demand from room/outside state
#   - Publishes Power House tuning and diagnostics
#   - Computes filtered Power House demand from oq_demand_raw
#   - Chooses the Power House topology / compressor requests
#   - Publishes producer outputs for oq_heat_control to hand off through the
#     dispatch contract and downstream actuator shaping
# ==============================================================================

globals:
  # Power House requested thermal power (W).
  # This is strategy-specific diagnostics/state and is not part of the generic
  # heating-strategy contract.
  - id: oq_phouse_req_w
    type: float
    restore_value: false
    initial_value: '0.0'

  - id: oq_phouse_last_w
    type: float
    restore_value: false
    initial_value: '0.0'

  - id: oq_phouse_last_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'

  - id: oq_ph_comfort_bias_c
    type: float
    restore_value: false
    initial_value: '0.1'

  - id: oq_ph_room_error_avg_c
    type: float
    restore_value: false
    initial_value: '0.0'

  - id: oq_ph_room_error_avg_init
    type: bool
    restore_value: false
    initial_value: 'false'

  - id: oq_ph_comfort_bias_last_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'

  # Power House effective room target after comfort biasing.
  - id: oq_ph_room_target_effective_c
    type: float
    restore_value: false
    initial_value: '0.0'

  - id: oq_demand_filter_ramp_up_budget
    type: float
    restore_value: false
    initial_value: '0.0'

  - id: oq_ph_dispatch_last_loop_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'

  - id: oq_ph_dispatch_hp1_req
    type: int
    restore_value: false
    initial_value: '0'

  - id: oq_ph_dispatch_hp2_req
    type: int
    restore_value: false
    initial_value: '0'

  - id: oq_ph_dispatch_owner_hp
    type: int
    restore_value: false
    initial_value: '0'

  # 0=idle, 1=fallback_idle, 2=fallback_single_hp1, 3=fallback_single_hp2,
  # 4=fallback_duo, 5=keep_current, 6=hold_active, 7=defrost_hold,
  # 8=better_heat, 9=soft_guard, 10=less_power, 11=no_candidate,
  # 12=defrost_boost, 13=runtime_lead, 14=single_topology
  - id: oq_ph_dispatch_reason_code
    type: int
    restore_value: false
    initial_value: '0'

select:
  - platform: template
    id: oq_ph_response_profile
    name: "Power House response profile"
    icon: mdi:tune-variant
    options:
      - Calm
      - Balanced
      - Responsive
      - Custom
    update_interval: 5s
    entity_category: config
    web_server:
      sorting_group_id: oq_tuning_heat
    lambda: |-
      const float rise = id(ph_demand_rise_time_min).state;
      const float fall = id(ph_demand_fall_time_min).state;
      auto near = [](float a, float b) -> bool {
        return !isnan(a) && fabsf(a - b) < 0.25f;
      };
      if (near(rise, 12.0f) && near(fall, 5.0f)) return std::string("Calm");
      if (near(rise, 8.0f) && near(fall, 3.0f)) return std::string("Balanced");
      if (near(rise, 5.0f) && near(fall, 2.0f)) return std::string("Responsive");
      return std::string("Custom");
    set_action:
      then:
        - lambda: |-
            // Preset wrapper around the canonical rise/fall response-time knobs.
            auto set_number_value = [](auto *num, float value) {
              if (num == nullptr) return;
              auto c = num->make_call();
              c.set_value(value);
              c.perform();
            };

            if (x == "Calm") {
              set_number_value(id(ph_demand_rise_time_min), 12.0f);
              set_number_value(id(ph_demand_fall_time_min), 5.0f);
            } else if (x == "Balanced") {
              set_number_value(id(ph_demand_rise_time_min), 8.0f);
              set_number_value(id(ph_demand_fall_time_min), 3.0f);
            } else if (x == "Responsive") {
              set_number_value(id(ph_demand_rise_time_min), 5.0f);
              set_number_value(id(ph_demand_fall_time_min), 2.0f);
            }

