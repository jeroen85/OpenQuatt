# ==============================================================================
# OpenQuatt - Local First-Run Onboarding
# ==============================================================================
# Phase-1 onboarding stays intentionally small and only drives existing runtime
# entities. This keeps the ESPHome web UI usable as a fallback, while a later
# custom wizard can reuse the same setup entities.
# ==============================================================================

globals:
  - id: oq_onboarding_complete
    type: bool
    restore_value: true
    initial_value: 'false'

select:
  - platform: template
    id: oq_onboarding_behavior
    name: "Behavior"
    icon: mdi:run-fast
    options:
      - Quiet
      - Balanced
      - Fast response
    entity_category: config
    update_interval: 5s
    web_server:
      sorting_group_id: oq_setup
      sorting_weight: 2
    lambda: |-
      if (id(oq_heat_control_mode).current_option() == "Water Temperature Control (heating curve)") {
        const std::string curve = id(oq_curve_control_profile).current_option();
        if (curve == "Stable") return std::string("Quiet");
        if (curve == "Comfort") return std::string("Fast response");
        return std::string("Balanced");
      }

      const std::string ph = id(oq_ph_response_profile).current_option();
      if (ph == "Calm") return std::string("Quiet");
      if (ph == "Responsive") return std::string("Fast response");
      return std::string("Balanced");
    set_action:
      then:
        - lambda: |-
            const bool curve_mode =
                id(oq_heat_control_mode).current_option() ==
                "Water Temperature Control (heating curve)";

            if (curve_mode) {
              auto call = id(oq_curve_control_profile).make_call();
              if (x == "Quiet") call.set_option("Stable");
              else if (x == "Fast response") call.set_option("Comfort");
              else call.set_option("Balanced");
              call.perform();
            } else {
              auto call = id(oq_ph_response_profile).make_call();
              if (x == "Quiet") call.set_option("Calm");
              else if (x == "Fast response") call.set_option("Responsive");
              else call.set_option("Balanced");
              call.perform();
            }

  - platform: template
    id: oq_install_profile
    name: "Preset"
    icon: mdi:tune-variant
    options:
      - Quiet
      - Balanced
      - High output
      - Custom
    entity_category: config
    update_interval: 5s
    web_server:
      sorting_group_id: oq_setup
      sorting_weight: 3
    lambda: |-
      const float day = id(oq_day_max_level).state;
      const float silent = id(oq_silent_max_level).state;
      const std::string behavior = id(oq_onboarding_behavior).current_option();

      auto near = [](float a, float b) -> bool {
        return !isnan(a) && fabsf(a - b) < 0.25f;
      };

      if (near(day, 7.0f) && near(silent, 5.0f) && behavior == "Quiet") {
        return std::string("Quiet");
      }
      if (near(day, 10.0f) && near(silent, 6.0f) && behavior == "Balanced") {
        return std::string("Balanced");
      }
      if (near(day, 10.0f) && near(silent, 8.0f) && behavior == "Fast response") {
        return std::string("High output");
      }
      return std::string("Custom");
    set_action:
      then:
        - lambda: |-
            auto set_number_value = [](auto *num, float value) {
              if (num == nullptr) return;
              auto call = num->make_call();
              call.set_value(value);
              call.perform();
            };
            auto set_select_option = [](auto *sel, const char *value) {
              if (sel == nullptr) return;
              auto call = sel->make_call();
              call.set_option(value);
              call.perform();
            };

            if (x == "Quiet") {
              set_number_value(id(oq_day_max_level), 7.0f);
              set_number_value(id(oq_silent_max_level), 5.0f);
              set_select_option(id(oq_onboarding_behavior), "Quiet");
            } else if (x == "Balanced") {
              set_number_value(id(oq_day_max_level), 10.0f);
              set_number_value(id(oq_silent_max_level), 6.0f);
              set_select_option(id(oq_onboarding_behavior), "Balanced");
            } else if (x == "High output") {
              set_number_value(id(oq_day_max_level), 10.0f);
              set_number_value(id(oq_silent_max_level), 8.0f);
              set_select_option(id(oq_onboarding_behavior), "Fast response");
            }

binary_sensor:
  - platform: template
    id: oq_setup_complete
    internal: true
    name: "Setup Complete"
    icon: mdi:check-circle-outline
    entity_category: diagnostic
    lambda: |-
      return id(oq_onboarding_complete);
    web_server:
      sorting_group_id: oq_setup
      sorting_weight: 5

text_sensor:
  - platform: template
    id: oq_setup_summary
    name: "Summary"
    icon: mdi:text-box-check-outline
    update_interval: 5s
    entity_category: diagnostic
    web_server:
      sorting_group_id: oq_setup
      sorting_weight: 3
    lambda: |-
      const std::string mode =
          id(oq_heat_control_mode).current_option() == "Water Temperature Control (heating curve)"
              ? "Water Temperature Control"
              : "Power House";
      const std::string behavior = id(oq_onboarding_behavior).current_option();
      const std::string install_profile = id(oq_install_profile).current_option();
      const float day = id(oq_day_max_level).state;
      const float silent = id(oq_silent_max_level).state;
      const float water = id(max_water_temp_limit_c).state;

      char buffer[256];
      snprintf(
          buffer, sizeof(buffer),
          "%s, %s, %s preset, day %.0f, silent %.0f, max %.1f C%s",
          mode.c_str(),
          behavior.empty() ? "Balanced" : behavior.c_str(),
          install_profile.empty() ? "Custom" : install_profile.c_str(),
          day,
          silent,
          water,
          id(oq_onboarding_complete) ? ", setup complete" : "");
      return {buffer};

button:
  - platform: template
    id: oq_apply_setup
    name: "Apply & Finish"
    icon: mdi:check-bold
    web_server:
      sorting_group_id: oq_setup
      sorting_weight: 4
    on_press:
      - globals.set:
          id: oq_onboarding_complete
          value: "true"
      - component.update:
          id: oq_setup_summary

  - platform: template
    id: oq_reset_setup
    name: "Start Over"
    icon: mdi:restore
    web_server:
      sorting_group_id: oq_setup
      sorting_weight: 6
    on_press:
      - globals.set:
          id: oq_onboarding_complete
          value: "false"
      - component.update:
          id: oq_setup_summary
