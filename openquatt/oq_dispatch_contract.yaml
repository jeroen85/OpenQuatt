# ==============================================================================
# OpenQuatt - Dispatch Contract
# ==============================================================================
#
# Goal:
#   Defines the explicit handoff between strategy/dispatch logic and the
#   downstream actuator apply path.
#
# Ownership:
#   - Producers publish `oq_dispatch_*` before actuator protections are applied.
#   - The actuator/apply path consumes these values and may still apply
#     exclusions, slew limits, min-runtime, min-off and final mode writes.
#
# Code mapping:
#   - `oq_dispatch_mode_code`: 0=Standby, 1=Cooling, 2=Heating
#   - `oq_dispatch_topology_code`: 0=None, 1=HP1, 2=HP2, 3=Duo
#   - `oq_dispatch_owner_hp`: 0=None, 1=HP1, 2=HP2
#   - `oq_dispatch_strategy_code`: 0=Inactive, 1=Cooling, 2=Heating Curve, 3=Power House
# ==============================================================================

# ----------------------------
# INTERNAL STATE
# ----------------------------
globals:
  - id: oq_dispatch_mode_code
    type: int
    restore_value: false
    initial_value: '0'

  - id: oq_dispatch_hp1_req
    type: int
    restore_value: false
    initial_value: '0'

  - id: oq_dispatch_hp2_req
    type: int
    restore_value: false
    initial_value: '0'

  - id: oq_dispatch_owner_hp
    type: int
    restore_value: false
    initial_value: '0'

  - id: oq_dispatch_topology_code
    type: int
    restore_value: false
    initial_value: '0'

  - id: oq_dispatch_strategy_code
    type: int
    restore_value: false
    initial_value: '0'

text_sensor:
  - platform: template
    id: oq_dispatch_reason
    name: "Dispatch Reason"
    icon: mdi:source-branch
    entity_category: diagnostic
    disabled_by_default: true
    update_interval: never
    web_server:
      sorting_group_id: oq_diagnostics
    lambda: |-
      return std::string("inactive");
