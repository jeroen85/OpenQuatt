    restore_value: false
    initial_value: '0.0'

  - id: oq_cooling_dew_gap_c
    type: float
    restore_value: false
    initial_value: 'NAN'

  - id: oq_cooling_stop_buffer_gap_c
    type: float
    restore_value: false
    initial_value: '0.0'

  - id: oq_cooling_gap_filter_ready
    type: bool
    restore_value: false
    initial_value: 'false'

  - id: oq_cooling_simmer_allowed
    type: bool
    restore_value: false
    initial_value: 'false'

  - id: oq_cooling_trend_safe
    type: bool
    restore_value: false
    initial_value: 'true'

  - id: oq_cooling_limiter_allowed_max
    type: int
    restore_value: false
    initial_value: '0'

