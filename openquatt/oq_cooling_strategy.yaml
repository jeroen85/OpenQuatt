    type: int
    restore_value: false
    initial_value: '0'

  - id: oq_cooling_last_loop_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'

  - id: oq_cooling_buffer_gap_rate_ref_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'

  - id: oq_cooling_last_demand_change_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'

  - id: oq_cooling_stop_candidate_since_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'

  - id: oq_cooling_dew_stop_candidate_since_ms
