    type: int
    restore_value: false
    initial_value: '0'

  - id: oq_cooling_limited_demand
    type: int
    restore_value: false
    initial_value: '0'

  # 0=inactive, 1=full, 2=cap2, 3=simmer, 4=falling_gap, 5=buffer_stop,
  # 6=dew_stop, 7=fallback_floor, 8=restart_wait, 9=room_cap, 10=fallback_cap1,
  # 11=level1_hold, 12=oil_return_hold
