    ta_secondary_excluded_level_a_id: "hp2_excluded_level_a"
    ta_secondary_excluded_level_b_id: "hp2_excluded_level_b"
oq_flow_control: !include
  file: oq_flow_control.yaml
  vars:
    flow_secondary_enabled: "1"
    flow_secondary_flow_sensor_id: "hp2_flow"
    flow_secondary_pump_speed_id: "hp2_pump_speed"
    flow_mismatch_internal: "false"
oq_flow_autotune: !include oq_flow_autotune.yaml
oq_boiler_control: !include
  file: oq_boiler_control.yaml
  vars:
    heatpump_outlet_temp_id: "hp2_water_out_temp"
oq_energy: !include oq_energy.yaml
oq_cic: !include
  file: oq_cic.yaml
  vars:
    cic_secondary_enabled: "1"
    cic_hp2_sensor_internal: "false"
oq_ha_inputs: !include oq_ha_inputs.yaml
oq_local_sensors: !include oq_local_sensors.yaml
oq_sensor_sources: !include
  file: oq_sensor_sources.yaml
  vars:
    sensor_sources_duo_flow_internal: "false"
    flow_secondary_flow_sensor_id: "hp2_flow"
oq_ot_slave: !include
  file: oq_ot_slave.yaml
  vars:
    ot_secondary_present: "1"
    ot_secondary_last_applied_level_id: "hp2_last_applied_level"
    ot_secondary_working_mode_id: "hp2_working_mode"
    ot_secondary_fault_binary_sensor_id: "hp2_ot_fault_active"
oq_debug_testing: !include
  file: oq_debug_testing.yaml
  vars:
    debug_hp2_internal: "false"
    debug_secondary_hp_id: "hp2"
oq_webserver: !include oq_webserver.yaml
heatpump1: !include
  file: oq_HP_io.yaml
  vars:
    hp_id: "hp1"
    prefix: "HP1 - "
    device_address: 0x01
heatpump2: !include
  file: oq_HP_io.yaml
  vars:
    hp_id: "hp2"
    prefix: "HP2 - "
    device_address: 0x02
