# ==============================================================================
# OpenQuatt - Package Includes
# ==============================================================================
# Package load order is intentional:
# 1) Common platform runtime (API/OTA/UART/diagnostics)
# 2) Supervisory/state
# 3) Thermal limits / abstractions
# 4) Demand strategy + cooling demand/control
# 5) Heating dispatch producers
# 6) Shared heat-control shaping + actuator layers
# 7) Flow/boiler and other actuation followers
# 8) Aggregation/energy telemetry
# 9) External inputs (CIC)
# 10) External HA proxy inputs
# 11) Local sensors
# 12) Source selection and merged selected-source signals
# 13) OpenTherm thermostat bridge
# 14) Debug/testing utilities
# 15) Web UI
# 16) Per-HP hardware adapters
# ==============================================================================
# Shared modules use `*_secondary_*` template vars so topology wiring stays
# centralized in package files and avoids duplicated module files.
oq_common: !include oq_common.yaml
oq_supervisory_controlmode: !include
  file: oq_supervisory_controlmode.yaml
  vars:
    supervisory_secondary_last_applied_level_id: "hp2_last_applied_level"
    supervisory_secondary_working_mode_id: "hp2_working_mode"
    supervisory_secondary_set_working_mode_id: "hp2_set_working_mode"
    supervisory_secondary_compressor_level_id: "hp2_compressor_level"
    supervisory_secondary_defrost_id: "hp2_defrost"
    supervisory_secondary_low_noise_mode_id: "hp2_low_noise_mode"
    supervisory_secondary_set_pump_mode_id: "hp2_set_pump_mode"
    supervisory_secondary_pump_speed_id: "hp2_pump_speed"
oq_thermal_limits: !include
  file: oq_thermal_limits.yaml
  vars:
    secondary_water_out_temp_id: "hp2_water_out_temp"
oq_heating_strategy: !include
  file: oq_heating_strategy.yaml
  vars:
    secondary_outside_temp_id: "hp2_outside_temp"
    secondary_outside_last_change_ms_id: "hp2_outside_temp_last_change_ms"
    secondary_outside_activity_ms_id: "hp2_outside_temp_activity_ms"
    secondary_outside_is_distinct: "1"
    secondary_last_applied_level_id: "hp2_last_applied_level"
    secondary_working_mode_id: "hp2_working_mode"
oq_cooling_control: !include
  file: oq_cooling_control.yaml
  vars:
    cc_secondary_minutes_id: "hp2_minutes"
    cc_secondary_last_applied_level_id: "hp2_last_applied_level"
    cc_secondary_last_start_ms_id: "hp2_last_start_ms"
    cc_secondary_last_stop_ms_id: "hp2_last_stop_ms"
    cc_secondary_excluded_level_a_id: "hp2_excluded_level_a"
    cc_secondary_excluded_level_b_id: "hp2_excluded_level_b"
oq_heating_curve_control: !include
  file: oq_heating_curve_control.yaml
  vars:
    curve_secondary_minutes_id: "hp2_minutes"
    curve_secondary_last_applied_level_id: "hp2_last_applied_level"
    curve_secondary_last_start_ms_id: "hp2_last_start_ms"
    curve_secondary_working_mode_id: "hp2_working_mode"
    curve_secondary_4_way_valve_id: "hp2_4_way_valve"
    curve_secondary_excluded_level_a_id: "hp2_excluded_level_a"
    curve_secondary_excluded_level_b_id: "hp2_excluded_level_b"
oq_power_house_control: !include
  file: oq_power_house_control.yaml
  vars:
    ph_secondary_minutes_id: "hp2_minutes"
    ph_secondary_defrost_id: "hp2_defrost"
    ph_secondary_last_applied_level_id: "hp2_last_applied_level"
    ph_secondary_4_way_valve_id: "hp2_4_way_valve"
    ph_secondary_excluded_level_a_id: "hp2_excluded_level_a"
    ph_secondary_excluded_level_b_id: "hp2_excluded_level_b"
oq_heat_control: !include
  file: oq_heat_control.yaml
  vars:
    hc_secondary_power_input_id: "hp2_power_input"
    hc_secondary_heat_power_id: "hp2_heat_power"
    hc_secondary_compressor_level_id: "hp2_compressor_level"
    hc_secondary_defrost_id: "hp2_defrost"
    hc_secondary_last_applied_level_id: "hp2_last_applied_level"
    hc_secondary_last_start_ms_id: "hp2_last_start_ms"
    hc_secondary_last_stop_ms_id: "hp2_last_stop_ms"
    hc_secondary_minutes_id: "hp2_minutes"
    hc_secondary_set_working_mode_id: "hp2_set_working_mode"
    hc_secondary_working_mode_id: "hp2_working_mode"
    hc_secondary_4_way_valve_id: "hp2_4_way_valve"
    hc_secondary_excluded_level_a_id: "hp2_excluded_level_a"
    hc_secondary_excluded_level_b_id: "hp2_excluded_level_b"
    hc_dual_tuning_internal: "false"
    hc_hp2_diag_internal: "false"
    hc_runtime_reset_button_name: "Reset Runtime Counters (HP1+HP2)"
oq_thermal_actuator: !include
  file: oq_thermal_actuator.yaml
  vars:
    ta_secondary_compressor_level_id: "hp2_compressor_level"
    ta_secondary_last_applied_level_id: "hp2_last_applied_level"
    ta_secondary_last_start_ms_id: "hp2_last_start_ms"
    ta_secondary_last_stop_ms_id: "hp2_last_stop_ms"
