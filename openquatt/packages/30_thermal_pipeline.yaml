# ==============================================================================
# OpenQuatt - Thermal Pipeline Packages
# ==============================================================================
packages:
  oq_thermal_request_control: !include
    file: ../oq_thermal_request_control.yaml
    vars:
      hc_dual_tuning_internal: "${hc_dual_tuning_internal}"
      hc_hp2_diag_internal: "${hc_hp2_diag_internal}"
      hc_runtime_reset_button_name: "${hc_runtime_reset_button_name}"
  oq_thermal_actuator: !include ../oq_thermal_actuator.yaml
  oq_flow_control: !include
    file: ../oq_flow_control.yaml
    vars:
      flow_secondary_enabled: "${flow_secondary_enabled}"
      flow_mismatch_internal: "${flow_mismatch_internal}"
