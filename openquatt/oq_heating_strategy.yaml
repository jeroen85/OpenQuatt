# ----------------------------
# STATUS
# ----------------------------
text_sensor:
  - platform: template
    id: heating_strategy_status
    name: "Heating Strategy"
    icon: mdi:state-machine
    update_interval: 5s
    web_server:
      sorting_group_id: oq_overview
    lambda: |-
      return std::string(id(oq_heat_control_mode).current_option().c_str());

  - platform: template
    id: oq_curve_phase_sensor
    name: "Curve Phase"
    icon: mdi:state-machine
    update_interval: 5s
    entity_category: diagnostic
    disabled_by_default: true
    web_server:
      sorting_group_id: oq_diagnostics
    lambda: |-
      switch (id(oq_curve_phase_code)) {
        case 1: return std::string("HEAT");
        case 2: return std::string("COAST");
        default: return std::string("OFF");
      }


# ----------------------------
# INTERVAL (5s)
#   * Strategy manager publishes active mode
#   * Heating Curve runs the supply-temperature PID and provides demand (0..20)
#   * Shared thermal guardrails now live in oq_thermal_limits.
# ----------------------------
interval:
  - interval: ${oq_strategy_loop_s}s
    startup_delay: 800ms
    then:
      - lambda: |-
          // =========================
          // 1) Strategy manager context
          // Selects the active heating strategy and initializes shared helpers.
          // =========================
          // Select mode via stable option index (0=Power House, 1=Heating Curve)
          const int heat_mode_code = id(oq_heat_control_mode).active_index().value_or(0) == 1 ? 1 : 0;
          id(oq_heat_mode_code) = heat_mode_code;
          const int demand_max = (int) ${oq_strategy_demand_max_f};
          constexpr float seconds_per_minute = 60.0f;
          const uint32_t now_ms = (uint32_t) millis();

          // Helper: clamp
          auto clampf = [&](float v, float lo, float hi)->float {
            if (v < lo) return lo;
            if (v > hi) return hi;
            return v;
          };
          auto clamp_demand = [&](int demand)->int {
            if (demand < 0) return 0;
            if (demand > demand_max) return demand_max;
            return demand;
          };

          // =========================
          // 2) Active strategy implementation
          // Only one heating strategy writes oq_demand_raw per tick.
          // =========================
          if (heat_mode_code == 1) {
            // ------------------------------------------------------------
            // HEATING CURVE MODE
            // - Heating Curve PID: PV = oq_system_supply_temp, SP = oq_supply_target_temp
            // - PID output -> oq_demand_curve via heating_curve_pid_out
            // - Strategy output: oq_demand_raw = oq_demand_curve
            // ------------------------------------------------------------
            const float spw = id(oq_supply_target_temp).state;
            const float pv  = id(oq_system_supply_temp).state;
            if (isnan(spw) || isnan(pv)) {
              // Fail-safe: no valid PV/SP => no heat demand
              id(oq_demand_curve) = 0;
              id(oq_curve_heat_request_active) = false;
              id(oq_curve_stop_arm_ms) = 0;
              // Integral reset is handled explicitly in the if/then block below.
            } else {
              const float cur2 = id(oq_heating_curve_pid).target_temperature;
              if (id(oq_heating_curve_pid).mode != CLIMATE_MODE_HEAT ||
                  isnan(cur2) || fabsf(cur2 - spw) >= 0.10f) {
                auto c2 = id(oq_heating_curve_pid).make_call();

                // Set mode only when needed (fewer unnecessary calls)
                if (id(oq_heating_curve_pid).mode != CLIMATE_MODE_HEAT) {
                  c2.set_mode(CLIMATE_MODE_HEAT);
                }

                c2.set_target_temperature(spw);
                c2.perform();
              }
            }

            int d_out = clamp_demand(id(oq_demand_curve));
            if (id(oq_water_temp_hard_trip_active)) d_out = 0;
            id(oq_demand_raw) = d_out;
          } else {
            // Power House owns its own demand generation in oq_power_house_control.
            // Here we only keep curve-side state shut down and leave Power House-owned
            // diagnostics/state untouched until the active PH strategy updates them.
            if (id(oq_heating_curve_pid).mode != CLIMATE_MODE_OFF) {
              auto c0 = id(oq_heating_curve_pid).make_call();
              c0.set_mode(CLIMATE_MODE_OFF);
              c0.perform();
            }
            id(oq_curve_heat_request_active) = false;
            id(oq_curve_stop_arm_ms) = 0;
            id(oq_curve_off_since_ms) = 0;
            id(oq_curve_restart_inhibit_active) = false;
            id(oq_demand_curve) = 0;
            id(oq_demand_raw) = 0;
          }
      - if:
          condition:
            lambda: |-
              // =========================
              // 3) Heating-curve PID housekeeping
              // Keep the integral empty whenever curve control is inactive or
              // unable to deliver real heat.
              // =========================
              // Anti-windup:
              // - if SP/PV drops out in heating-curve mode, reset integral term
              // - an absolute water-temperature hard trip forces heat output to zero
              // - while compressors are not yet delivering heat, keep integral empty
              if (id(oq_heat_mode_code) != 1) return false;
              if (id(oq_water_temp_hard_trip_active)) return true;
              const float spw = id(oq_supply_target_temp).state;
              const float pv  = id(oq_system_supply_temp).state;
              if (isnan(spw) || isnan(pv)) return true;

              // While compressors are not yet really delivering heat, keep integral empty.
              const bool hp1_level_on = id(hp1_last_applied_level) > 0;
              const bool hp2_level_on = id(${secondary_last_applied_level_id}) > 0;
              const float hp1_mode_raw = id(hp1_working_mode).state;
              const float hp2_mode_raw = id(${secondary_working_mode_id}).state;
              const bool hp1_heating = !isnan(hp1_mode_raw) && ((int) roundf(hp1_mode_raw) == 2);
              const bool hp2_heating = !isnan(hp2_mode_raw) && ((int) roundf(hp2_mode_raw) == 2);
              const bool hp_delivering =
                  (hp1_level_on && hp1_heating) || (hp2_level_on && hp2_heating);
              return !hp_delivering;
          then:
            - climate.pid.reset_integral_term: oq_heating_curve_pid
