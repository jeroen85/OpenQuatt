# ==============================================================================
# OpenQuatt - Heating Strategy (Power House vs Heating Curve)
# ==============================================================================
#
# Goal:
#   Own the heating strategy manager plus the heating-curve strategy.
#
# Responsibilities:
#   - Selects the active heating strategy and publishes `oq_heat_mode_code`
#   - Runs the heating-curve implementation and publishes `oq_demand_raw` in curve mode
#
# Transition:
#   - Mode switch is immediate; on mode change, mode-local controller state is reinitialized.
#
# Ownership:
#   - Only this package writes oq_demand_raw.
#   - Heat control consumes oq_demand_raw and otherwise remains unchanged.
#
# Refactor note:
#   - Shared thermal abstractions and guardrails now live in oq_thermal_limits.
#   - Power House now owns its own tuning, diagnostics, and demand generation in
#     oq_power_house_control.
#   - This file is intentionally limited to strategy selection and heating-curve behavior.
# ==============================================================================

# ----------------------------
# INTERNAL STATE
# ----------------------------
globals:
  # Output of this strategy (0..20) - consumed by heat-control
  - id: oq_demand_raw
    type: int
    restore_value: false
    initial_value: '0'

  # ---------------------------------------------------------------------------
  # Heating-curve strategy state
  # ---------------------------------------------------------------------------
  # Internal source (0..20) for heating-curve mode (PID -> demand)
  - id: oq_demand_curve
    type: int
    restore_value: false
    initial_value: '0'

  # Heating-curve diagnostics: demand before output guardrails.
  - id: oq_curve_demand_pre_guardrail
    type: int
    restore_value: false
    initial_value: '0'

  # Heating-curve diagnostics: 0=OFF, 1=HEAT, 2=COAST.
  - id: oq_curve_phase_code
    type: int
    restore_value: false
    initial_value: '0'

  # Curve-mode on/off hysteresis state near zero-demand edge.
  - id: oq_curve_heat_request_active
    type: bool
    restore_value: false
    initial_value: 'false'

  # Timestamp when curve stop condition was first armed (OFF confirm guardrail).
  - id: oq_curve_stop_arm_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'

  # Timestamp when curve phase entered OFF (for restart inhibit timing).
  - id: oq_curve_off_since_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'

  # Diagnostic flag: restart from OFF is temporarily inhibited.
  - id: oq_curve_restart_inhibit_active
    type: bool
    restore_value: false
    initial_value: 'false'

  # Curve outside-temperature EMA state.
  - id: oq_curve_outside_ema_c
    type: float
    restore_value: false
    initial_value: '0.0'
  - id: oq_curve_outside_ema_initialized
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: oq_curve_outside_ema_last_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'

  # ---------------------------------------------------------------------------
  # Strategy manager state
  # ---------------------------------------------------------------------------
  - id: oq_heat_mode_code
    type: int
    restore_value: false
    initial_value: '0'  # 0=Power House, 1=Heating Curve

# ----------------------------
# CONTROL INPUTS
# ----------------------------
select:
  - platform: template
    id: oq_heat_control_mode
    name: "Heating Control Mode"
    icon: mdi:tune-variant
    optimistic: true
    restore_value: true
    options:
      - Power House
      - Water Temperature Control (heating curve)
    initial_option: Power House
    web_server:
      sorting_group_id: oq_control
    on_value:
      then:
        # Reset PID integral when strategy changes to prevent carry-over between modes.
        - climate.pid.reset_integral_term: oq_heating_curve_pid
        - lambda: |-
            id(oq_curve_heat_request_active) = false;
            id(oq_curve_stop_arm_ms) = 0;
            id(oq_curve_outside_ema_initialized) = false;
            id(oq_curve_outside_ema_last_ms) = 0;

  - platform: template
    id: oq_curve_control_profile
    name: "Heating Curve Control Profile"
    icon: mdi:tune-variant
    optimistic: true
    restore_value: true
    options:
      - Comfort
      - Balanced
      - Stable
    initial_option: Balanced
    entity_category: config
    web_server:
      sorting_group_id: oq_tuning_heat
    on_value:
      then:
        - climate.pid.reset_integral_term: oq_heating_curve_pid
        - lambda: |-
            id(oq_curve_heat_request_active) = false;
            id(oq_curve_stop_arm_ms) = 0;
            id(oq_curve_outside_ema_initialized) = false;
            id(oq_curve_outside_ema_last_ms) = 0;

