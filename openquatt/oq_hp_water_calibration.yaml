text_sensor:
  - platform: template
    id: oq_hp_water_calibration_status
    name: "HP water calibration status"
    internal: true
    icon: mdi:information-outline
    disabled_by_default: true
    update_interval: never
    web_server:
      sorting_group_id: oq_temperatures

interval:
  - interval: ${oq_flow_loop_s}s
    startup_delay: 5400ms
    then:
      - lambda: |-
          oq_hp_water_calibration::runtime().tick(
              oq_hp_water_calibration::make_runtime_config(${oq_flow_loop_s}),
              (uint32_t) millis());
