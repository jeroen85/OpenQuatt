    id: hp1_water_in_temp_offset
    name: "HP1 water in temperature offset"
    internal: true
    icon: mdi:thermometer-plus
    unit_of_measurement: "°C"
    mode: slider
    min_value: -2
    max_value: 2
    step: 0.01
    restore_value: true
    optimistic: true
    initial_value: 0
