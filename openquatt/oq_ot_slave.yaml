# ==============================================================================
# OpenQuatt - OpenTherm Thermostat Slave Bridge
# ==============================================================================
#
# Goal:
#   Expose a local OpenTherm slave endpoint towards a thermostat and bridge the
#   relevant OT runtime into the existing OpenQuatt state model.
#
# Scope (phase 1):
#   - Runtime-optional OT slave component
#   - Exposure of thermostat intent
#   - Feed real OpenQuatt runtime values back to the thermostat
#   - No control-mode arbitration changes yet
#
# ==============================================================================

external_components:
  - source:
      type: local
      path: components
    components: [openquatt_ot_slave]

openquatt_ot_slave:
  id: oq_ot_slave_hub
  pin_thermostat_in: ${oq_ot_thermostat_in_pin}
  pin_thermostat_out: ${oq_ot_thermostat_out_pin}
  enabled: ${oq_ot_enabled_default}

globals:
  - id: oq_ot_fault_active
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: oq_ot_diagnostic_active
    type: bool
    restore_value: no
    initial_value: 'false'

switch:
  - platform: openquatt_ot_slave
    openquatt_ot_slave_id: oq_ot_slave_hub
    enabled:
      id: oq_ot_slave_enabled
      name: "OpenTherm Enabled"
      entity_category: config
      icon: mdi:thermostat-cog
    debug_enabled:
      id: oq_ot_slave_debug_enabled
      name: "OpenTherm Debug"
      entity_category: diagnostic
      icon: mdi:bug-outline

binary_sensor:
  - platform: openquatt_ot_slave
    openquatt_ot_slave_id: oq_ot_slave_hub
    master_ch_enable:
      id: ot_thermostat_ch_enable
      name: "OT - Thermostat CH Enable"
      icon: mdi:radiator
      entity_category: diagnostic
    master_cooling_enable:
      id: ot_thermostat_cooling_enable
      name: "OT - Thermostat Cooling Enable"
      icon: mdi:snowflake
      entity_category: diagnostic

sensor:
  - platform: openquatt_ot_slave
    openquatt_ot_slave_id: oq_ot_slave_hub
    t_set:
      id: ot_thermostat_control_setpoint
      name: "OT - Control Setpoint"
      icon: mdi:thermostat
    t_roomset:
      id: ot_thermostat_room_setpoint
      name: "OT - Room Setpoint"
      icon: mdi:home-thermometer-outline
    t_room:
      id: ot_thermostat_room_temp
      name: "OT - Room Temperature"
      icon: mdi:home-thermometer
    rx_success_count:
      id: oq_ot_rx_success_count
      name: "OT - RX Success Count"
      entity_category: diagnostic
    rx_invalid_count:
      id: oq_ot_rx_invalid_count
      name: "OT - RX Invalid Count"
      entity_category: diagnostic
    rx_timeout_count:
      id: oq_ot_rx_timeout_count
      name: "OT - RX Timeout Count"
      entity_category: diagnostic
    rx_invalid_parity_count:
      id: oq_ot_rx_invalid_parity_count
      name: "OT - RX Invalid Parity Count"
      entity_category: diagnostic
    rx_invalid_message_count:
      id: oq_ot_rx_invalid_message_count
      name: "OT - RX Invalid Message Count"
      entity_category: diagnostic
    rx_success_rate:
      id: oq_ot_rx_success_rate
      name: "OT - RX Success Rate"
      entity_category: diagnostic
    last_success_age_ms:
      id: oq_ot_last_success_age_ms
      name: "OT - Last Success Age"
      entity_category: diagnostic
    last_callback_duration_us:
      id: oq_ot_last_callback_duration_us
      name: "OT - Last Callback Duration"
      entity_category: diagnostic
    max_callback_duration_us:
      id: oq_ot_max_callback_duration_us
      name: "OT - Max Callback Duration"
      entity_category: diagnostic
    last_response_latency_us:
      id: oq_ot_last_response_latency_us
      name: "OT - Last Response Latency"
      entity_category: diagnostic
    max_response_latency_us:
      id: oq_ot_max_response_latency_us
      name: "OT - Max Response Latency"
      entity_category: diagnostic
    last_loop_gap_ms:
      id: oq_ot_last_loop_gap_ms
      name: "OT - Last Loop Gap"
      entity_category: diagnostic
    max_loop_gap_ms:
      id: oq_ot_max_loop_gap_ms
      name: "OT - Max Loop Gap"
      entity_category: diagnostic
    last_request_id:
      id: oq_ot_last_request_id
      name: "OT - Last Request ID"
      entity_category: diagnostic
    last_error_id:
      id: oq_ot_last_error_id
      name: "OT - Last Error ID"
      entity_category: diagnostic

text_sensor:
  - platform: openquatt_ot_slave
    openquatt_ot_slave_id: oq_ot_slave_hub
    last_request:
      id: oq_ot_last_request
      name: "OT - Last Request"
      entity_category: diagnostic
    last_error:
      id: oq_ot_last_error
      name: "OT - Last Error"
      entity_category: diagnostic
    compatibility_mode:
      id: oq_ot_compatibility_mode
      name: "OT - Compatibility Mode"
      entity_category: diagnostic

interval:
  - interval: 2s
    then:
      - lambda: |-
          // Keep the OT bridge decoupled from the bus ISR path by pushing
          // OpenQuatt runtime values into the slave model on a slow interval.
          if (id(water_supply_temp_selected).has_state() && !isnan(id(water_supply_temp_selected).state)) {
            id(oq_ot_slave_hub).set_slave_t_boiler(id(water_supply_temp_selected).state);
          }
          if (id(hp1_water_in_temp).has_state() && !isnan(id(hp1_water_in_temp).state)) {
            id(oq_ot_slave_hub).set_slave_t_ret(id(hp1_water_in_temp).state);
          }
          if (id(max_water_temp_limit_c).has_state() && !isnan(id(max_water_temp_limit_c).state)) {
            id(oq_ot_slave_hub).set_slave_max_t_set(id(max_water_temp_limit_c).state);
          }
          if (id(outside_temp_selected).has_state() && !isnan(id(outside_temp_selected).state)) {
            id(oq_ot_slave_hub).set_slave_t_outside(id(outside_temp_selected).state);
          }
          float ot_rel_mod_level = id(oq_demand_filtered) * 5.0f;
          if (ot_rel_mod_level < 0.0f) ot_rel_mod_level = 0.0f;
          if (ot_rel_mod_level > 100.0f) ot_rel_mod_level = 100.0f;
          id(oq_ot_slave_hub).set_slave_rel_mod_level(ot_rel_mod_level);
          id(oq_ot_slave_hub).set_slave_ch_pressure(1.5f);

          auto is_active_problem = [](auto *binary) -> bool {
            return binary != nullptr && binary->has_state() && binary->state;
          };
          const bool hp1_active = id(hp1_last_applied_level) > 0;
          const bool hp2_active =
              (${ot_secondary_present} != 0) && (id(${ot_secondary_last_applied_level_id}) > 0);
          const bool boiler_on = id(boiler_active).has_state() && id(boiler_active).state;
          const bool ch_active = hp1_active || hp2_active || boiler_on;
          const bool hp1_fault = is_active_problem(id(hp1_ot_fault_active));
          const bool hp2_fault =
              (${ot_secondary_present} != 0) && is_active_problem(id(${ot_secondary_fault_binary_sensor_id}));
          const bool lowflow_fault = id(oq_lowflow_fault_active);
          const bool temp_trip = id(oq_water_temp_trip_active) || id(oq_water_temp_hard_trip_active);

          id(oq_ot_fault_active) = hp1_fault || hp2_fault;
          id(oq_ot_diagnostic_active) = id(oq_ot_fault_active) || lowflow_fault || temp_trip;

          id(oq_ot_slave_hub).set_slave_ch_active(ch_active);
          id(oq_ot_slave_hub).set_slave_flame_on(ch_active);
          id(oq_ot_slave_hub).set_slave_cooling_active(false);
          id(oq_ot_slave_hub).set_slave_fault(id(oq_ot_fault_active));
          id(oq_ot_slave_hub).set_slave_diagnostic(id(oq_ot_diagnostic_active));
