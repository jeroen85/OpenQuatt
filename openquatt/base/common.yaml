# ==============================================================================
# OpenQuatt - Shared ESPHome Runtime Base
# ==============================================================================
# Common ESPHome/ESP32 runtime shared by all build targets.
# Target entrypoints provide topology, connection and release substitutions.
# ==============================================================================

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  project:
    name: ${project_name}
    version: ${project_version}
  min_version: 2026.6.2
  name_add_mac_suffix: false
  includes:
    - ${oq_cpp_headers_dir}
    - ${oq_component_psram_buffer_header}
  platformio_options:
    build_flags:
      # Hard-pinned by the topology entrypoint to prevent accidental topology drift.
      - ${oq_topology_build_flag}
      - ${oq_hardware_build_flag}
  on_boot:
    priority: -100
    then:
      - text_sensor.template.publish:
          id: oq_project_version_text
          state: "${project_version}"
      - text_sensor.template.publish:
          id: oq_release_channel_text
          state: "${release_channel}"
      - lambda: |-
          // Pick the OTA manifest for the active channel and selected update target.
          const bool alternate_connection_update_target =
            id(oq_firmware_update_target).current_option() == "alternate connection";
          const bool alternate_topology_update_target =
            id(oq_firmware_update_target).current_option() == "alternate topology";
          if (id(oq_firmware_update_channel).current_option() == "dev") {
            const char *source_url = "${dev_release_manifest_url}";
            const char *alternate_connection_url = "${alternate_dev_release_manifest_url}";
            const char *alternate_topology_url = "${alternate_topology_dev_release_manifest_url}";
            if (alternate_connection_update_target && alternate_connection_url[0] != '\0') {
              source_url = alternate_connection_url;
            } else if (alternate_topology_update_target && alternate_topology_url[0] != '\0') {
              source_url = alternate_topology_url;
            }
            id(oq_firmware_update).set_source_url(source_url);
          } else {
            const char *source_url = "${main_release_manifest_url}";
            const char *alternate_connection_url = "${alternate_main_release_manifest_url}";
            const char *alternate_topology_url = "${alternate_topology_main_release_manifest_url}";
            if (alternate_connection_update_target && alternate_connection_url[0] != '\0') {
              source_url = alternate_connection_url;
            } else if (alternate_topology_update_target && alternate_topology_url[0] != '\0') {
              source_url = alternate_topology_url;
            }
            id(oq_firmware_update).set_source_url(source_url);
          }

esp32:
  board: ${esp_board}
  flash_size: ${esp_flash_size}
  variant: ${esp_variant}
  partitions: ${esp_partitions}
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      COMPILER_OPTIMIZATION_SIZE: y
      CONFIG_BT_ENABLED: n
      CONFIG_ESP_MAIN_TASK_STACK_SIZE: "8192"
      CONFIG_SPIRAM_USE_MALLOC: y
      CONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL: "8192"
      CONFIG_SPIRAM_MALLOC_RESERVE_INTERNAL: "65536"

sensor:
  - platform: debug
    psram:
      name: "PSRAM Free"
      icon: mdi:memory
      entity_category: diagnostic
      disabled_by_default: true
      accuracy_decimals: 0
      web_server:
        sorting_group_id: oq_system_diagnostics
