# ==============================================================================
# OpenQuatt - Common Platform Runtime
# ==============================================================================
# Shared, board-independent runtime blocks:
# - Core runtime services (logging/API/OTA)
# - HTTP client
# - RS485 Modbus transport
# - Generic diagnostics entities
# - Runtime debug level controls
# ==============================================================================

# ==============================================================================
# CORE RUNTIME SERVICES
# ==============================================================================
esphome:
  on_boot:
    priority: -100
    then:
      - lambda: |-
          // Always start from a clean paused state after reboot or OTA.
          id(oq_runtime_polling_paused).publish_state(false);
          id(oq_ota_phase_code) = 0;
          id(oq_ota_progress_pct) = 0.0f;
          id(oq_firmware_update_status).publish_state("Idle");
          id(oq_firmware_update_progress).publish_state(0.0f);
          id(oq_project_version_text).publish_state("${project_version}");
          id(oq_release_channel_text).publish_state("${release_channel}");
          #if OQ_TOPOLOGY_DUO
          id(oq_installation_topology_text).publish_state("duo");
          #else
          id(oq_installation_topology_text).publish_state("single");
          #endif
          id(oq_hardware_profile_text).publish_state("${oq_hardware_profile}");
          id(oq_connection_text).publish_state("${oq_connection}");

logger:
  level: DEBUG
  initial_level: INFO
  baud_rate: 115200
  runtime_tag_levels: true

debug:
  update_interval: 60s

api:
  reboot_timeout: 0s
  encryption:

ota:
  - platform: esphome
    on_begin:
      then:
        - lambda: |-
            id(oq_runtime_polling_paused).publish_state(true);
            ESP_LOGI("oq_fw", "Runtime polling paused for OTA.");
            id(oq_ota_phase_code) = 1;
            id(oq_ota_progress_pct) = 0.0f;
            id(oq_firmware_update_status).publish_state("Starting");
            id(oq_firmware_update_progress).publish_state(0.0f);
    on_progress:
      then:
        - lambda: |-
            id(oq_ota_phase_code) = 2;
            id(oq_ota_progress_pct) = x;
            id(oq_firmware_update_status).publish_state("Uploading");
            id(oq_firmware_update_progress).publish_state(x);
    on_end:
      then:
        - lambda: |-
            id(oq_runtime_polling_paused).publish_state(false);
            ESP_LOGI("oq_fw", "Runtime polling resumed after OTA.");
            id(oq_ota_phase_code) = 3;
            id(oq_ota_progress_pct) = 100.0f;
            id(oq_firmware_update_status).publish_state("Rebooting");
            id(oq_firmware_update_progress).publish_state(100.0f);
    on_error:
      then:
        - lambda: |-
            id(oq_runtime_polling_paused).publish_state(false);
            ESP_LOGI("oq_fw", "Runtime polling resumed after OTA error.");
            id(oq_ota_phase_code) = 5;
            id(oq_firmware_update_status).publish_state("Error");
    on_abort:
      then:
        - lambda: |-
            id(oq_runtime_polling_paused).publish_state(false);
            ESP_LOGI("oq_fw", "Runtime polling resumed after OTA abort.");
            id(oq_ota_phase_code) = 6;
            id(oq_firmware_update_status).publish_state("Aborted");
  - platform: http_request
    on_begin:
      then:
        - lambda: |-
            id(oq_runtime_polling_paused).publish_state(true);
            ESP_LOGI("oq_fw", "Runtime polling paused for OTA.");
            id(oq_ota_phase_code) = 1;
            id(oq_ota_progress_pct) = 0.0f;
            id(oq_firmware_update_status).publish_state("Starting");
            id(oq_firmware_update_progress).publish_state(0.0f);
    on_progress:
      then:
        - lambda: |-
            id(oq_ota_phase_code) = 2;
            id(oq_ota_progress_pct) = x;
            id(oq_firmware_update_status).publish_state("Uploading");
            id(oq_firmware_update_progress).publish_state(x);
    on_end:
      then:
        - lambda: |-
            id(oq_runtime_polling_paused).publish_state(false);
            ESP_LOGI("oq_fw", "Runtime polling resumed after OTA.");
            id(oq_ota_phase_code) = 3;
            id(oq_ota_progress_pct) = 100.0f;
            id(oq_firmware_update_status).publish_state("Rebooting");
            id(oq_firmware_update_progress).publish_state(100.0f);
    on_error:
      then:
        - lambda: |-
            id(oq_runtime_polling_paused).publish_state(false);
            ESP_LOGI("oq_fw", "Runtime polling resumed after OTA error.");
            id(oq_ota_phase_code) = 5;
            id(oq_firmware_update_status).publish_state("Error");
    on_abort:
      then:
        - lambda: |-
            id(oq_runtime_polling_paused).publish_state(false);
            ESP_LOGI("oq_fw", "Runtime polling resumed after OTA abort.");
            id(oq_ota_phase_code) = 6;
            id(oq_firmware_update_status).publish_state("Aborted");

# ==============================================================================
# HTTP REQUEST (shared CIC + OTA update)
# ==============================================================================
http_request:
  id: req
  useragent: esphome/openquatt
  timeout: 2s
  follow_redirects: true
  redirect_limit: 3
  buffer_size_rx: 2048
  buffer_size_tx: 1024

# ==============================================================================
# MODBUS (RS485)
# ==============================================================================
uart:
  - id: uart_bus
    tx_pin: ${uart_tx_pin}
    rx_pin: ${uart_rx_pin}
    baud_rate: 19200
    data_bits: 8
    stop_bits: 1
    parity: EVEN
    rx_full_threshold: 1
    rx_timeout: 1

modbus:
  - uart_id: uart_bus
    id: mod_bus
    flow_control_pin: ${uart_rts_pin}
    send_wait_time: 100ms

# ==============================================================================
# SHARED RUNTIME STATE
# ==============================================================================
globals:
  - id: oq_fw_check_last_request_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: oq_boot_startup_inhibit_until_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: oq_boot_startup_inhibit_active
    type: bool
    restore_value: false
    initial_value: 'true'
  - id: oq_ota_progress_pct
    type: float
    restore_value: false
    initial_value: '0.0f'
  - id: oq_ota_phase_code
    type: int
    restore_value: false
    initial_value: '0'
  - id: oq_trend_capture_force_once
    type: bool
    restore_value: false
    initial_value: 'false'

# ==============================================================================
# OVERVIEW TRENDS
# ==============================================================================
script:
  - id: oq_capture_overview_trend_sample
    mode: single
    then:
      - lambda: |-
          // Verzamel een compacte trendregel en sla alleen echte meetwaarden op.
          const bool force_sample = id(oq_trend_capture_force_once);
          id(oq_trend_capture_force_once) = false;
          if (id(oq_runtime_polling_paused).state) {
            return;
          }
          if (!id(oq_trend_history_enabled_switch).state) {
            return;
          }
          const float outside_c = id(outside_temp_selected).has_state() ? id(outside_temp_selected).state : NAN;
          const float room_c = id(room_temp_selected).has_state() ? id(room_temp_selected).state : NAN;
          const float room_sp_c = id(room_setpoint_selected).has_state() ? id(room_setpoint_selected).state : NAN;
          const float supply_c = id(water_supply_temp_selected).has_state() ? id(water_supply_temp_selected).state : NAN;
          const float flow_lph = id(flow_rate_selected).has_state() ? id(flow_rate_selected).state : NAN;
          const float input_w = id(oq_total_power_input).has_state() ? id(oq_total_power_input).state : NAN;

          float output_w = NAN;
          bool cooling_mode = false;
          if (id(oq_control_mode_label).has_state()) {
            std::string mode_label = id(oq_control_mode_label).state;
            for (char &ch : mode_label) {
              ch = static_cast<char>(tolower(static_cast<unsigned char>(ch)));
            }
            cooling_mode = mode_label.find("koel") != std::string::npos || mode_label.find("cool") != std::string::npos;
          }
          if (cooling_mode) {
            output_w = id(oq_total_cooling_power).has_state() ? id(oq_total_cooling_power).state : NAN;
          } else {
            output_w = id(oq_total_heat_power).has_state() ? id(oq_total_heat_power).state : NAN;
          }

          if (isnan(outside_c) && isnan(room_c) && isnan(room_sp_c) && isnan(supply_c) && isnan(flow_lph) && isnan(input_w) && isnan(output_w)) {
            return;
          }

          id(oq_trends_endpoint).capture_sample(outside_c, supply_c, room_c, room_sp_c, flow_lph, input_w, output_w, force_sample);

  - id: oq_capture_energy_history_sample
    mode: single
    then:
      - lambda: |-
          if (!id(oq_lifetime_energy_history_switch).state) {
            return;
          }

          // Capture the current daily energy totals; the component writes only at day rollover/shutdown.
          const float electrical_input_kwh = id(oq_electrical_energy_daily).has_state() ? id(oq_electrical_energy_daily).state : NAN;
          const float heating_input_kwh = id(oq_heating_electrical_energy_daily).has_state() ? id(oq_heating_electrical_energy_daily).state : NAN;
          const float cooling_input_kwh = id(oq_cooling_electrical_energy_daily).has_state() ? id(oq_cooling_electrical_energy_daily).state : NAN;
          const float heatpump_heat_output_kwh = id(oq_heatpump_thermal_energy_daily).has_state() ? id(oq_heatpump_thermal_energy_daily).state : NAN;
          const float heatpump_cooling_output_kwh = id(oq_heatpump_cooling_energy_daily).has_state() ? id(oq_heatpump_cooling_energy_daily).state : NAN;
          const float boiler_heat_output_kwh = id(oq_boiler_thermal_energy_daily).has_state() ? id(oq_boiler_thermal_energy_daily).state : NAN;
          const float system_heat_output_kwh = id(oq_system_thermal_energy_daily).has_state() ? id(oq_system_thermal_energy_daily).state : NAN;

          id(oq_energy_history_endpoint).capture_day_totals(
            electrical_input_kwh,
            heating_input_kwh,
            cooling_input_kwh,
            heatpump_heat_output_kwh,
            heatpump_cooling_output_kwh,
            boiler_heat_output_kwh,
            system_heat_output_kwh
          );

  - id: oq_publish_energy_history_stats
    mode: single
    then:
      - lambda: |-
          id(oq_lifetime_energy_history_available).publish_state(id(oq_energy_history_endpoint).get_available_label());
          id(oq_lifetime_energy_history_oldest).publish_state(id(oq_energy_history_endpoint).get_oldest_day_label());
          id(oq_lifetime_energy_history_newest).publish_state(id(oq_energy_history_endpoint).get_newest_day_label());
          id(oq_lifetime_energy_history_last_write).publish_state(id(oq_energy_history_endpoint).get_last_write_label());
          id(oq_lifetime_energy_history_size).publish_state(id(oq_energy_history_endpoint).get_storage_kib());
          id(oq_lifetime_energy_history_writes).publish_state(id(oq_energy_history_endpoint).get_write_count());

  - id: oq_publish_trend_history_stats
    mode: single
    then:
      - lambda: |-
          id(oq_trend_history_flash_available).publish_state(id(oq_trends_endpoint).get_flash_available_label());
          id(oq_trend_history_flash_oldest).publish_state(id(oq_trends_endpoint).get_flash_oldest_point_label());
          id(oq_trend_history_flash_newest).publish_state(id(oq_trends_endpoint).get_flash_newest_point_label());
          id(oq_trend_history_flash_last_flush).publish_state(id(oq_trends_endpoint).get_flash_last_flush_label());
          id(oq_trend_history_flash_size).publish_state(id(oq_trends_endpoint).get_flash_storage_kib());
          id(oq_trend_history_flash_writes).publish_state(id(oq_trends_endpoint).get_flash_write_count());

openquatt_trends:
  id: oq_trends_endpoint
  capture_switch: oq_trend_history_enabled_switch
  flash_switch: oq_trend_history_flash_switch
  clock: oq_time

openquatt_energy_history:
  id: oq_energy_history_endpoint
  enabled_switch: oq_lifetime_energy_history_switch
  hourly_retention_select: oq_lifetime_energy_hour_retention
  clock: oq_time

# ==============================================================================
# PR TEST FIRMWARE OTA
# ==============================================================================
text:
  - platform: template
    name: "Firmware Test OTA URL"
    id: oq_firmware_test_ota_url
    internal: true
    icon: mdi:link-variant
    mode: text
    optimistic: true
    restore_value: false
    max_length: 255
    disabled_by_default: true
    entity_category: config
    web_server:
      sorting_group_id: oq_system_diagnostics

  - platform: template
    name: "Firmware Test OTA MD5 URL"
    id: oq_firmware_test_ota_md5_url
    internal: true
    icon: mdi:link-variant
    mode: text
    optimistic: true
    restore_value: false
    max_length: 255
    disabled_by_default: true
    entity_category: config
    web_server:
      sorting_group_id: oq_system_diagnostics

# ==============================================================================
# DIAGNOSTIC ENTITIES
# ==============================================================================
select:
  - platform: template
    name: "Firmware Update Channel"
    id: oq_firmware_update_channel
    icon: mdi:source-branch
    web_server:
      sorting_group_id: oq_system_diagnostics
    entity_category: config
    optimistic: true
    restore_value: true
    options: ["main", "dev"]
    initial_option: "${release_channel}"
    on_value:
      then:
        - lambda: |-
            // Keep the update source aligned with the selected channel and target.
            const bool alternate_update_target =
              id(oq_firmware_update_target).current_option() == "alternate connection";
            if (x == "dev") {
              const char *alternate_url = "${alternate_dev_release_manifest_url}";
              id(oq_firmware_update).set_source_url(
                alternate_update_target && alternate_url[0] != '\0'
                  ? alternate_url
                  : "${dev_release_manifest_url}"
              );
            } else {
              const char *alternate_url = "${alternate_main_release_manifest_url}";
              id(oq_firmware_update).set_source_url(
                alternate_update_target && alternate_url[0] != '\0'
                  ? alternate_url
                  : "${main_release_manifest_url}"
              );
            }
        - if:
            condition:
              lambda: |-
                // Prevent duplicate update checks when the channel changes repeatedly.
                constexpr uint32_t fw_check_cooldown_ms = 1000UL;
                const uint32_t now_ms = (uint32_t) millis();
                const uint32_t last_request_ms = id(oq_fw_check_last_request_ms);
                if (last_request_ms > 0 && now_ms >= last_request_ms &&
                    (now_ms - last_request_ms) < fw_check_cooldown_ms) {
                  ESP_LOGI("oq_fw", "Firmware update check skipped: cooldown active after a recent request.");
                  return false;
                }
                id(oq_fw_check_last_request_ms) = now_ms;
                return true;
            then:
              - update.check:
                  id: oq_firmware_update

  - platform: template
    name: "Firmware Update Target"
    id: oq_firmware_update_target
    icon: mdi:swap-horizontal
    disabled_by_default: true
    web_server:
      sorting_group_id: oq_system_diagnostics
    entity_category: config
    optimistic: true
    restore_value: false
    options: ["current build", "alternate connection"]
    initial_option: "current build"
    on_value:
      then:
        - lambda: |-
            // Switch between the current-build manifest and the alternate connection manifest.
            const bool alternate_update_target = x == "alternate connection";
            if (id(oq_firmware_update_channel).current_option() == "dev") {
              const char *alternate_url = "${alternate_dev_release_manifest_url}";
              id(oq_firmware_update).set_source_url(
                alternate_update_target && alternate_url[0] != '\0'
                  ? alternate_url
                  : "${dev_release_manifest_url}"
              );
            } else {
              const char *alternate_url = "${alternate_main_release_manifest_url}";
              id(oq_firmware_update).set_source_url(
                alternate_update_target && alternate_url[0] != '\0'
                  ? alternate_url
                  : "${main_release_manifest_url}"
              );
            }
        - if:
            condition:
              lambda: |-
                constexpr uint32_t fw_check_cooldown_ms = 1000UL;
                const uint32_t now_ms = (uint32_t) millis();
                const uint32_t last_request_ms = id(oq_fw_check_last_request_ms);
                if (last_request_ms > 0 && now_ms >= last_request_ms &&
                    (now_ms - last_request_ms) < fw_check_cooldown_ms) {
                  ESP_LOGI("oq_fw", "Firmware update check skipped: cooldown active after a recent request.");
                  return false;
                }
                id(oq_fw_check_last_request_ms) = now_ms;
                return true;
            then:
              - update.check:
                  id: oq_firmware_update

  - platform: template
    name: "Quatt Hybrid version"
    id: hp_generation
    icon: mdi:factory
    web_server:
      sorting_group_id: oq_heating_strategy
    entity_category: config
    optimistic: true
    restore_value: true
    options: ["V1", "V1.5", "V2"]
    initial_option: V1.5

  - platform: template
    name: "Debug Level"
    id: debug_level_select
    internal: true
    disabled_by_default: true
    icon: mdi:lan
    web_server:
      sorting_group_id: oq_system_diagnostics
    entity_category: diagnostic
    optimistic: true
    restore_value: true
    options: [NONE, ERROR, WARN, INFO, CONFIG, DEBUG]
    initial_option: INFO
    on_value:
      then:
        - lambda: |-
            int lvl =
              (x == "NONE")    ? 0 :
              (x == "ERROR")   ? 1 :
              (x == "WARN")    ? 2 :
              (x == "INFO")    ? 3 :
              (x == "CONFIG")  ? 4 :
                                 5;  // DEBUG

            ESP_LOGI("oq_fw", "Runtime logger level updated to %s", x.c_str());
            esphome::logger::global_logger->set_log_level(lvl);

  - platform: template
    name: "Uurdetail bewaren"
    id: oq_lifetime_energy_hour_retention
    icon: mdi:chart-bar
    web_server:
      sorting_group_id: oq_system_diagnostics
    entity_category: config
    optimistic: true
    restore_value: true
    options: ["30 dagen", "90 dagen", "180 dagen", "365 dagen"]
    initial_option: "180 dagen"
    on_value:
      then:
        - lambda: |-
            id(oq_energy_history_endpoint).refresh_hourly_retention();

button:
  - platform: template
    name: "Install Firmware Test OTA"
    id: oq_install_firmware_test_ota
    internal: true
    icon: mdi:test-tube
    disabled_by_default: true
    entity_category: config
    web_server:
      sorting_group_id: oq_system_diagnostics
    on_press:
      then:
        - if:
            condition:
              lambda: |-
                // Accept only OpenQuatt PR-release assets for this exact build target.
                const std::string url = id(oq_firmware_test_ota_url).state;
                const std::string md5_url = id(oq_firmware_test_ota_md5_url).state;
                const std::string prefix =
                    "https://github.com/jeroen85/OpenQuatt/releases/download/pr-";
                std::string hardware_slug;
                const std::string hardware = "${oq_hardware_profile}";
                if (hardware == "waveshare") {
                  hardware_slug = "waveshare";
                } else if (hardware == "heatpump_listener") {
                  hardware_slug = "heatpump-listener";
                } else if (hardware == "heatpump_controller_q") {
                  hardware_slug = "heatpump-controller-q";
                } else {
                  ESP_LOGW("oq_fw", "Test firmware rejected: unsupported hardware profile '%s'.", hardware.c_str());
                  return false;
                }
                #if OQ_TOPOLOGY_DUO
                const std::string topology = "duo";
                #else
                const std::string topology = "single";
                #endif
                const std::string expected_file =
                    "openquatt-" + hardware_slug + "-" + topology + "-${oq_connection}.firmware.ota.bin";
                const bool valid_prefix = url.rfind(prefix, 0) == 0;
                const bool valid_file =
                    url.size() >= expected_file.size() &&
                    url.compare(url.size() - expected_file.size(), expected_file.size(), expected_file) == 0;
                const bool valid_md5 = md5_url == (url + ".md5");
                if (!valid_prefix || !valid_file || !valid_md5) {
                  ESP_LOGW("oq_fw", "Test firmware rejected: invalid OTA URL for this build.");
                  id(oq_firmware_update_status).publish_state("Error");
                  return false;
                }
                return true;
            then:
              - ota.http_request.flash:
                  url: !lambda |-
                    return id(oq_firmware_test_ota_url).state;
                  md5_url: !lambda |-
                    return id(oq_firmware_test_ota_md5_url).state;

  - platform: restart
    name: Restart
    icon: mdi:restart
    id: restart_switch
    web_server:
      sorting_group_id: oq_system_diagnostics

  - platform: safe_mode
    name: Safe mode
    icon: mdi:shield-alert
    id: safe_mode_button
    web_server:
      sorting_group_id: oq_system_diagnostics

  - platform: template
    id: oq_trend_history_flush_button
    name: Trendhistorie nu opslaan
    internal: true
    disabled_by_default: true
    icon: mdi:content-save
    entity_category: config
    web_server:
      sorting_group_id: oq_system_diagnostics
    on_press:
      - lambda: |-
          id(oq_trend_capture_force_once) = true;
      - script.execute: oq_capture_overview_trend_sample
      - script.wait: oq_capture_overview_trend_sample
      - lambda: |-
          id(oq_trends_endpoint).force_flush();
      - script.execute: oq_publish_trend_history_stats
      - script.wait: oq_publish_trend_history_stats

  - platform: template
    id: oq_lifetime_energy_history_clear_button
    name: Lifetime energiehistorie wissen
    internal: true
    disabled_by_default: true
    icon: mdi:delete-clock
    entity_category: config
    web_server:
      sorting_group_id: oq_system_diagnostics
    on_press:
      - lambda: |-
          id(oq_energy_history_endpoint).clear_history();
      - script.execute: oq_publish_energy_history_stats
      - script.wait: oq_publish_energy_history_stats

  - platform: template
    id: oq_lifetime_energy_history_capture_button
    name: Lifetime energiehistorie nu opslaan
    internal: true
    disabled_by_default: true
    icon: mdi:content-save
    entity_category: config
    web_server:
      sorting_group_id: oq_system_diagnostics
    on_press:
      - script.execute: oq_capture_energy_history_sample
      - script.wait: oq_capture_energy_history_sample
      - lambda: |-
          id(oq_energy_history_endpoint).force_flush();
      - script.execute: oq_publish_energy_history_stats
      - script.wait: oq_publish_energy_history_stats

  - platform: template
    id: oq_check_firmware_updates
    name: Check Firmware Updates
    icon: mdi:update
    entity_category: diagnostic
    web_server:
      sorting_group_id: oq_system_diagnostics
    on_press:
      - if:
          condition:
            lambda: |-
              constexpr uint32_t fw_check_cooldown_ms = 1000UL;
              const uint32_t now_ms = (uint32_t) millis();
              const uint32_t last_request_ms = id(oq_fw_check_last_request_ms);
              if (last_request_ms > 0 && now_ms >= last_request_ms &&
                  (now_ms - last_request_ms) < fw_check_cooldown_ms) {
                ESP_LOGI("oq_fw", "Firmware update check skipped: cooldown active after a recent request.");
                return false;
              }
