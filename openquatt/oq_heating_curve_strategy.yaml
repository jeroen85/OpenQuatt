# ==============================================================================
# OpenQuatt - Heating Curve Strategy
# ==============================================================================
#
# Goal:
#   Owns the complete heating-curve strategy and compressor-request producer.
#
# Ownership:
#   - Computes curve supply target generation and PID demand
#   - Owns curve-specific hysteresis, phase state, and diagnostics
#   - Decides single-vs-dual curve topology
#   - Publishes level-derived capacity/deficit telemetry for supervisory CM3 logic
#   - Publishes curve request outputs for oq_thermal_request_control to turn
#     into the explicit request handoff
# ==============================================================================

globals:
  # Internal source (0..20) for heating-curve mode (PID -> demand)
  - id: oq_demand_curve
    type: int
    restore_value: false
    initial_value: '0'

  # Heating-curve diagnostics: demand before output guardrails.
  - id: oq_curve_demand_pre_guardrail
    type: int
    restore_value: false
    initial_value: '0'

  # Heating-curve diagnostics: 0=OFF, 1=HEAT, 2=COAST.
  - id: oq_curve_phase_code
    type: int
    restore_value: false
    initial_value: '0'

  # Curve-mode on/off hysteresis state near zero-demand edge.
  - id: oq_curve_heat_request_active
    type: bool
    restore_value: false
    initial_value: 'false'

  # Timestamp when curve stop condition was first armed (OFF confirm guardrail).
  - id: oq_curve_stop_arm_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'

  # Timestamp when curve phase entered OFF (for restart inhibit timing).
  - id: oq_curve_off_since_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'

  # Diagnostic flag: restart from OFF is temporarily inhibited.
  - id: oq_curve_restart_inhibit_active
    type: bool
    restore_value: false
    initial_value: 'false'

  # Curve outside-temperature EMA state.
  - id: oq_curve_outside_ema_c
    type: float
    restore_value: false
    initial_value: '0.0'
  - id: oq_curve_outside_ema_initialized
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: oq_curve_outside_ema_last_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'

  - id: oq_curve_dispatch_last_loop_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'

  - id: oq_curve_dispatch_hp1_req
    type: int
    restore_value: false
    initial_value: '0'

  - id: oq_curve_dispatch_hp2_req
    type: int
    restore_value: false
    initial_value: '0'

  - id: oq_curve_dispatch_owner_hp
    type: int
    restore_value: false
    initial_value: '0'

  # 0=idle, 1=single_hp1, 2=single_hp2, 3=single_lead_hp1, 4=single_lead_hp2,
  # 5=dual_emergency, 6=dual_defrost, 7=dual_enabled
  - id: oq_curve_dispatch_reason_code
    type: int
    restore_value: false
    initial_value: '0'

select:
  - platform: template
    id: oq_curve_control_profile
    name: "Heating Curve Control Profile"
    icon: mdi:tune-variant
    optimistic: true
    restore_value: true
    options:
      - Comfort
      - Balanced
      - Stable
    initial_option: Balanced
    entity_category: config
    web_server:
      sorting_group_id: oq_tuning_heat
    on_value:
      then:
        - climate.pid.reset_integral_term: oq_heating_curve_pid
        - lambda: |-
            id(oq_curve_heat_request_active) = false;
            id(oq_curve_stop_arm_ms) = 0;
            id(oq_curve_outside_ema_initialized) = false;
            id(oq_curve_outside_ema_last_ms) = 0;

