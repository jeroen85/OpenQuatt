climate:
  - platform: pid
    id: oq_heating_curve_pid
    name: "Heating Curve PID"
    icon: mdi:thermostat
    sensor: oq_system_supply_temp
    default_target_temperature: 35 °C
    heat_output: heating_curve_pid_out
    control_parameters:
      kp: 0.350
      ki: 0.00120
      kd: 0.200
      max_integral: 3.0
      min_integral: -3.0
    deadband_parameters:
      threshold_low: -1.00
      threshold_high: 1.00
      deadband_output_averaging_samples: 6
    visual:
      min_temperature: 20
      max_temperature: 70
    web_server:
      sorting_group_id: oq_tuning_heat

output:
  - platform: template
    id: heating_curve_pid_out
    type: float
    write_action:
      - lambda: |-
          // Guardrail: only let PID-path write curve demand in heating-curve mode.
          // In Power House mode, this output is diagnostic-only and must remain 0.
          if (id(oq_heat_mode_code) != 1) {
            id(oq_demand_curve) = 0;
            id(oq_curve_demand_pre_guardrail) = 0;
            id(oq_curve_heat_request_active) = false;
            id(oq_curve_stop_arm_ms) = 0;
            id(oq_curve_off_since_ms) = 0;
            id(oq_curve_restart_inhibit_active) = false;
            id(oq_curve_phase_code) = 0;
            return;
          }

          const int demand_max = (int) ${oq_strategy_demand_max_f};
          if (isnan(state)) {
            id(oq_demand_curve) = 0;
            id(oq_curve_demand_pre_guardrail) = 0;
            id(oq_curve_heat_request_active) = false;
            id(oq_curve_stop_arm_ms) = 0;
            id(oq_curve_off_since_ms) = 0;
            id(oq_curve_restart_inhibit_active) = false;
            id(oq_curve_phase_code) = 0;
            return;
          }

          int d = (int) lroundf(state * ${oq_strategy_demand_max_f});
          if (d < 0) d = 0;
          if (d > demand_max) d = demand_max;
          id(oq_curve_demand_pre_guardrail) = d;

          const float spw = id(oq_supply_target_temp).state;
          const float pv = id(oq_system_supply_temp).state;
          if (isnan(spw) || isnan(pv)) {
            id(oq_curve_heat_request_active) = false;
            id(oq_curve_stop_arm_ms) = 0;
            id(oq_curve_off_since_ms) = 0;
            id(oq_curve_restart_inhibit_active) = false;
            id(oq_demand_curve) = 0;
            id(oq_curve_demand_pre_guardrail) = 0;
            id(oq_curve_phase_code) = 0;
            return;
          }

          float start_delta_c = 0.45f;
          float stop_delta_c = 0.90f;
          float coast_enter_c = 0.35f;
          int coast_floor_f = 1;
          int coast_cap_f = 6;
          int off_pid_max_f = 1;
          uint32_t off_confirm_ms = 360000UL;
          float room_overheat_off_c = 0.30f;
          float room_resume_heat_c = 0.05f;
          float restart_delta_c = 0.80f;
          float restart_bypass_extra_c = 0.45f;
          uint32_t off_reentry_min_ms = 480000UL;
          if (id(oq_curve_control_profile).has_state()) {
            const auto profile = id(oq_curve_control_profile).current_option();
            if (profile == "Comfort") {
              start_delta_c = 0.30f;
              stop_delta_c = 0.70f;
              coast_enter_c = 0.25f;
              coast_floor_f = 2;
              coast_cap_f = 8;
              off_pid_max_f = 1;
              off_confirm_ms = 240000UL;
              room_overheat_off_c = 0.20f;
              room_resume_heat_c = 0.03f;
              restart_delta_c = 0.60f;
              restart_bypass_extra_c = 0.35f;
              off_reentry_min_ms = 300000UL;
            } else if (profile == "Stable") {
              start_delta_c = 0.65f;
              stop_delta_c = 1.10f;
              coast_enter_c = 0.55f;
              coast_floor_f = 1;
              coast_cap_f = 4;
              off_pid_max_f = 1;
              off_confirm_ms = 420000UL;
              room_overheat_off_c = 0.35f;
              room_resume_heat_c = 0.08f;
              restart_delta_c = 1.00f;
              restart_bypass_extra_c = 0.55f;
              off_reentry_min_ms = 600000UL;
            }
          }
          if (stop_delta_c < start_delta_c + 0.10f) stop_delta_c = start_delta_c + 0.10f;
          if (restart_delta_c < start_delta_c + 0.05f) restart_delta_c = start_delta_c + 0.05f;
          if (restart_bypass_extra_c < 0.20f) restart_bypass_extra_c = 0.20f;
          if (off_pid_max_f < 0) off_pid_max_f = 0;
          if (off_pid_max_f > demand_max) off_pid_max_f = demand_max;
          if (coast_floor_f < 1) coast_floor_f = 1;
          if (coast_floor_f > demand_max) coast_floor_f = demand_max;
          if (coast_cap_f < coast_floor_f) coast_cap_f = coast_floor_f;
          if (coast_cap_f > demand_max) coast_cap_f = demand_max;

          const float room_c = id(room_temp_selected).state;
          const float room_sp_c = id(room_setpoint_selected).state;
          const bool room_valid = !isnan(room_c) && !isnan(room_sp_c);
          const bool room_warm_for_off = room_valid && (room_c >= (room_sp_c + room_overheat_off_c));
          const bool room_requests_heat = room_valid && (room_c <= (room_sp_c - room_resume_heat_c));
          const bool room_allows_off = (!room_valid) || room_warm_for_off;

          const bool above_stop_band = pv >= (spw + stop_delta_c);
          const bool low_pid_for_off = d <= off_pid_max_f;
          const float restart_bypass_delta_c = restart_delta_c + restart_bypass_extra_c;
          const uint32_t now_ms = (uint32_t) millis();
          bool heat_request_active = id(oq_curve_heat_request_active);
          bool restart_inhibit_active = false;
          uint32_t off_since_ms = id(oq_curve_off_since_ms);
          const bool was_heat_request_active = heat_request_active;
          if (heat_request_active) {
            if (above_stop_band && low_pid_for_off && room_allows_off) {
              uint32_t armed_ms = id(oq_curve_stop_arm_ms);
              if (armed_ms == 0 || now_ms <= armed_ms) {
                id(oq_curve_stop_arm_ms) = now_ms;
              } else if ((now_ms - armed_ms) >= off_confirm_ms) {
                heat_request_active = false;
                id(oq_curve_stop_arm_ms) = 0;
              }
            } else {
              id(oq_curve_stop_arm_ms) = 0;
            }
            if (!heat_request_active && was_heat_request_active) {
              off_since_ms = now_ms;
            }
          } else {
            id(oq_curve_stop_arm_ms) = 0;
            if (off_since_ms == 0 || now_ms <= off_since_ms) off_since_ms = now_ms;
            const bool below_restart_band = pv <= (spw - restart_delta_c);
            const bool deep_undershoot_restart = pv <= (spw - restart_bypass_delta_c);
            bool off_lock_active = false;
            if (off_reentry_min_ms > 0 && now_ms > off_since_ms) {
              off_lock_active = (now_ms - off_since_ms) < off_reentry_min_ms;
            }
            restart_inhibit_active = off_lock_active && !deep_undershoot_restart && !room_requests_heat;
            if ((below_restart_band || room_requests_heat) && !restart_inhibit_active) {
              heat_request_active = true;
              off_since_ms = 0;
            }
          }
          if (heat_request_active) {
            restart_inhibit_active = false;
            off_since_ms = 0;
          }

          int curve_phase_code = 1;
          if (!heat_request_active) {
            d = 0;
            curve_phase_code = 0;
          } else {
            if (d < 1) d = 1;
            const bool coast_phase = pv >= (spw - coast_enter_c);
            if (coast_phase) {
              curve_phase_code = 2;
              if (d < coast_floor_f) d = coast_floor_f;
              if (d > coast_cap_f) d = coast_cap_f;
              if (pv >= spw && d > coast_floor_f) d = coast_floor_f;
            }
          }

          id(oq_curve_heat_request_active) = heat_request_active;
          id(oq_curve_off_since_ms) = off_since_ms;
          id(oq_curve_restart_inhibit_active) = restart_inhibit_active;
          id(oq_demand_curve) = d;
          id(oq_curve_phase_code) = curve_phase_code;

sensor:
  - platform: template
    id: oq_curve_outside_temp_filtered
    name: "Outside Temperature (Curve filtered)"
    icon: mdi:thermometer-lines
    internal: true
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 10s
    lambda: |-
      // Smooth the selected outside temperature with a profile-dependent EMA.
      const float outside_c = id(outside_temp_selected).state;
      if (isnan(outside_c)) {
        id(oq_curve_outside_ema_initialized) = false;
        id(oq_curve_outside_ema_last_ms) = 0;
        return NAN;
      }

      float tau_s = 1800.0f;
      if (id(oq_curve_control_profile).has_state()) {
        const auto profile = id(oq_curve_control_profile).current_option();
        if (profile == "Comfort") tau_s = 900.0f;
        else if (profile == "Stable") tau_s = 3600.0f;
      }

      const uint32_t now_ms = (uint32_t) millis();
      if (!id(oq_curve_outside_ema_initialized) ||
          id(oq_curve_outside_ema_last_ms) == 0 ||
          now_ms <= id(oq_curve_outside_ema_last_ms)) {
        id(oq_curve_outside_ema_c) = outside_c;
        id(oq_curve_outside_ema_initialized) = true;
        id(oq_curve_outside_ema_last_ms) = now_ms;
        return outside_c;
      }

      const float dt_s = (now_ms - id(oq_curve_outside_ema_last_ms)) / 1000.0f;
      float alpha = dt_s / (tau_s + dt_s);
      if (alpha < 0.0f) alpha = 0.0f;
      if (alpha > 1.0f) alpha = 1.0f;

      float ema_c = id(oq_curve_outside_ema_c);
      if (isnan(ema_c)) ema_c = outside_c;
      ema_c += alpha * (outside_c - ema_c);

      id(oq_curve_outside_ema_c) = ema_c;
      id(oq_curve_outside_ema_last_ms) = now_ms;
      return ema_c;

  - platform: template
    id: oq_supply_target_temp
    name: "Heating Curve Supply Target"
    icon: mdi:target
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    update_interval: 10s
    web_server:
      sorting_group_id: oq_temperatures
    lambda: |-
      // Generate the curve-mode supply target from outside temperature and room trim.
      const float outside_c = id(oq_curve_outside_temp_filtered).state;
      float target_c = id(curve_fallback_supply_temp).state;

      struct Point { float outside_c; float target_c; };
      const Point points[6] = {
        {-20.0f, id(curve_tsupply_m20).state},
        {-10.0f, id(curve_tsupply_m10).state},
        {  0.0f, id(curve_tsupply_0).state},
        {  5.0f, id(curve_tsupply_5).state},
        { 10.0f, id(curve_tsupply_10).state},
        { 15.0f, id(curve_tsupply_15).state}
      };

      if (!isnan(outside_c)) {
        if (outside_c <= -20.0f) target_c = points[0].target_c;
        else if (outside_c >= 15.0f) target_c = points[5].target_c;
        else {
          for (int i = 0; i < 5; i++) {
            if (outside_c >= points[i].outside_c && outside_c <= points[i + 1].outside_c) {
              const float segment = (outside_c - points[i].outside_c) / (points[i + 1].outside_c - points[i].outside_c);
              target_c = points[i].target_c + segment * (points[i + 1].target_c - points[i].target_c);
              break;
            }
          }
        }
      }

      const float room_c = id(room_temp_selected).state;
      const float room_sp_c = id(room_setpoint_selected).state;
      if (!isnan(target_c) && !isnan(room_c) && !isnan(room_sp_c)) {
        float warm_err_c = room_c - room_sp_c;
        float trim_start_c = 0.10f;
        float trim_gain = 1.50f;
        float trim_max_c = 2.00f;
        if (id(oq_curve_control_profile).has_state()) {
          const auto profile = id(oq_curve_control_profile).current_option();
          if (profile == "Comfort") {
            trim_start_c = 0.05f;
            trim_gain = 2.00f;
            trim_max_c = 2.00f;
          } else if (profile == "Stable") {
            trim_start_c = 0.15f;
            trim_gain = 1.00f;
            trim_max_c = 2.50f;
          }
        }
        if (warm_err_c > trim_start_c) {
          float trim_c = (warm_err_c - trim_start_c) * trim_gain;
          if (trim_c < 0.0f) trim_c = 0.0f;
          if (trim_c > trim_max_c) trim_c = trim_max_c;
          target_c -= trim_c;
        }
      }

      float quant_step_c = 0.5f;
      if (id(oq_curve_control_profile).has_state()) {
        const auto profile = id(oq_curve_control_profile).current_option();
        if (profile == "Comfort") quant_step_c = 0.25f;
        else if (profile == "Stable") quant_step_c = 1.0f;
      }
      if (!isnan(target_c) && quant_step_c > 0.0f) {
        target_c = roundf(target_c / quant_step_c) * quant_step_c;
      }

      const float max_water_temp_c = id(max_water_temp_limit_c).state;
      if (!isnan(target_c) && !isnan(max_water_temp_c)) {
        target_c = fminf(target_c, max_water_temp_c);
      }
      return target_c;

  - platform: template
    id: oq_demand_curve_sensor
    name: "Demand Curve (raw)"
    disabled_by_default: true
    icon: mdi:counter
    unit_of_measurement: "step"
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 5s
    web_server:
      sorting_group_id: oq_diagnostics
    lambda: |-
      return (float) id(oq_demand_curve);

  - platform: template
    id: oq_curve_demand_pre_guardrail_sensor
    name: "Demand Curve (pre-guardrail)"
    disabled_by_default: true
    icon: mdi:counter
    unit_of_measurement: "step"
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 5s
    entity_category: diagnostic
    web_server:
      sorting_group_id: oq_diagnostics
    lambda: |-
      return (float) id(oq_curve_demand_pre_guardrail);

  - platform: template
    id: oq_curve_demand_post_guardrail_sensor
    name: "Demand Curve (post-guardrail)"
    disabled_by_default: true
    icon: mdi:counter
    unit_of_measurement: "step"
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 5s
    entity_category: diagnostic
    web_server:
      sorting_group_id: oq_diagnostics
    lambda: |-
      return (float) id(oq_demand_curve);

  - platform: template
    id: oq_curve_restart_inhibit_sensor
    name: "Curve restart inhibit"
    disabled_by_default: true
    icon: mdi:timer-sand-paused
    accuracy_decimals: 0
    update_interval: 5s
    entity_category: diagnostic
    web_server:
      sorting_group_id: oq_diagnostics
    lambda: |-
      return id(oq_curve_restart_inhibit_active) ? 1.0f : 0.0f;

text_sensor:
  - platform: template
    id: oq_curve_phase_sensor
    name: "Curve Phase"
    icon: mdi:state-machine
    update_interval: 5s
    entity_category: diagnostic
    disabled_by_default: true
    web_server:
      sorting_group_id: oq_diagnostics
    lambda: |-
      switch (id(oq_curve_phase_code)) {
        case 1: return std::string("HEAT");
        case 2: return std::string("COAST");
        default: return std::string("OFF");
      }

interval:
  - interval: ${oq_strategy_loop_s}s
    startup_delay: 800ms
    then:
      - lambda: |-
          // Curve strategy loop: maintain PID target and publish curve demand.
          // CM5 owns the thermal strategy contract while cooling is active, so the
          // curve path must go fully inactive there even when curve mode remains selected.
          const bool active = (id(oq_control_mode_code) != 5) && (id(oq_heat_mode_code) == 1);
          const int demand_max = (int) ${oq_strategy_demand_max_f};
          auto clamp_demand = [&](int demand)->int {
            if (demand < 0) return 0;
            if (demand > demand_max) return demand_max;
            return demand;
          };

          if (active) {
            const float spw = id(oq_supply_target_temp).state;
            const float pv = id(oq_system_supply_temp).state;
            if (isnan(spw) || isnan(pv)) {
              id(oq_demand_curve) = 0;
              id(oq_curve_heat_request_active) = false;
              id(oq_curve_stop_arm_ms) = 0;
            } else {
              const float cur2 = id(oq_heating_curve_pid).target_temperature;
              if (id(oq_heating_curve_pid).mode != CLIMATE_MODE_HEAT ||
                  isnan(cur2) || fabsf(cur2 - spw) >= 0.10f) {
                auto c2 = id(oq_heating_curve_pid).make_call();
                if (id(oq_heating_curve_pid).mode != CLIMATE_MODE_HEAT) {
                  c2.set_mode(CLIMATE_MODE_HEAT);
                }
                c2.set_target_temperature(spw);
                c2.perform();
              }
            }

            int d_out = clamp_demand(id(oq_demand_curve));
            if (id(oq_water_temp_hard_trip_active)) d_out = 0;
            id(oq_demand_raw) = d_out;

            id(oq_strategy_phase_code) = id(oq_curve_phase_code);
            id(oq_strategy_requested_power_w) = NAN;
            id(oq_strategy_supply_target_temp) = id(oq_supply_target_temp).state;
            id(oq_strategy_heat_request_active) = id(oq_curve_heat_request_active);

            const int phase_code = id(oq_curve_phase_code);
            const char *phase_text = "off";
            if (phase_code == 1) phase_text = "heat";
            else if (phase_code == 2) phase_text = "coast";
            id(oq_strategy_phase_text).publish_state(phase_text);

            char debug_buf[160];
            const float target_c = id(oq_supply_target_temp).state;
            const float supply_c = id(oq_system_supply_temp).state;
            snprintf(
              debug_buf, sizeof(debug_buf),
              "curve phase=%s d=%d pre=%d sp=%.2f pv=%.2f",
              phase_text, d_out, id(oq_curve_demand_pre_guardrail), target_c, supply_c);
            id(oq_strategy_debug_state).publish_state(debug_buf);
          } else {
            if (id(oq_heating_curve_pid).mode != CLIMATE_MODE_OFF) {
              auto c0 = id(oq_heating_curve_pid).make_call();
              c0.set_mode(CLIMATE_MODE_OFF);
              c0.perform();
            }
            id(oq_curve_heat_request_active) = false;
            id(oq_curve_stop_arm_ms) = 0;
            id(oq_curve_off_since_ms) = 0;
            id(oq_curve_restart_inhibit_active) = false;
            id(oq_demand_curve) = 0;
          }
      - if:
          condition:
            lambda: |-
              // Reset curve integral whenever the loop is inactive or not delivering heat yet.
              if (id(oq_heat_mode_code) != 1) return false;
              if (id(oq_water_temp_hard_trip_active)) return true;
              const float spw = id(oq_supply_target_temp).state;
              const float pv  = id(oq_system_supply_temp).state;
              if (isnan(spw) || isnan(pv)) return true;

              const bool hp1_level_on = id(hp1_last_applied_level) > 0;
              const bool hp2_level_on = id(${curve_secondary_last_applied_level_id}) > 0;
              const float hp1_mode_raw = id(hp1_working_mode).state;
              const float hp2_mode_raw = id(${curve_secondary_working_mode_id}).state;
              const bool hp1_heating = !isnan(hp1_mode_raw) && ((int) roundf(hp1_mode_raw) == 2);
              const bool hp2_heating = !isnan(hp2_mode_raw) && ((int) roundf(hp2_mode_raw) == 2);
              const bool hp_delivering =
                  (hp1_level_on && hp1_heating) || (hp2_level_on && hp2_heating);
              return !hp_delivering;
          then:
            - climate.pid.reset_integral_term: oq_heating_curve_pid

  - interval: ${oq_heat_loop_tick_s}s
    startup_delay: 4000ms
    then:
      - lambda: |-
          // Heating-curve strategy: owns direct demand and single-vs-dual request split.
          const int cm_code = id(oq_control_mode_code);
          const bool active = (cm_code != 5) && (id(oq_heat_mode_code) == 1);
          if (!active) {
            id(oq_curve_dispatch_last_loop_ms) = 0;
            id(oq_curve_dispatch_hp1_req) = 0;
            id(oq_curve_dispatch_hp2_req) = 0;
            id(oq_curve_dispatch_owner_hp) = 0;
            id(oq_curve_dispatch_reason_code) = 0;
            return;
          }

          const uint32_t now_ms = (uint32_t) millis();
          const uint32_t loop_target_ms = (uint32_t) (${oq_heat_loop_curve_s} * 1000UL);
          if (id(oq_curve_dispatch_last_loop_ms) > 0 && now_ms > id(oq_curve_dispatch_last_loop_ms)) {
            const uint32_t elapsed_ms = now_ms - id(oq_curve_dispatch_last_loop_ms);
            if (elapsed_ms < loop_target_ms) return;
          }
          id(oq_curve_dispatch_last_loop_ms) = now_ms;

          constexpr int min_level = 0;
          constexpr int max_level = 10;
          const int demand_max_f = (int) ${oq_strategy_demand_max_f};
          int raw = id(oq_demand_raw);
          raw = std::max(0, std::min(demand_max_f, raw));

          id(oq_demand_filtered_prev) = id(oq_demand_filtered);
          id(oq_demand_filtered) = raw;
          id(oq_heating_demand_filtered) = raw;

          int f = raw;
          int f_cap = id(oq_power_cap_f);
          f_cap = std::max(0, std::min(demand_max_f, f_cap));
          if (f > f_cap) f = f_cap;

          #if OQ_TOPOLOGY_DUO
          const bool lead_is_hp1 = (id(hp1_minutes) <= id(${curve_secondary_minutes_id}));
          #else
          const bool lead_is_hp1 = true;
          #endif
          const int lead_code = lead_is_hp1 ? 1 : 2;
          if (id(oq_last_lead_hp) != lead_code) id(oq_last_lead_hp) = lead_code;

          auto excluded_option_matches_level = [&](const std::string &opt, int level)->bool {
            switch (level) {
              case 1: return opt == "L1 (H30/C30)";
              case 2: return opt == "L2 (H39/C36)";
              case 3: return opt == "L3 (H49/C42)";
              case 4: return opt == "L4 (H55/C47)";
              case 5: return opt == "L5 (H61/C52)";
              case 6: return opt == "L6 (H67/C56)";
              case 7: return opt == "L7 (H72/C61)";
              case 8: return opt == "L8 (H79/C66)";
              case 9: return opt == "L9 (H85/C71)";
              case 10: return opt == "L10 (H90/C74)";
              default: return false;
            }
          };

          auto level_allowed = [&](bool is_hp1, int level)->bool {
            if (level <= 0 || level > max_level) return true;

            if (is_hp1) {
              const std::string excl_a = id(hp1_excluded_level_a).has_state()
                                             ? id(hp1_excluded_level_a).current_option()
                                             : std::string("None");
              const std::string excl_b = id(hp1_excluded_level_b).has_state()
                                             ? id(hp1_excluded_level_b).current_option()
                                             : std::string("None");
              return !excluded_option_matches_level(excl_a, level) &&
                     !excluded_option_matches_level(excl_b, level);
            }
            #if OQ_TOPOLOGY_DUO
            const std::string excl_a = id(${curve_secondary_excluded_level_a_id}).has_state()
                                           ? id(${curve_secondary_excluded_level_a_id}).current_option()
                                           : std::string("None");
            const std::string excl_b = id(${curve_secondary_excluded_level_b_id}).has_state()
                                           ? id(${curve_secondary_excluded_level_b_id}).current_option()
                                           : std::string("None");
            return !excluded_option_matches_level(excl_a, level) &&
                   !excluded_option_matches_level(excl_b, level);
            #else
            return false;
            #endif
          };

          auto valve_defrost_active = [&](bool is_hp1)->bool {
            if (is_hp1) return id(hp1_4_way_valve).state;
            #if OQ_TOPOLOGY_DUO
            return id(${curve_secondary_4_way_valve_id}).state;
            #else
            return false;
            #endif
          };

          const float Tamb = id(outside_temp_selected).state;
          const float Tsup = id(oq_system_supply_temp).state;
          int level_cap = (int) roundf(id(oq_day_max_level).state);
          if (id(oq_silent_active).state) level_cap = (int) roundf(id(oq_silent_max_level).state);
          if (level_cap < min_level) level_cap = min_level;
          if (level_cap > max_level) level_cap = max_level;

          const bool hp1_valve_def = valve_defrost_active(true);
          #if OQ_TOPOLOGY_DUO
          const bool hp2_valve_def = valve_defrost_active(false);
          const bool hp2_available = true;
          #else
          const bool hp2_valve_def = false;
          const bool hp2_available = false;
          #endif
          const bool hp1_available = true;

          float def_fac_cfg = ${oq_defrost_power_factor};
          if (isnan(def_fac_cfg)) def_fac_cfg = 0.55f;
          const float def_fac = fmaxf(0.10f, fminf(1.00f, def_fac_cfg));
          const float hp1_th_fac = hp1_valve_def ? def_fac : 1.0f;
          const float hp2_th_fac = hp2_valve_def ? def_fac : 1.0f;

          auto power_for_level = [&](bool is_hp1, int level)->float {
            if (level <= 0) return 0.0f;
            if ((is_hp1 && !hp1_available) || (!is_hp1 && !hp2_available)) return 0.0f;
            float p = oq_perf::interp_power_th_w(level, Tamb, Tsup);
            if (isnan(p)) return 0.0f;
            p *= is_hp1 ? hp1_th_fac : hp2_th_fac;
            return isnan(p) ? 0.0f : p;
          };

          auto max_cap_hp = [&](bool is_hp1)->float {
            if ((is_hp1 && !hp1_available) || (!is_hp1 && !hp2_available)) return 0.0f;
            float best = 0.0f;
            for (int lvl = 1; lvl <= level_cap; lvl++) {
              if (!level_allowed(is_hp1, lvl)) continue;
              float p = oq_perf::interp_power_th_w(lvl, Tamb, Tsup);
              if (!isnan(p)) p *= is_hp1 ? hp1_th_fac : hp2_th_fac;
              if (!isnan(p) && p > best) best = p;
            }
            return best;
          };

          auto requested_power_from_total_levels = [&](int total_level_request)->float {
            int total_req = total_level_request;
            if (total_req < 0) total_req = 0;
            if (isnan(Tamb) || isnan(Tsup) || total_req <= 0) return 0.0f;

            float best = 0.0f;
            #if OQ_TOPOLOGY_DUO
            const int nominal_cap_total = max_level * 2;
            if (total_req > nominal_cap_total) total_req = nominal_cap_total;
            for (int l1 = 0; l1 <= std::min(max_level, total_req); l1++) {
              const int l2_max = std::min(max_level, total_req - l1);
              for (int l2 = 0; l2 <= l2_max; l2++) {
                if ((l1 + l2) > total_req) continue;
                const float req_power = power_for_level(true, l1) + power_for_level(false, l2);
                if (req_power > best) best = req_power;
              }
            }
            #else
            if (total_req > max_level) total_req = max_level;
            best = power_for_level(true, total_req);
            #endif
            return best;
          };

          auto publish_capacity_and_deficit = [&](int requested_level_total)->float {
            float cap_total = 0.0f;
            if (!isnan(Tamb) && !isnan(Tsup)) {
              cap_total = max_cap_hp(true) + max_cap_hp(false);
            }
            id(oq_P_hp_cap_w) = cap_total;

            float req = requested_power_from_total_levels(requested_level_total);
            float deficit = req - cap_total;
            if (deficit < 0.0f) deficit = 0.0f;
            id(oq_P_deficit_w) = deficit;
            return cap_total;
          };

          auto reset_dual_runtime_state = [&](int owner)->void {
            id(oq_dual_hp_enabled) = false;
            id(oq_dual_hp_enable_hold_elapsed_min) = 0;
            id(oq_dual_hp_disable_hold_elapsed_min) = 0;
            id(oq_dual_hp_enable_hold_elapsed_accum_min) = 0.0f;
            id(oq_dual_hp_disable_hold_elapsed_accum_min) = 0.0f;
            id(oq_dual_hp_emergency_hold_elapsed_min) = 0;
            id(oq_dual_hp_emergency_hold_elapsed_accum_min) = 0.0f;
            id(oq_curve_single_owner_hp) = owner;
            id(oq_duo_dispatch_hold_until_ms) = 0;
          };

          int hp1_req = 0;
          int hp2_req = 0;
          int owner = 0;
          int reason_code = 0;

          #if OQ_TOPOLOGY_DUO
          publish_capacity_and_deficit(f);
          const bool d1_pre = hp1_valve_def;
          const bool d2_pre = hp2_valve_def;

          int dual_on_lvl = (int) roundf(id(oq_dual_hp_enable_level).state);
          if (dual_on_lvl < 1) dual_on_lvl = 1;
          if (dual_on_lvl > max_level) dual_on_lvl = max_level;
          int dual_off_lvl = dual_on_lvl - 1;
          if (dual_off_lvl < 1) dual_off_lvl = 1;

          int dual_on_hold_min = (int) roundf(id(oq_dual_hp_enable_hold_min).state);
          int dual_off_hold_min = (int) roundf(id(oq_dual_hp_disable_hold_min).state);
          if (dual_on_hold_min < 1) dual_on_hold_min = 1;
          if (dual_off_hold_min < 1) dual_off_hold_min = 1;

          int startup_grace_s = 480;
          int emergency_hold_min = 6;
          float emergency_temp_err_c = 1.50f;
          float dual_disable_temp_err_max_c = 0.50f;
          if (id(oq_curve_control_profile).has_state()) {
            const auto profile = id(oq_curve_control_profile).current_option();
            if (profile == "Comfort") {
              startup_grace_s = 300;
              emergency_hold_min = 4;
              emergency_temp_err_c = 1.20f;
              dual_disable_temp_err_max_c = 0.70f;
            } else if (profile == "Stable") {
              startup_grace_s = 600;
              emergency_hold_min = 8;
              emergency_temp_err_c = 1.80f;
              dual_disable_temp_err_max_c = 0.40f;
            }
          }
          if (startup_grace_s < 0) startup_grace_s = 0;
          if (emergency_hold_min < 1) emergency_hold_min = 1;

          float temp_err_c = NAN;
          if (!isnan(id(oq_supply_target_temp).state) && !isnan(id(oq_system_supply_temp).state)) {
            temp_err_c = id(oq_supply_target_temp).state - id(oq_system_supply_temp).state;
          }

          auto max_allowed_level_for_hp = [&](bool is_hp1)->int {
            int lvl_max = 0;
            for (int lvl = level_cap; lvl >= 1; lvl--) {
              if (level_allowed(is_hp1, lvl)) {
                lvl_max = lvl;
                break;
              }
            }
            return lvl_max;
          };

          const int lead_max_single = max_allowed_level_for_hp(lead_is_hp1);
          const int lag_max_single = max_allowed_level_for_hp(!lead_is_hp1);
          const int single_limit_lvl = std::max(lead_max_single, lag_max_single);
          int single_req_lvl = f;
          if (single_req_lvl < 0) single_req_lvl = 0;
          if (single_limit_lvl > 0 && single_req_lvl > single_limit_lvl) single_req_lvl = single_limit_lvl;

          const bool demand_active = (f > 0);
          const bool beyond_single_capacity = demand_active && (single_limit_lvl > 0) && (f > single_limit_lvl);
          const bool severe_level_pressure =
              (single_limit_lvl > 0) && (single_req_lvl >= std::min(max_level, dual_on_lvl + 2));
          const bool severe_temp_deficit = !isnan(temp_err_c) && (temp_err_c >= emergency_temp_err_c);
          const uint32_t lead_last_start_ms =
              lead_is_hp1 ? id(hp1_last_start_ms) : id(${curve_secondary_last_start_ms_id});
          const bool startup_grace_active =
              (startup_grace_s > 0) &&
              (lead_last_start_ms > 0) &&
              (now_ms > lead_last_start_ms) &&
              ((now_ms - lead_last_start_ms) < ((uint32_t) startup_grace_s * 1000UL));

          bool force_dual_capacity = false;
          const bool emergency_dual_condition =
              demand_active && beyond_single_capacity && severe_level_pressure &&
              (severe_temp_deficit || single_req_lvl >= (max_level - 1)) && !startup_grace_active;
          if (emergency_dual_condition) {
            id(oq_dual_hp_emergency_hold_elapsed_accum_min) += ((float) loop_target_ms / 1000.0f) / 60.0f;
          } else {
            id(oq_dual_hp_emergency_hold_elapsed_accum_min) = 0.0f;
          }
          id(oq_dual_hp_emergency_hold_elapsed_min) =
              (int) floorf(id(oq_dual_hp_emergency_hold_elapsed_accum_min) + 1e-3f);
          if (id(oq_dual_hp_emergency_hold_elapsed_accum_min) >= (float) emergency_hold_min) {
            force_dual_capacity = true;
          }
          const bool force_dual_defrost = demand_active && (d1_pre && d2_pre);
          const bool dual_on_condition =
              demand_active && (force_dual_capacity || force_dual_defrost || (single_req_lvl >= dual_on_lvl));
          const bool dual_off_condition =
              (!force_dual_capacity) && (!force_dual_defrost) && (single_req_lvl <= dual_off_lvl) &&
              (isnan(temp_err_c) || temp_err_c <= dual_disable_temp_err_max_c);

          const float dt_min = ((float) loop_target_ms / 1000.0f) / 60.0f;
          if (!demand_active) {
            id(oq_dual_hp_enabled) = false;
            id(oq_dual_hp_enable_hold_elapsed_min) = 0;
            id(oq_dual_hp_disable_hold_elapsed_min) = 0;
            id(oq_dual_hp_enable_hold_elapsed_accum_min) = 0.0f;
            id(oq_dual_hp_disable_hold_elapsed_accum_min) = 0.0f;
            id(oq_dual_hp_emergency_hold_elapsed_min) = 0;
            id(oq_dual_hp_emergency_hold_elapsed_accum_min) = 0.0f;
          } else {
            if (dual_on_condition) id(oq_dual_hp_enable_hold_elapsed_accum_min) += dt_min;
            else id(oq_dual_hp_enable_hold_elapsed_accum_min) = 0.0f;

            if (dual_off_condition) id(oq_dual_hp_disable_hold_elapsed_accum_min) += dt_min;
            else id(oq_dual_hp_disable_hold_elapsed_accum_min) = 0.0f;

            if (!id(oq_dual_hp_enabled) &&
                id(oq_dual_hp_enable_hold_elapsed_accum_min) >= (float) dual_on_hold_min) {
              id(oq_dual_hp_enabled) = true;
              id(oq_dual_hp_disable_hold_elapsed_accum_min) = 0.0f;
            } else if (id(oq_dual_hp_enabled) &&
                       id(oq_dual_hp_disable_hold_elapsed_accum_min) >= (float) dual_off_hold_min) {
              id(oq_dual_hp_enabled) = false;
              id(oq_dual_hp_enable_hold_elapsed_accum_min) = 0.0f;
            }

            id(oq_dual_hp_enable_hold_elapsed_min) =
                (int) floorf(id(oq_dual_hp_enable_hold_elapsed_accum_min) + 1e-3f);
            id(oq_dual_hp_disable_hold_elapsed_min) =
                (int) floorf(id(oq_dual_hp_disable_hold_elapsed_accum_min) + 1e-3f);
          }

          const bool dual_enabled =
              demand_active && (force_dual_capacity || force_dual_defrost || id(oq_dual_hp_enabled));

          if (!dual_enabled) {
            int single_owner = id(oq_curve_single_owner_hp);
            const bool prev_hp1_on = (id(hp1_last_applied_level) > 0);
            const bool prev_hp2_on = (id(${curve_secondary_last_applied_level_id}) > 0);

            if (!demand_active) {
              single_owner = 0;
            } else if (prev_hp1_on && !prev_hp2_on) {
              single_owner = 1;
            } else if (prev_hp2_on && !prev_hp1_on) {
              single_owner = 2;
            } else if (single_owner != 1 && single_owner != 2) {
              single_owner = lead_is_hp1 ? 1 : 2;
            }

            id(oq_curve_single_owner_hp) = single_owner;
            if (single_owner == 1) hp1_req = f;
            else if (single_owner == 2) hp2_req = f;
            else if (lead_is_hp1) hp1_req = f;
            else hp2_req = f;
            owner = single_owner;
            if (single_owner == 1) reason_code = 1;
            else if (single_owner == 2) reason_code = 2;
            else if (lead_is_hp1) reason_code = 3;
            else reason_code = 4;
          } else {
            id(oq_curve_single_owner_hp) = 0;
            hp1_req = f / 2;
            hp2_req = f / 2;
            if ((f % 2) == 1) {
              if (lead_is_hp1) hp1_req += 1;
              else hp2_req += 1;
