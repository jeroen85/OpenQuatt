# ==============================================================================
# OpenQuatt - EXPERIMENTAL ODU Runtime Frequency Table
# ==============================================================================
#
# WARNING:
#   This package writes outdoor-unit runtime EEPROM shadow registers over Modbus.
#   The changes are expected to become active immediately, but are NOT persisted
#   to ODU EEPROM. A full ODU power cycle should restore the original table.
#
#   Use only for short controlled tests. Keep the ODU in standby, verify that the
#   compressor is stopped, and monitor the installation while testing.
#
# Register mapping:
#   Excel register maps are one-based; ODU communication uses sheet address - 1.
#   Cooling F0-F10: Excel 3001..3011 -> ODU 3000..3010
#   Heating F0-F10: Excel 3012..3022 -> ODU 3011..3021
#
# Required vars:
#   - hp_id
#   - prefix
#
# ==============================================================================

switch:
  - platform: template
    id: ${hp_id}_odu_runtime_frequency_table_enable
    name: "${prefix}EXPERIMENTAL ODU runtime frequency write enable"
    internal: true
    icon: mdi:alert-decagram
    optimistic: true
    restore_mode: ALWAYS_OFF
    entity_category: config
    web_server:
      sorting_group_id: oq_advanced_hp_levels

number:
  # Editable desired runtime table. Defaults mirror the known ODU factory table;
  # use Load before applying to confirm the current runtime values.
  - platform: template
    id: ${hp_id}_odu_runtime_cooling_f0
    name: "${prefix}EXPERIMENTAL cooling F0 runtime Hz"
    internal: true
    icon: mdi:sine-wave
    mode: box
    min_value: 0
    max_value: 120
    step: 1
    restore_value: true
    optimistic: true
    initial_value: 0
    entity_category: config
    web_server:
