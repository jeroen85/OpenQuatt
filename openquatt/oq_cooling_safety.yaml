    icon: mdi:water-thermometer
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 2
    web_server:
      sorting_group_id: oq_temperatures

  - platform: dew_point
    id: cooling_room_5_dew_point_calc
    name: "Cooling Room 5 Dew Point (Calculated)"
    temperature: cooling_room_5_temp_ha
    humidity: cooling_room_5_humidity_ha
    icon: mdi:water-thermometer
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 2
    web_server:
      sorting_group_id: oq_temperatures

  - platform: dew_point
    id: cooling_room_6_dew_point_calc
    name: "Cooling Room 6 Dew Point (Calculated)"
    temperature: cooling_room_6_temp_ha
    humidity: cooling_room_6_humidity_ha
    icon: mdi:water-thermometer
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 2
    web_server:
      sorting_group_id: oq_temperatures

  - platform: template
    id: cooling_room_count_selected
    name: "Cooling Room Count (Selected)"
    icon: mdi:counter
    accuracy_decimals: 0
    update_interval: 10s
    lambda: |-
      // Clamp the HA helper to the supported 0..6 cooling-room range.
      if (!id(cooling_room_count_ha).has_state() || isnan(id(cooling_room_count_ha).state)) return 0.0f;
      int count = (int) lroundf(id(cooling_room_count_ha).state);
      if (count < 0) count = 0;
      if (count > 6) count = 6;
      return (float) count;
    web_server:
      sorting_group_id: oq_ha

  - platform: template
    id: cooling_safety_margin_selected
    name: "Cooling Safety Margin (Selected)"
    icon: mdi:shield-thermometer
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    update_interval: 10s
    lambda: |-
      // Keep a sane default even when HA has not provided the helper value yet.
      float margin_c = 2.0f;
      if (id(cooling_safety_margin_ha).has_state() && !isnan(id(cooling_safety_margin_ha).state)) {
        margin_c = id(cooling_safety_margin_ha).state;
      }
      if (margin_c < 0.0f) margin_c = 0.0f;
      if (margin_c > 4.0f) margin_c = 4.0f;
      return margin_c;
    web_server:
      sorting_group_id: oq_ha

  - platform: template
    id: cooling_room_1_dew_point_effective
    name: "Cooling Room 1 Dew Point (Effective)"
    icon: mdi:water-thermometer
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 10s
    lambda: |-
      // Prefer a direct dew point input; fall back to the local ESPHome calculation.
      if (id(cooling_room_1_dew_point_direct_ha).has_state() && !isnan(id(cooling_room_1_dew_point_direct_ha).state)) {
        return id(cooling_room_1_dew_point_direct_ha).state;
      }
      if (id(cooling_room_1_dew_point_calc).has_state() && !isnan(id(cooling_room_1_dew_point_calc).state)) {
        return id(cooling_room_1_dew_point_calc).state;
      }
      return NAN;
    web_server:
      sorting_group_id: oq_temperatures

  - platform: template
    id: cooling_room_2_dew_point_effective
    name: "Cooling Room 2 Dew Point (Effective)"
    icon: mdi:water-thermometer
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 10s
    lambda: |-
      // Prefer a direct dew point input; fall back to the local ESPHome calculation.
      if (id(cooling_room_2_dew_point_direct_ha).has_state() && !isnan(id(cooling_room_2_dew_point_direct_ha).state)) {
        return id(cooling_room_2_dew_point_direct_ha).state;
      }
      if (id(cooling_room_2_dew_point_calc).has_state() && !isnan(id(cooling_room_2_dew_point_calc).state)) {
        return id(cooling_room_2_dew_point_calc).state;
      }
      return NAN;
    web_server:
      sorting_group_id: oq_temperatures

