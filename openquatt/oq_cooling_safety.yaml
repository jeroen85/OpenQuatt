      return NAN;
    web_server:
      sorting_group_id: oq_temperatures

  - platform: template
    id: cooling_room_4_dew_point_effective
    name: "Cooling Room 4 Dew Point (Effective)"
    icon: mdi:water-thermometer
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 10s
    lambda: |-
      // Prefer a direct dew point input; fall back to the local ESPHome calculation.
      if (id(cooling_room_4_dew_point_direct_ha).has_state() && !isnan(id(cooling_room_4_dew_point_direct_ha).state)) {
