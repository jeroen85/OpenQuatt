  - platform: template
    id: cooling_valid_room_count
    name: "Cooling Valid Room Count"
    icon: mdi:counter
    accuracy_decimals: 0
    update_interval: 10s
    lambda: |-
      // Count how many configured cooling rooms currently provide a usable dew point.
      int configured_count = (int) lroundf(id(cooling_room_count_selected).state);
      if (configured_count < 0) configured_count = 0;
      if (configured_count > 6) configured_count = 6;

      int valid_count = 0;
      auto count_valid = [&](sensor::Sensor *candidate) {
        if (candidate != nullptr && candidate->has_state() && !isnan(candidate->state)) valid_count += 1;
      };

      if (configured_count >= 1) count_valid(id(cooling_room_1_dew_point_effective));
      if (configured_count >= 2) count_valid(id(cooling_room_2_dew_point_effective));
      if (configured_count >= 3) count_valid(id(cooling_room_3_dew_point_effective));
      if (configured_count >= 4) count_valid(id(cooling_room_4_dew_point_effective));
      if (configured_count >= 5) count_valid(id(cooling_room_5_dew_point_effective));
      if (configured_count >= 6) count_valid(id(cooling_room_6_dew_point_effective));
      return (float) valid_count;
    web_server:
      sorting_group_id: oq_ha

  - platform: template
    id: cooling_dew_point_selected
    name: "Cooling Dew Point (Selected)"
    icon: mdi:water-thermometer
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 10s
    lambda: |-
      // Use the highest valid dew point among the configured cooling rooms.
      int configured_count = (int) lroundf(id(cooling_room_count_selected).state);
      if (configured_count < 0) configured_count = 0;
      if (configured_count > 6) configured_count = 6;

      float selected_c = NAN;
      auto consider = [&](sensor::Sensor *candidate) {
        if (candidate == nullptr || !candidate->has_state() || isnan(candidate->state)) return;
        if (isnan(selected_c)) selected_c = candidate->state;
        else selected_c = fmaxf(selected_c, candidate->state);
      };

      if (configured_count >= 1) consider(id(cooling_room_1_dew_point_effective));
      if (configured_count >= 2) consider(id(cooling_room_2_dew_point_effective));
      if (configured_count >= 3) consider(id(cooling_room_3_dew_point_effective));
      if (configured_count >= 4) consider(id(cooling_room_4_dew_point_effective));
      if (configured_count >= 5) consider(id(cooling_room_5_dew_point_effective));
      if (configured_count >= 6) consider(id(cooling_room_6_dew_point_effective));
      return selected_c;
    web_server:
      sorting_group_id: oq_temperatures

  - platform: template
    id: minimum_safe_supply_temp
    name: "Cooling Minimum Safe Supply Temp"
    icon: mdi:shield-thermometer
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 10s
    lambda: |-
      // This is the central cooling guardrail: never target water below dew point + margin.
      if (!id(cooling_dew_point_selected).has_state() || isnan(id(cooling_dew_point_selected).state)) return NAN;
      if (!id(cooling_safety_margin_selected).has_state() || isnan(id(cooling_safety_margin_selected).state)) return NAN;
      return id(cooling_dew_point_selected).state + id(cooling_safety_margin_selected).state;
    web_server:
      sorting_group_id: oq_temperatures
