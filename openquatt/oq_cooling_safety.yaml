# ==============================================================================
# OpenQuatt - Passive Cooling Safety Inputs and Derived Signals
# ==============================================================================
#
# Goal:
#   Build the first cooling safety layer from HA-provided room dew point, temp,
#   and humidity inputs.
#
# Scope:
#   - Calculate per-room dew point with ESPHome 2026.3 `dew_point`
#   - Select the effective dew point per room (direct wins over calculated)
#   - Derive the global selected dew point, valid-room count, and minimum safe
#     supply temperature
#
# ==============================================================================

globals:
  - id: oq_cooling_request_latched
    type: bool
    restore_value: false
    initial_value: 'false'

number:
  - platform: template
    id: cooling_request_on_delta
    name: "Cooling Request On Delta"
    icon: mdi:thermometer-plus
    unit_of_measurement: "°C"
    min_value: 0.0
    max_value: 2.0
    step: 0.1
    mode: slider
    optimistic: true
    restore_value: true
    initial_value: 0.4
    entity_category: config
    web_server:
      sorting_group_id: oq_control

  - platform: template
    id: cooling_request_off_delta
    name: "Cooling Request Off Delta"
    icon: mdi:thermometer-minus
    unit_of_measurement: "°C"
    min_value: 0.0
    max_value: 2.0
    step: 0.1
    mode: slider
    optimistic: true
    restore_value: true
    initial_value: 0.1
    entity_category: config
    web_server:
      sorting_group_id: oq_control

binary_sensor:
  - platform: template
    id: cooling_permitted_core
    name: "Cooling Permitted Core"
    internal: true
    lambda: |-
      // Core cooling preconditions that are independent from the live flow interlock.
      const bool rooms_configured =
          id(cooling_room_count_selected).has_state() && !isnan(id(cooling_room_count_selected).state) &&
          id(cooling_room_count_selected).state >= 1.0f;
      const bool valid_rooms =
          id(cooling_valid_room_count).has_state() && !isnan(id(cooling_valid_room_count).state) &&
          id(cooling_valid_room_count).state >= 1.0f;
      const bool dew_point_ok =
          id(cooling_dew_point_available).state &&
          id(cooling_dew_point_selected).has_state() && !isnan(id(cooling_dew_point_selected).state) &&
          id(minimum_safe_supply_temp).has_state() && !isnan(id(minimum_safe_supply_temp).state);
      return rooms_configured && valid_rooms && dew_point_ok;

  - platform: template
    id: cooling_request_active
    name: "Cooling Request Active"
    icon: mdi:snowflake-thermometer
    device_class: running
    lambda: |-
      // Apply simple room-temperature hysteresis so CM5 does not chatter around setpoint.
      if (!id(room_temp_selected).has_state() || isnan(id(room_temp_selected).state)) {
        id(oq_cooling_request_latched) = false;
        return false;
      }
      if (!id(room_setpoint_selected).has_state() || isnan(id(room_setpoint_selected).state)) {
        id(oq_cooling_request_latched) = false;
        return false;
      }

      float on_delta_c = id(cooling_request_on_delta).state;
      float off_delta_c = id(cooling_request_off_delta).state;
      if (isnan(on_delta_c) || on_delta_c < 0.0f) on_delta_c = 0.4f;
      if (isnan(off_delta_c) || off_delta_c < 0.0f) off_delta_c = 0.1f;
      if (off_delta_c > on_delta_c) off_delta_c = on_delta_c;

      const float room_c = id(room_temp_selected).state;
      const float setpoint_c = id(room_setpoint_selected).state;
      if (!id(oq_cooling_request_latched) && room_c > (setpoint_c + on_delta_c)) {
        id(oq_cooling_request_latched) = true;
      } else if (id(oq_cooling_request_latched) && room_c < (setpoint_c + off_delta_c)) {
        id(oq_cooling_request_latched) = false;
      }
      return id(oq_cooling_request_latched);
    web_server:
      sorting_group_id: oq_cic

  - platform: template
    id: cooling_permitted
    name: "Cooling Permitted"
    icon: mdi:shield-check
    device_class: running
    lambda: |-
      // User-facing permission includes both the core cooling prerequisites and the live flow guard.
      const bool core_ok =
          id(cooling_permitted_core).has_state() && id(cooling_permitted_core).state;
      const bool flow_valid = id(flow_rate_selected).has_state() && !isnan(id(flow_rate_selected).state);
      const bool flow_ok = flow_valid && (id(flow_rate_selected).state >= (float) ${oq_cm_min_flow_lph});
      return core_ok && flow_ok && !id(oq_lowflow_fault_active);
    web_server:
      sorting_group_id: oq_cic

  - platform: template
    id: cooling_dew_point_available
    name: "Cooling Dew Point Available"
    icon: mdi:water-check
    device_class: connectivity
    lambda: |-
      return id(cooling_dew_point_selected).has_state() && !isnan(id(cooling_dew_point_selected).state);
    web_server:
      sorting_group_id: oq_cic

text_sensor:
  - platform: template
    id: cooling_block_reason
    name: "Cooling Block Reason"
    icon: mdi:information-outline
    entity_category: diagnostic
    update_interval: 5s
    lambda: |-
      // Report the first blocking condition in operator-friendly terms.
      if (!id(cooling_room_count_selected).has_state() || isnan(id(cooling_room_count_selected).state) ||
          id(cooling_room_count_selected).state < 1.0f) {
        return {"No cooling rooms configured"};
      }
      if (!id(cooling_valid_room_count).has_state() || isnan(id(cooling_valid_room_count).state) ||
          id(cooling_valid_room_count).state < 1.0f) {
        return {"No valid dew point input"};
      }
      if (!id(cooling_permitted_core).has_state() || !id(cooling_permitted_core).state) {
        return {"Safe supply floor unavailable"};
      }
      if (!id(flow_rate_selected).has_state() || isnan(id(flow_rate_selected).state)) {
        return {"Flow unavailable"};
      }
      if (id(oq_lowflow_fault_active) || id(flow_rate_selected).state < (float) ${oq_cm_min_flow_lph}) {
        return {"Flow too low"};
      }
      return {"Ready"};
    web_server:
      sorting_group_id: oq_cic

sensor:
  - platform: dew_point
    id: cooling_room_1_dew_point_calc
    name: "Cooling Room 1 Dew Point (Calculated)"
    temperature: cooling_room_1_temp_ha
    humidity: cooling_room_1_humidity_ha
    icon: mdi:water-thermometer
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 2
    web_server:
      sorting_group_id: oq_temperatures

  - platform: dew_point
    id: cooling_room_2_dew_point_calc
    name: "Cooling Room 2 Dew Point (Calculated)"
    temperature: cooling_room_2_temp_ha
    humidity: cooling_room_2_humidity_ha
    icon: mdi:water-thermometer
