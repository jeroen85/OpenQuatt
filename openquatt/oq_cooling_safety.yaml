    update_interval: 10s
    lambda: |-
      // Prefer a direct dew point input; fall back to the local ESPHome calculation.
      if (id(cooling_room_3_dew_point_direct_ha).has_state() && !isnan(id(cooling_room_3_dew_point_direct_ha).state)) {
        return id(cooling_room_3_dew_point_direct_ha).state;
