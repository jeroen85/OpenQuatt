# ==============================================================================
# OpenQuatt - Home Assistant Inputs (external proxy ingest)
# ==============================================================================
#
# Goal:
#   Ingest selected Home Assistant proxy sensors as numeric inputs for OpenQuatt.
#
# Scope:
#   - Fixed HA-backed temperature and thermostat proxy inputs
#   - HA heating/cooling enable proxy contracts
#   - Aggregate HA cooling proxy contract used for cooling safety
#
# Notes:
#   - Entity IDs are compile-time substitutions in oq_substitutions_common.yaml.
#   - These sensors are intended as stable HA proxy contracts.
#
# ==============================================================================

sensor:
  - platform: homeassistant
    id: outside_temp_ha
    name: "HA - Outside Temperature"
    entity_id: ${ha_outside_temp_entity_id}
    internal: false
    icon: mdi:thermometer
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 2
    web_server:
      sorting_group_id: oq_ha_inputs

  - platform: homeassistant
    id: water_supply_temp_ha
    name: "HA - Water Supply Temperature"
    entity_id: ${ha_water_supply_temp_entity_id}
    internal: false
    icon: mdi:water-thermometer
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 2
    web_server:
      sorting_group_id: oq_ha_inputs

  - platform: homeassistant
    id: thermostat_setpoint_ha
    name: "HA - Thermostat Setpoint"
    entity_id: ${ha_room_setpoint_entity_id}
    internal: false
    icon: mdi:thermostat
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 2
    web_server:
      sorting_group_id: oq_ha_inputs

  - platform: homeassistant
    id: thermostat_room_temp_ha
    name: "HA - Thermostat Room Temperature"
    entity_id: ${ha_room_temp_entity_id}
    internal: false
    icon: mdi:home-thermometer
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 2
    web_server:
      sorting_group_id: oq_ha_inputs

  - platform: homeassistant
    id: cooling_dew_point_ha
    name: "HA - Cooling Dew Point"
    entity_id: ${ha_cooling_dew_point_entity_id}
    internal: true
    icon: mdi:water-thermometer
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 2
    web_server:
      sorting_group_id: oq_ha_inputs

