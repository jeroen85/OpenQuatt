# ==============================================================================
# OpenQuatt - Flow Autotune (Hybrid Open-Loop Identification + Closed-Loop Validation)
# ==============================================================================
#
# Goal:
#   Automatically derives a PI proposal (Kp/Ki) for the flow controller
#   by identifying the plant with an open-loop step and then validating the
#   candidate gains with a short closed-loop setpoint step.
#
# Important:
#   - Flow control remains the owner of iPWM.
#   - This package only requests a temporary PWM override via:
#       * globals: oq_flow_autotune_active, oq_flow_autotune_pwm (added in flow_control)
#   - Autotune is only allowed in CM100 together with commissioning task FLOW_AUTOTUNE.
#
# Operation (high level):
#   1) Arm/Settle: force a fixed baseline PWM and wait for stable flow
#   2) Step A: decrease iPWM with a conservative adaptive step
#   3) Recover: return to baseline and let the loop settle again
#   4) Step B: repeat with a larger step so the estimate is not based on
#      a single amplitude only
#   5) Compute: combine both step responses into a conservative seed
#   6) Validate the seed with a short closed-loop setpoint step while the
#      normal PI loop is active.
#   7) Publish the suggested values; apply button writes them to oq_flow_kp/
#      oq_flow_ki.
#
# Defaults are conservative by design so the same logic can work across many
# different installations, not just one tuned hydraulic curve.
#
# ==============================================================================

# ----------------------------
# INTERNAL STATE
# ----------------------------
globals:
  - id: oq_flow_autotune_state
    type: int
    restore_value: false
    initial_value: '0'   # 0=IDLE,1=ARM,2=STEP1,3=RECOVER,4=STEP2,5=VALIDATE_RECOVER,6=VALIDATE,7=ABORT
  - id: oq_flow_autotune_req
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: oq_flow_autotune_abort
    type: bool
    restore_value: false
    initial_value: 'false'

# ----------------------------
# CONTROL INPUTS
# ----------------------------
button:
  - platform: template
    id: oq_flow_autotune_start
    name: "Flow Autotune Start"
    internal: true
    icon: mdi:play-circle-outline
    entity_category: config
    web_server:
      sorting_group_id: oq_tuning_flow
    on_press:
      - lambda: |-
          const auto cfg = oq_flow_autotune::make_runtime_config(
              ${oq_flow_ts},
              ${oq_flow_pwm_min}, ${oq_flow_pwm_max}, ${oq_flow_autotune_min_step},
              ${oq_flow_autotune_settle_s}, ${oq_flow_autotune_stable_band_lph},
              ${oq_flow_autotune_tau_fallback_s},
              ${oq_flow_kp_min}, ${oq_flow_kp_max}, ${oq_flow_ki_min}, ${oq_flow_ki_max});
          oq_flow_autotune::runtime().start(cfg, (uint32_t) millis());

  - platform: template
    id: oq_flow_autotune_abort_btn
    name: "Flow Autotune Abort"
    internal: true
    icon: mdi:stop-circle-outline
    entity_category: config
    web_server:
      sorting_group_id: oq_tuning_flow
    on_press:
      - lambda: |-
          id(oq_flow_autotune_abort) = true;

  - platform: template
    id: oq_flow_autotune_apply
    name: "Apply Flow Autotune Kp-Ki"
    internal: true
    icon: mdi:check-circle-outline
    entity_category: config
    web_server:
      sorting_group_id: oq_tuning_flow
    on_press:
      - lambda: |-
          // Read the suggested gains and apply them only when both are valid.
          const float kp = id(oq_flow_kp_suggested).state;
          const float ki = id(oq_flow_ki_suggested).state;
          if (!isnan(kp) && !isnan(ki) && kp > 0.0f && ki >= 0.0f) {
            auto ckp = id(oq_flow_kp).make_call();
            ckp.set_value(kp);
            ckp.perform();
            auto cki = id(oq_flow_ki).make_call();
            cki.set_value(ki);
            cki.perform();
            id(oq_flow_autotune_status).publish_state("APPLIED");
          } else {
            // Leave the live tuning untouched when the suggestion is invalid.
            id(oq_flow_autotune_status).publish_state("APPLY_FAILED");
          }

number:
  - platform: template
    id: oq_flow_kp_suggested
    name: "Flow Autotune Kp suggested"
    internal: true
    icon: mdi:alpha-k-circle-outline
    mode: slider
    min_value: ${oq_flow_kp_min}
    max_value: ${oq_flow_kp_max}
    step: 0.001
    restore_value: false
    optimistic: true
    initial_value: 0.03
    entity_category: diagnostic
    web_server:
      sorting_group_id: oq_tuning_flow

  - platform: template
    id: oq_flow_ki_suggested
    name: "Flow Autotune Ki suggested"
    internal: true
    icon: mdi:alpha-i-circle-outline
    mode: slider
    min_value: ${oq_flow_ki_min}
    max_value: ${oq_flow_ki_max}
    step: 0.0001
    restore_value: false
    optimistic: true
    initial_value: 0.0008
    entity_category: diagnostic
    web_server:
      sorting_group_id: oq_tuning_flow

text_sensor:
  - platform: template
    id: oq_flow_autotune_status
    name: "Flow Autotune status"
    internal: true
    icon: mdi:information-outline
    web_server:
      sorting_group_id: oq_tuning_flow
    update_interval: never

# ----------------------------
# MAIN LOOP
# ----------------------------
interval:
  - interval: ${oq_flow_ts}s
    then:
      - lambda: |-
          const auto cfg = oq_flow_autotune::make_runtime_config(
              ${oq_flow_ts},
              ${oq_flow_pwm_min}, ${oq_flow_pwm_max}, ${oq_flow_autotune_min_step},
              ${oq_flow_autotune_settle_s}, ${oq_flow_autotune_stable_band_lph},
              ${oq_flow_autotune_tau_fallback_s},
              ${oq_flow_kp_min}, ${oq_flow_kp_max}, ${oq_flow_ki_min}, ${oq_flow_ki_max});
          oq_flow_autotune::runtime().tick(cfg, (uint32_t) millis());
