# ==============================================================================
# OpenQuatt – Flow Control
# ==============================================================================
#
# Goal:
#   Regulates and monitors water flow; hydraulic safety takes priority over heat production.
#
# Role in architecture:
#   Owns non-CM0 pump iPWM behavior, runs PI control, and provides flow diagnostics.
#
# What this package DOES do:
#   - Uses measured/filtered flow (flow_rate_selected) for PI control
#   - Controls pump PWM to reach target flow
#   - Publishes flow status and mismatch diagnostics for supervisory/operations
#
# What this package DOES NOT do:
#   - Does not control compressor levels
#   - Does not determine Control Mode (supervisory does)
#   - Does not decide on boiler auxiliary heating
#
# Key assumptions:
#   - Flow sensor/flow_rate_selected is available and correctly scaled (L/h)
#   - Pump output is correctly configured for PWM
#
# Interaction with Control Modes:
#   - Active in CM1/CM2/CM3/CM100 (AUTO=PI, MANUAL=fixed iPWM)
#   - CM0: early return (supervisory owns pump state in idle)
#   - CM98: fixed frost PWM path
#
# Safety / fail-safe:
#   - Hydraulic safety: at insufficient flow, heat production must stop (via CM1)
#   - PI is tuned for stability to avoid oscillation
#
# ==============================================================================

# ----------------------------
# INTERNAL STATE (PI)
# ----------------------------
globals:
  - id: oq_flow_i
    type: float
    restore_value: false
    initial_value: '0.0'
  - id: oq_flow_last_pwm
    type: int
    restore_value: false
    initial_value: '850'
  - id: oq_flow_last_mode
    type: int
    restore_value: false
    initial_value: '0'   # 0=NON_FROST, 2=FROST
  - id: oq_flow_last_good_pwm
    type: int
    # persistent: learned_value - remembers the last stable AUTO seed across reboots.
    restore_value: true
    initial_value: "440"
  - id: oq_flow_commissioning_start_pwm
    type: int
    restore_value: false
    initial_value: '400'
  - id: oq_flow_control_mode_code
    type: int
    restore_value: false
    initial_value: '0'   # 0=AUTO, 1=MANUAL
  - id: oq_flow_autotune_active
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: oq_flow_autotune_pwm
    type: int
    restore_value: false
    initial_value: '850'

# ----------------------------
# TUNING INPUTS
# ----------------------------
number:
  - platform: template
    id: oq_flow_setpoint_lph
    name: "Flow Setpoint"
    icon: mdi:waves-arrow-right
    unit_of_measurement: "L/h"
    mode: slider
    web_server:
      sorting_group_id: oq_control
    min_value: 0
    max_value: 1500
    step: 10
    # persistent: user_setting - retains the selected flow target.
    restore_value: true
    optimistic: true
    initial_value: 800

  - platform: template
    id: oq_flow_manual_pwm
    name: "Manual iPWM"
    icon: mdi:fan
    unit_of_measurement: "iPWM"
    mode: slider
    min_value: 50
    max_value: 850
    step: 1
    initial_value: 400
    # persistent: user_setting - retains the manual iPWM override.
    restore_value: true
    optimistic: true
    web_server:
      sorting_group_id: oq_control

  - platform: template
    id: oq_flow_frost_pwm
    name: "Frost Circulation iPWM"
    disabled_by_default: true
    icon: mdi:snowflake
    unit_of_measurement: "iPWM"
    mode: slider
    web_server:
      sorting_group_id: oq_tuning_flow
    min_value: 50
    max_value: 850
    step: 10
    # persistent: user_setting - retains frost circulation tuning.
    restore_value: true
    optimistic: true
    initial_value: 800

  - platform: template
    id: oq_flow_auto_start_pwm
    name: "Flow AUTO start iPWM"
    disabled_by_default: true
    icon: mdi:rocket-launch-outline
    unit_of_measurement: "iPWM"
    mode: slider
    web_server:
      sorting_group_id: oq_tuning_flow
    min_value: 50
    max_value: 850
    step: 1
    # persistent: user_setting - retains the AUTO restart fallback seed.
    restore_value: true
    optimistic: true
    initial_value: 440
    entity_category: config

  - platform: template
    id: oq_flow_kp
    name: "Flow PI Kp"
    icon: mdi:alpha-k-circle-outline
    mode: slider
    web_server:
      sorting_group_id: oq_tuning_flow
    min_value: ${oq_flow_kp_min}
    max_value: ${oq_flow_kp_max}
    step: 0.001
    # persistent: user_setting - retains flow PI proportional tuning.
    restore_value: true
    optimistic: true
    # Default increased for more robust control in the current hydraulic setup.
    initial_value: 0.03

  - platform: template
    id: oq_flow_ki
    name: "Flow PI Ki"
    icon: mdi:alpha-i-circle-outline
    mode: slider
    web_server:
      sorting_group_id: oq_tuning_flow
    min_value: ${oq_flow_ki_min}
    max_value: ${oq_flow_ki_max}
    step: 0.0001
    # persistent: user_setting - retains flow PI integral tuning.
    restore_value: true
    optimistic: true
    initial_value: 0.0008

# ----------------------------
# CONFIG: Flow Control Mode
#   - Flow Setpoint : PI controls flow to oq_flow_setpoint_lph
#   - Manual PWM    : fixed iPWM from oq_flow_manual_pwm (no PI)
# ----------------------------
select:
  - platform: template
    id: oq_flow_control_mode
    name: "Flow Control Mode"
    icon: mdi:tune-variant
    options:
      - Flow Setpoint
      - Manual PWM
    initial_option: Flow Setpoint
    # persistent: user_setting - retains the chosen flow operating mode.
    restore_value: true
    optimistic: true
    web_server:
      sorting_group_id: oq_control

# ----------------------------
# SENSORS
# ----------------------------
sensor:
  # Average flow HP1/HP2
  - platform: template
    id: flow_rate_hp_avg
    name: "Flow average (local)"
    icon: mdi:waves
    unit_of_measurement: "L/h"
    device_class: volume_flow_rate
    state_class: measurement
    web_server:
      sorting_group_id: oq_hydraulics
    accuracy_decimals: 0
    update_interval: 1s
    lambda: |-
      const bool secondary_enabled = (${flow_secondary_enabled} != 0);
      float f1 = id(hp1_flow).state;
      float f2 = secondary_enabled ? id(${flow_secondary_flow_sensor_id}).state : NAN;

      const bool v1 = !isnan(f1);
      const bool v2 = !isnan(f2);

      if (!secondary_enabled) {
        if (v1) return f1;
        return NAN;
      }

      const float thr = ${oq_flow_mismatch_threshold_lph};

      if (v1 && v2) {
        const float diff = fabsf(f1 - f2);

        // In series, f1 and f2 should be (almost) equal.
        // If they diverge significantly, treat it as a measurement/comms issue and choose a plausible value.
        if (diff > thr) {
          // Heuristic: a sensor stuck at 0 is more common than one reading too high.
          // Therefore use the larger value to avoid underestimation and unnecessary PI overreaction.
          return fmaxf(f1, f2);
        }

        // Normal case: averaging is fine (noise reduction)
        return (f1 + f2) / 2.0f;
      }

      // If one sensor is NaN (comms issue), use the other.
      if (v1) return f1;
      if (v2) return f2;

      // Only when both are NaN: no valid flow.
      return NAN;

binary_sensor:
  - platform: template
    id: oq_flow_mismatch
    name: "Flow mismatch (HP1 vs HP2)"
    internal: ${flow_mismatch_internal}
    icon: mdi:alert-circle-outline
    device_class: problem
    entity_category: diagnostic
    web_server:
      sorting_group_id: oq_hydraulics
    lambda: |-
      static bool state = false;
      static bool mismatch_timer_running = false;
      static uint32_t mismatch_start_ms = 0;

      const bool secondary_enabled = (${flow_secondary_enabled} != 0);
      if (!secondary_enabled) {
        state = false;
        mismatch_timer_running = false;
        mismatch_start_ms = 0;
        return false;
      }

      float f1 = id(hp1_flow).state;
      float f2 = id(${flow_secondary_flow_sensor_id}).state;

      // Evaluate only when both are valid; otherwise reset indication.
      if (isnan(f1) || isnan(f2)) {
        state = false;
        mismatch_timer_running = false;
        return false;
      }

      const float diff = fabsf(f1 - f2);

      const float thr = ${oq_flow_mismatch_threshold_lph};

      const float h = ${oq_flow_mismatch_hyst_lph};
      const float on_thr  = thr;
      const float off_thr = fmaxf(0.0f, thr - h);
      const uint32_t now = millis();
      const uint32_t hold_ms = 30000;

      if (!state) {
        if (diff > on_thr) {
          if (!mismatch_timer_running) {
            mismatch_timer_running = true;
            mismatch_start_ms = now;
          }
          if ((uint32_t)(now - mismatch_start_ms) >= hold_ms) {
            state = true;
            mismatch_timer_running = false;
          }
        } else {
          mismatch_timer_running = false;
        }
      } else {
        if (diff < off_thr) state = false;
      }
      return state;

# ----------------------------
# STATUS (CM0/CM98/AUTO/MANUAL)
# ----------------------------
text_sensor:
  - platform: template
    id: oq_flow_mode
    name: "Flow Mode"
    icon: mdi:state-machine
    web_server:
      sorting_group_id: oq_hydraulics

# ----------------------------
# MAIN LOOP (5s): PI + mode handling
# ----------------------------
interval:
  - interval: ${oq_flow_loop_s}s
    startup_delay: 3200ms
    then:
      - lambda: |-
          // ============================================================================
          // FLOW CONTROL EXECUTION MODEL
          //
          // Ownership:
          // - Supervisory owns pump enable mode (On/Off) and CM selection.
          // - This loop owns pump iPWM for all non-CM0 modes.
          //
          // Priority (highest -> lowest):
          // 1) CM0 early return (no writes from this loop)
          // 2) AUTOTUNE override (CM100 commissioning task only)
          // 3) CM98 frost fixed iPWM
          // 4) MANUAL fixed iPWM
          // 5) AUTO PI path (with startup-hold + failsafe)
          //
          // iPWM semantics:
          // - 50..850 = pump running (lower means harder)
          // - 1000 is reserved for CM0 stop policy in supervisory
          // ============================================================================
          const float dt = ${oq_flow_loop_s};   // seconds per tick
          static std::string last_mode = "";

          static bool was_cm0 = true;

          // One central hold time for all start transitions.
          // During this window we keep start iPWM fixed to let hydraulics settle.
          constexpr int STARTUP_HOLD_S = 20;     // seconds
          const int STARTUP_HOLD_TICKS = (STARTUP_HOLD_S <= 0) ? 0 : (int) roundf((float)STARTUP_HOLD_S / dt);
          // Note: with interval tick dt, startup_hold counts ticks of "AUTO(starting)".

          static int  startup_hold = 0;         // number of ticks in "AUTO(starting)"
          static int  stable_cnt = 0;           // stability counter for last_good_pwm
          static bool pi_failsafe = false;       // latched per tick

          // Setpoint ramp + PI memory state
          static float sp_f = NAN;
          static float last_pi_e = 0.0f;

          // --- helpers ---
          auto write_pump_pwm_if_changed = [](auto *num, int value) {
            if (num == nullptr) return;
            const float cur = num->state;
            if (isnan(cur) || fabsf(cur - value) > 1.0f) {
              auto c = num->make_call();
              c.set_value(value);
              c.perform();
            }
          };
          auto current_auto_state = [&]() -> oq_flow_control::AutoPiState {
            return oq_flow_control::AutoPiState{
              id(oq_flow_i),
              sp_f,
              last_pi_e,
              startup_hold,
              stable_cnt,
            };
          };
          auto apply_auto_state = [&](const oq_flow_control::AutoPiState &state) {
            id(oq_flow_i) = state.integral;
            sp_f = state.setpoint_filtered;
            last_pi_e = state.last_error;
            startup_hold = state.startup_hold;
            stable_cnt = state.stable_count;
          };
          const oq_flow_control::AutoPiConfig auto_pi_cfg{
            dt,
            50,
            850,
            850,
            25.0f,
            15.0f,
            10.0f,
            60.0f,
            0.25f,
            0.60f,
            0.35f,
            -4000.0f,
            4000.0f,
            12.0f,
            8.0f,
            15.0f,
            (int) roundf(60.0f / dt),
            10,
          };

          const int cm_code = id(oq_control_mode_code);
          const int commissioning_task_code = id(oq_commissioning_task_code);

          // Common AUTO-entry init used for CM0->* and MANUAL->AUTO edges.
          auto start_auto_transition = [&](const char *tag) {
            const auto start_plan = oq_flow_control::compute_auto_start_plan(
              cm_code,
              commissioning_task_code,
              id(oq_flow_commissioning_start_pwm),
              (int) id(oq_flow_last_good_pwm),
              (int) roundf(id(oq_flow_auto_start_pwm).state));
            ESP_LOGI("flow", "AUTO start(%s): iPWM=%d (last_good=%d fallback=%d commissioning=%s hold %ds, fixed iPWM)",
                     tag,
                     start_plan.start_pwm,
                     (int) id(oq_flow_last_good_pwm),
                     start_plan.fallback_pwm,
                     start_plan.commissioning_start ? "yes" : "no",
                     STARTUP_HOLD_S);

            id(oq_flow_last_pwm) = start_plan.start_pwm;
            apply_auto_state(
              oq_flow_control::enter_auto_transition(STARTUP_HOLD_TICKS));
          };
          auto run_auto_pi = [&](int pwm_seed) -> int {
            const auto pi_result = oq_flow_control::step_auto_pi(
              current_auto_state(),
              oq_flow_control::AutoPiInput{
                pwm_seed,
                id(oq_flow_setpoint_lph).state,
                id(flow_rate_selected).state,
                id(oq_flow_kp).state,
                id(oq_flow_ki).state,
                (int) id(oq_flow_last_good_pwm),
              },
              auto_pi_cfg);

            pi_failsafe = pi_result.failsafe;
            apply_auto_state(pi_result.state);
            id(oq_flow_last_good_pwm) = pi_result.last_good_pwm;

            if (pi_result.failsafe) {
              ESP_LOGW("flow", "Flow PI failsafe engaged: sp=%0.1f pv=%0.1f -> forcing iPWM=%d",
                       id(oq_flow_setpoint_lph).state,
                       id(flow_rate_selected).state,
                       pi_result.pwm);
              return pi_result.pwm;
            }
            return pi_result.pwm;
          };

          const bool is_cm0 = (cm_code == 0);

          // Flow submode select (within CM1/CM2/CM3): AUTO vs MANUAL PWM
          const int flow_mode_code = (id(oq_flow_control_mode).active_index().value_or(0) == 1) ? 1 : 0;
          id(oq_flow_control_mode_code) = flow_mode_code;
          const bool want_manual = (flow_mode_code == 1);
          static bool was_manual = false;
          const auto route = oq_flow_control::select_route(
            cm_code,
            want_manual,
            id(oq_flow_autotune_active),
            commissioning_task_code);

          // Edge 1: entering active control from CM0
          if (was_cm0 && !is_cm0) {
            start_auto_transition("CM0->*");
          }
          was_cm0 = is_cm0;

          if (route.early_return) {
            // Keep manual-edge memory synchronized while idle.
            was_manual = want_manual;
            id(oq_flow_mode).publish_state(route.mode_text);
            return;
          }

          if (route.runtime_mode_state_code != id(oq_flow_last_mode)) {
            apply_auto_state(
              oq_flow_control::reset_pi_tracking_keep_hold(current_auto_state()));
          }
          id(oq_flow_last_mode) = route.runtime_mode_state_code;

          // Autotune temporarily overrides PWM (flow_control remains output owner).
          if (route.route_kind == oq_flow_control::ROUTE_AUTOTUNE) {
            int at_pwm = oq_flow_control::clamp_ipwm((int) id(oq_flow_autotune_pwm));
            id(oq_flow_last_pwm) = at_pwm;
            stable_cnt = 0;
            pi_failsafe = false;
            write_pump_pwm_if_changed(id(hp1_pump_speed), at_pwm);
            if (${flow_secondary_enabled} != 0) {
              write_pump_pwm_if_changed(id(${flow_secondary_pump_speed_id}), at_pwm);
            }
            if (last_mode != route.mode_text) {
              id(oq_flow_mode).publish_state(route.mode_text);
              last_mode = route.mode_text;
            }
            return;
          }

          // Edge 2: leaving MANUAL to AUTO
          if (was_manual && !want_manual) {
            start_auto_transition("MANUAL->AUTO");
          }
          was_manual = want_manual;

          int pwm = oq_flow_control::clamp_ipwm((int) id(oq_flow_last_pwm));
          oq_flow_control::ExecMode exec_mode = oq_flow_control::EXEC_MODE_AUTO;

          // Fixed-output modes first, AUTO PI as fallback.
          if (route.route_kind == oq_flow_control::ROUTE_MANUAL) {
            pwm = (int) roundf(id(oq_flow_manual_pwm).state);
            pwm = oq_flow_control::clamp_ipwm(pwm);
            stable_cnt = 0;
            pi_failsafe = false;
            sp_f = NAN;
            last_pi_e = 0.0f;
            exec_mode = oq_flow_control::finalize_exec_mode(route, false, startup_hold);
          } else if (route.route_kind == oq_flow_control::ROUTE_FROST) {
            pwm = (int) roundf(id(oq_flow_frost_pwm).state);
            pwm = oq_flow_control::clamp_ipwm(pwm);
            stable_cnt = 0;
            pi_failsafe = false;
            last_pi_e = 0.0f;
            exec_mode = oq_flow_control::finalize_exec_mode(route, false, startup_hold);
          } else {
            pwm = run_auto_pi(pwm);
            exec_mode = oq_flow_control::finalize_exec_mode(route, pi_failsafe, startup_hold);
          }

          pwm = oq_flow_control::clamp_ipwm(pwm);
          id(oq_flow_last_pwm) = pwm;

          write_pump_pwm_if_changed(id(hp1_pump_speed), pwm);
          if (${flow_secondary_enabled} != 0) {
            write_pump_pwm_if_changed(id(${flow_secondary_pump_speed_id}), pwm);
          }

          // External mode text has explicit priority and updates only on change.
          const std::string mode_txt = oq_flow_control::exec_mode_text(exec_mode);
          if (mode_txt != last_mode) {
            id(oq_flow_mode).publish_state(mode_txt.c_str());
            ESP_LOGI("flow", "Flow mode changed: %s (cm=%s manual=%d failsafe=%d hold=%d pwm=%d)",
                     mode_txt.c_str(), id(oq_control_mode).state.c_str(), (int)want_manual, (int)pi_failsafe, startup_hold, pwm);
            last_mode = mode_txt;
          }
