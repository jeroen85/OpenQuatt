# ==============================================================================
# OpenQuatt – Flow Control
# ==============================================================================
#
# Goal:
#   Regulates and monitors water flow; hydraulic safety takes priority over heat production.
#
# Role in architecture:
#   Owns non-CM0 pump iPWM behavior, runs PI control, and provides flow diagnostics.
#
# What this package DOES do:
#   - Uses measured/filtered flow (flow_rate_selected) for PI control
#   - Controls pump PWM to reach target flow
#   - Publishes flow status and mismatch diagnostics for supervisory/operations
#
# What this package DOES NOT do:
#   - Does not control compressor levels
#   - Does not determine Control Mode (supervisory does)
#   - Does not decide on boiler auxiliary heating
#
# Key assumptions:
#   - Flow sensor/flow_rate_selected is available and correctly scaled (L/h)
#   - Pump output is correctly configured for PWM
#
# Interaction with Control Modes:
#   - Active in CM1/CM2/CM3/CM5/CM100 (AUTO=PI, MANUAL=fixed iPWM)
#   - CM0: early return (supervisory owns pump state in idle)
#   - CM98: fixed frost PWM path
#
# Safety / fail-safe:
#   - Hydraulic safety: at insufficient flow, heat production must stop (via CM1)
#   - PI is tuned for stability to avoid oscillation
#
# ==============================================================================

# ----------------------------
# INTERNAL STATE (PI)
# ----------------------------
globals:
  - id: oq_flow_i
    type: float
    restore_value: false
    initial_value: '0.0'
  - id: oq_flow_last_pwm
    type: int
    restore_value: false
    initial_value: '850'
  - id: oq_flow_last_mode
    type: int
    restore_value: false
    initial_value: '0'   # 0=AUTO, 1=MANUAL, 2=FROST
  - id: oq_flow_last_good_pwm
    type: int
    restore_value: true
    initial_value: "440"
  - id: oq_flow_last_good_pwm_cooling
    type: int
    restore_value: true
    initial_value: "440"
  - id: oq_flow_cooling_settings_migrated
    type: bool
    restore_value: true
    initial_value: 'false'
  - id: oq_flow_commissioning_start_pwm
    type: int
    restore_value: false
    initial_value: '400'
  - id: oq_flow_control_mode_code
    type: int
    restore_value: false
    initial_value: '0'   # 0=AUTO, 1=MANUAL
  - id: oq_flow_autotune_active
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: oq_flow_autotune_pwm
    type: int
    restore_value: false
    initial_value: '850'

# ----------------------------
# TUNING INPUTS
# ----------------------------
number:
  - platform: template
    id: oq_flow_setpoint_lph
    name: "Flow Setpoint"
    icon: mdi:waves-arrow-right
    unit_of_measurement: "L/h"
    mode: slider
    web_server:
      sorting_group_id: oq_control
    min_value: 0
    max_value: 1500
    step: 10
    restore_value: true
    optimistic: true
    initial_value: 800

  - platform: template
    id: oq_cooling_flow_setpoint_lph
    name: "Cooling Flow Setpoint"
    icon: mdi:snowflake-thermometer
    unit_of_measurement: "L/h"
    mode: slider
    web_server:
      sorting_group_id: oq_control
    min_value: 0
    max_value: 1500
    step: 10
    restore_value: true
    optimistic: true
    initial_value: 800

  - platform: template
    id: oq_flow_manual_pwm
    name: "Manual iPWM"
    icon: mdi:fan
    unit_of_measurement: "iPWM"
    mode: slider
    min_value: 50
    max_value: 850
    step: 1
    initial_value: 400
    restore_value: true
    optimistic: true
    web_server:
      sorting_group_id: oq_control

  - platform: template
    id: oq_flow_frost_pwm
    name: "Frost Circulation iPWM"
    disabled_by_default: true
    icon: mdi:snowflake
    unit_of_measurement: "iPWM"
    mode: slider
    web_server:
      sorting_group_id: oq_tuning_flow
    min_value: 50
    max_value: 850
    step: 10
    restore_value: true
    optimistic: true
    initial_value: 800

  - platform: template
    id: oq_flow_auto_start_pwm
    name: "Flow AUTO start iPWM"
    disabled_by_default: true
    icon: mdi:rocket-launch-outline
    unit_of_measurement: "iPWM"
    mode: slider
    web_server:
      sorting_group_id: oq_tuning_flow
    min_value: 50
    max_value: 850
    step: 1
    restore_value: true
    optimistic: true
    initial_value: 440
    entity_category: config

  - platform: template
    id: oq_flow_kp
    name: "Flow PI Kp"
    icon: mdi:alpha-k-circle-outline
    mode: slider
    web_server:
      sorting_group_id: oq_tuning_flow
    min_value: ${oq_flow_kp_min}
    max_value: ${oq_flow_kp_max}
    step: 0.001
    restore_value: true
    optimistic: true
    # Default increased for more robust control in the current hydraulic setup.
    initial_value: 0.03

  - platform: template
    id: oq_flow_ki
    name: "Flow PI Ki"
    icon: mdi:alpha-i-circle-outline
    mode: slider
    web_server:
      sorting_group_id: oq_tuning_flow
    min_value: ${oq_flow_ki_min}
    max_value: ${oq_flow_ki_max}
    step: 0.0001
    restore_value: true
    optimistic: true
    initial_value: 0.0008

# ----------------------------
# CONFIG: Flow Control Mode
#   - Flow Setpoint : PI controls flow to oq_flow_setpoint_lph
#   - Manual PWM    : fixed iPWM from oq_flow_manual_pwm (no PI)
# ----------------------------
select:
  - platform: template
    id: oq_flow_control_mode
    name: "Flow Control Mode"
    icon: mdi:tune-variant
    options:
      - Flow Setpoint
      - Manual PWM
    initial_option: Flow Setpoint
    restore_value: true
    optimistic: true
    web_server:
      sorting_group_id: oq_control

# ----------------------------
# SENSORS
# ----------------------------
sensor:
  # Average flow HP1/HP2
  - platform: template
    id: flow_rate_hp_avg
    name: "Flow average (local)"
    icon: mdi:waves
    unit_of_measurement: "L/h"
    device_class: volume_flow_rate
    state_class: measurement
    web_server:
      sorting_group_id: oq_hydraulics
    accuracy_decimals: 0
    update_interval: 1s
    lambda: |-
      const bool secondary_enabled = (${flow_secondary_enabled} != 0);
      float f1 = id(hp1_flow).state;
      float f2 = secondary_enabled ? id(${secondary_flow_id}).state : NAN;

      #if OQ_HARDWARE_HEATPUMP_CONTROLLER_Q
      // Q-edition V1 uses the central controller meter as its primary local flow.
      // In a mixed V1/V1.5 Duo, keep aggregating the secondary outdoor-unit meter.
      if (id(hp_generation).has_state() && id(hp_generation).current_option() == "V1") {
        f1 = id(${oq_controller_flow_sensor_id}).has_state() ? id(${oq_controller_flow_sensor_id}).state : NAN;
      }
      #endif

      const bool v1 = !isnan(f1);
      const bool v2 = !isnan(f2);

      if (!secondary_enabled) {
        if (v1) return f1;
        return NAN;
      }

      const float thr = ${oq_flow_mismatch_threshold_lph};

      if (v1 && v2) {
        const float diff = fabsf(f1 - f2);

        // In series, f1 and f2 should be (almost) equal.
        // If they diverge significantly, treat it as a measurement/comms issue and choose a plausible value.
        if (diff > thr) {
          // Heuristic: a sensor stuck at 0 is more common than one reading too high.
          // Therefore use the larger value to avoid underestimation and unnecessary PI overreaction.
          return fmaxf(f1, f2);
        }

        // Normal case: averaging is fine (noise reduction)
        return (f1 + f2) / 2.0f;
      }

      // If one sensor is NaN (comms issue), use the other.
      if (v1) return f1;
      if (v2) return f2;

      // Only when both are NaN: no valid flow.
      return NAN;

binary_sensor:
  - platform: template
    id: oq_flow_mismatch
    name: "Flow mismatch (HP1 vs HP2)"
    internal: ${flow_mismatch_internal}
    icon: mdi:alert-circle-outline
    device_class: problem
    entity_category: diagnostic
    web_server:
      sorting_group_id: oq_hydraulics
    lambda: |-
      static bool state = false;
      static bool mismatch_timer_running = false;
      static uint32_t mismatch_start_ms = 0;

      const bool secondary_enabled = (${flow_secondary_enabled} != 0);
      if (!secondary_enabled) {
        state = false;
        mismatch_timer_running = false;
        mismatch_start_ms = 0;
        return false;
      }

      float f1 = id(hp1_flow).state;
      float f2 = id(${secondary_flow_id}).state;

      #if OQ_HARDWARE_HEATPUMP_CONTROLLER_Q
      // Compare the Q-edition V1 controller meter with a secondary V1.5 meter when present.
      if (id(hp_generation).has_state() && id(hp_generation).current_option() == "V1") {
        f1 = id(${oq_controller_flow_sensor_id}).has_state() ? id(${oq_controller_flow_sensor_id}).state : NAN;
      }
      #endif

      // Evaluate only when both are valid; otherwise reset indication.
      if (isnan(f1) || isnan(f2)) {
        state = false;
        mismatch_timer_running = false;
        return false;
      }

      const float diff = fabsf(f1 - f2);

      const float thr = ${oq_flow_mismatch_threshold_lph};

      const float h = ${oq_flow_mismatch_hyst_lph};
      const float on_thr  = thr;
      const float off_thr = fmaxf(0.0f, thr - h);
      const uint32_t now = millis();
      const uint32_t hold_ms = 30000;

      if (!state) {
        if (diff > on_thr) {
          if (!mismatch_timer_running) {
            mismatch_timer_running = true;
            mismatch_start_ms = now;
          }
          if ((uint32_t)(now - mismatch_start_ms) >= hold_ms) {
            state = true;
            mismatch_timer_running = false;
          }
        } else {
          mismatch_timer_running = false;
        }
      } else {
        if (diff < off_thr) state = false;
      }
      return state;

# ----------------------------
# STATUS (CM0/CM98/AUTO/MANUAL)
# ----------------------------
text_sensor:
  - platform: template
    id: oq_flow_mode
    name: "Flow Mode"
    icon: mdi:state-machine
    web_server:
      sorting_group_id: oq_hydraulics

# ----------------------------
# MAIN LOOP (5s): PI + mode handling
# ----------------------------
interval:
  - interval: ${oq_flow_loop_s}s
    startup_delay: 3200ms
    then:
      - lambda: |-
          // ============================================================================
          // FLOW CONTROL EXECUTION MODEL
          //
          // Ownership:
          // - Supervisory owns pump enable mode (On/Off) and CM selection.
          // - This loop owns pump iPWM for all non-CM0 modes.
          //
          // Priority (highest -> lowest):
          // 1) CM0 early return (no writes from this loop)
          // 2) AUTOTUNE override (CM100 commissioning task only)
          // 3) MANUAL / FROST fixed iPWM
          // 4) AUTO PI path (with startup-hold + failsafe)
          //
          // iPWM semantics:
          // - 50..850 = pump running (lower means harder)
          // - 1000 is reserved for CM0 stop policy in supervisory
          // ============================================================================
          const float dt = ${oq_flow_loop_s};   // seconds per tick
          static std::string last_mode = "";

          static bool was_flow_idle = true;
          static int last_cm_code = 0;
          static int last_commissioning_task_code = oq_commissioning::TASK_NONE;
          static bool last_auto_target_is_cooling = false;

          // One central hold time for all start transitions.
          // During this window we keep start iPWM fixed to let hydraulics settle.
          constexpr int STARTUP_HOLD_S = 20;     // seconds
          const int STARTUP_HOLD_TICKS = (STARTUP_HOLD_S <= 0) ? 0 : (int) roundf((float)STARTUP_HOLD_S / dt);
          // Note: with interval tick dt, startup_hold counts ticks of "AUTO(starting)".

          static int  startup_hold = 0;         // number of ticks in "AUTO(starting)"
          static int  stable_cnt = 0;           // stability counter for last_good_pwm
          static bool pi_failsafe = false;       // latched per tick

          // Setpoint ramp + PI memory state
          static float sp_f = NAN;
          static float last_pi_e = 0.0f;

          // Explicit execution mode keeps the control flow readable and makes
          // status publishing deterministic.
          enum FlowExecMode {
            FLOW_MODE_CM0 = 0,
            FLOW_MODE_AUTOTUNE = 1,
            FLOW_MODE_MANUAL = 2,
            FLOW_MODE_FROST = 3,
            FLOW_MODE_AUTO_STARTING = 4,
            FLOW_MODE_AUTO = 5,
            FLOW_MODE_AUTO_FAILSAFE = 6
          };

          // --- helpers ---
          auto clamp_iPWM = [](int value) -> int {
            constexpr int kMinIpwm = 50;
            constexpr int kMaxIpwm = 850;
            if (value < kMinIpwm) return kMinIpwm;
            if (value > kMaxIpwm) return kMaxIpwm;
            return value;
          };
          auto write_pump_pwm_if_changed = [](auto *num, int value) {
            if (num == nullptr) return;
            const float cur = num->state;
            if (isnan(cur) || fabsf(cur - value) > 1.0f) {
              auto c = num->make_call();
              c.set_value(value);
              c.perform();
            }
          };
          if (!id(oq_flow_cooling_settings_migrated) && !isnan(id(oq_flow_setpoint_lph).state)) {
            const float current_flow_setpoint = id(oq_flow_setpoint_lph).state;
            if (!isnan(current_flow_setpoint)) {
              auto c = id(oq_cooling_flow_setpoint_lph).make_call();
              c.set_value(current_flow_setpoint);
              c.perform();
            }
            id(oq_flow_last_good_pwm_cooling) = id(oq_flow_last_good_pwm);
            id(oq_flow_cooling_settings_migrated) = true;
            ESP_LOGI(
                "flow",
                "Initialized cooling flow settings from current flow setpoint: sp=%.0f L/h last_good=%d",
                current_flow_setpoint,
                id(oq_flow_last_good_pwm_cooling));
          }
          // Common AUTO-entry init used for CM0->* and MANUAL->AUTO edges.
          auto start_auto_transition = [&](const char *tag) {
            int fallback = (int) roundf(id(oq_flow_auto_start_pwm).state);
            fallback = clamp_iPWM(fallback);

            const int cm_code = id(oq_control_mode_code);
            const bool cooling_target = (cm_code == 5);
            const bool commissioning_start = (cm_code == 100) && (id(oq_commissioning_task_code) != oq_commissioning::TASK_NONE);
            const int last_good_pwm =
              cooling_target ? id(oq_flow_last_good_pwm_cooling) : id(oq_flow_last_good_pwm);
            int start_pwm = commissioning_start
              ? clamp_iPWM(id(oq_flow_commissioning_start_pwm))
              : last_good_pwm;
            if (!commissioning_start && (start_pwm < 50 || start_pwm > 850)) start_pwm = fallback;

            ESP_LOGI("flow", "AUTO start(%s): iPWM=%d (last_good=%d bank=%s fallback=%d commissioning=%s hold %ds, fixed iPWM)",
                     tag, start_pwm, last_good_pwm, cooling_target ? "cooling" : "normal",
                     fallback, commissioning_start ? "yes" : "no", STARTUP_HOLD_S);

            id(oq_flow_last_pwm) = start_pwm;
            id(oq_flow_i) = 0.0f;
            startup_hold = STARTUP_HOLD_TICKS;
            sp_f = NAN;
            last_pi_e = 0.0f;
            stable_cnt = 0;
          };
          // AUTO PI path only: setpoint ramp, PI, startup-hold, and last_good tracking.
          auto run_auto_pi = [&](int pwm_seed) -> int {
            int pwm_local = pwm_seed;
            const bool cooling_target =
                (id(oq_control_mode_code) == 5) ||
                (oq_manual_hp::owns_control() &&
                 (id(oq_manual_hp1_mode_code) == 1 ||
                  id(oq_manual_hp2_mode_code) == 1));
            const bool manual_flow_owns_pi =
              id(oq_manual_flow_active) &&
              (id(oq_control_mode_code) == 100) &&
              (id(oq_commissioning_task_code) == oq_commissioning::TASK_MANUAL_FLOW);
            float sp_target = manual_flow_owns_pi
              ? id(oq_manual_flow_setpoint_lph).state
              : (cooling_target
                  ? id(oq_cooling_flow_setpoint_lph).state
                  : id(oq_flow_setpoint_lph).state);
            float pv = id(flow_rate_selected).state;

            // Treat 0 L/h as a valid measurement (no-flow state), not as sensor failure.
            // This prevents an AUTO(start) deadlock where PI would stay in failsafe and never build flow.
            const bool flow_signal_valid = !isnan(pv);
            pi_failsafe = (isnan(sp_target) || sp_target <= 0.0f || !flow_signal_valid);

            if (pi_failsafe) {
              constexpr int kFailsafeIpwm = 850;
              pwm_local = kFailsafeIpwm;
              ESP_LOGW("flow", "Flow PI failsafe engaged: sp=%0.1f pv=%0.1f -> forcing iPWM=%d", sp_target, pv, kFailsafeIpwm);
              id(oq_flow_i) = 0.0f;
              last_pi_e = 0.0f;
              stable_cnt = 0;
              sp_f = NAN;
              return pwm_local;
            }

            const bool in_startup_hold = (startup_hold > 0);
            if (in_startup_hold) {
              // True startup settle: keep iPWM fixed for a short hydraulic delay window.
              // Keep SP filter aligned to PV so PI starts without a large instantaneous kick.
              sp_f = pv;
              startup_hold--;
              stable_cnt = 0;
              return clamp_iPWM(pwm_local);
            }

            const float sp_ramp_up = 25.0f;   // L/h per second up
            const float sp_ramp_dn = 15.0f;   // L/h per second down
            if (isnan(sp_f)) sp_f = flow_signal_valid ? pv : sp_target;

            float d = sp_target - sp_f;
            float max_step = ((d >= 0.0f) ? sp_ramp_up : sp_ramp_dn) * dt;
            if (d >  max_step) d =  max_step;
            if (d < -max_step) d = -max_step;
            sp_f += d;

            float e = sp_f - pv;  // positive => more flow needed

            constexpr float deadband_lph = 10.0f;
            if (fabsf(e) < deadband_lph) e = 0.0f;

            const float kp = id(oq_flow_kp).state;
            const float ki = id(oq_flow_ki).state;

            // Anti-windup:
            // - keep I inactive during large setpoint / plant transients
            // - quickly bleed stored I when we cross the setpoint
            // - slowly unwind I inside the deadband so it cannot keep pushing past target
            constexpr float i_active_band_lph = 60.0f;
            constexpr float i_cross_keep = 0.25f;
            constexpr float i_deadband_keep = 0.60f;
            constexpr float i_large_err_keep = 0.35f;
            const bool have_e = (e > 0.0f) || (e < 0.0f);
            const bool have_last_e = (last_pi_e > 0.0f) || (last_pi_e < 0.0f);
            const bool sign_flip = have_e && have_last_e && ((e > 0.0f) != (last_pi_e > 0.0f));

            if (sign_flip) {
              id(oq_flow_i) *= i_cross_keep;
            }

            if (!have_e) {
              id(oq_flow_i) *= i_deadband_keep;
            } else if (fabsf(e) <= i_active_band_lph) {
              id(oq_flow_i) += e * dt;
            } else {
              id(oq_flow_i) *= i_large_err_keep;
            }

            id(oq_flow_i) = fmaxf(-4000.0f, fminf(4000.0f, id(oq_flow_i)));
            last_pi_e = e;

            float u = kp * e + ki * id(oq_flow_i);
            // Asymmetric action limit: allow faster "pump harder" corrections (u_up)
            // than "pump softer" corrections (u_down) to recover low-flow sooner.
            const float u_up_s = 12.0f;
            const float u_down_s = 8.0f;
            const float u_up = u_up_s * dt;
            const float u_down = u_down_s * dt;
            const float u_lim = (e >= 0.0f) ? u_up : u_down;
            u = fmaxf(-u_lim, fminf(u_lim, u));

            pwm_local = (int) roundf((float)pwm_local - u);
            pwm_local = clamp_iPWM(pwm_local);

            const float stable_err_lph = 15.0f;
            constexpr int stable_time_s = 60;
            const int stable_time_ticks = (stable_time_s <= 0) ? 0 : (int) roundf((float)stable_time_s / dt);
            constexpr int good_pwm_step = 10;

            if (startup_hold <= 0 && !pi_failsafe) {
              const float e_target = sp_target - pv;
              if (fabsf(e_target) < stable_err_lph) {
                stable_cnt++;
              } else {
                stable_cnt = 0;
              }

              if (stable_cnt >= stable_time_ticks) {
                const int prev = cooling_target
                  ? id(oq_flow_last_good_pwm_cooling)
                  : id(oq_flow_last_good_pwm);
                if (abs(prev - pwm_local) >= good_pwm_step) {
                  if (cooling_target) {
                    id(oq_flow_last_good_pwm_cooling) = pwm_local;
                  } else {
                    id(oq_flow_last_good_pwm) = pwm_local;
                  }
                }
                stable_cnt = stable_time_ticks;
              }
            } else {
              stable_cnt = 0;
            }
            return pwm_local;
          };

          const int cm_code = id(oq_control_mode_code);
          const bool is_cm0 = (cm_code == 0);
          const int commissioning_task_code = id(oq_commissioning_task_code);

          // Flow submode select (within CM1/CM2/CM3): AUTO vs MANUAL PWM
          const int flow_mode_code = (id(oq_flow_control_mode).active_index().value_or(0) == 1) ? 1 : 0;
          id(oq_flow_control_mode_code) = flow_mode_code;
          const bool want_manual = (flow_mode_code == 1);
          static bool was_manual = false;
          const bool auto_target_is_cooling = (cm_code == 5);
          const bool manual_flow_owns_pi =
              id(oq_manual_flow_active) &&
              (cm_code == 100) &&
              (commissioning_task_code == oq_commissioning::TASK_MANUAL_FLOW);

          const bool is_cm100_idle =
              (cm_code == 100) &&
              (commissioning_task_code == oq_commissioning::TASK_NONE);
          const bool flow_idle = is_cm0 || is_cm100_idle;
          const bool cm100_task_started =
              (cm_code == 100) &&
              (commissioning_task_code != oq_commissioning::TASK_NONE) &&
              (last_cm_code != 100 ||
               last_commissioning_task_code == oq_commissioning::TASK_NONE ||
               last_commissioning_task_code != commissioning_task_code);

          // Edge 1: entering active flow control from an idle mode.
          if ((was_flow_idle && !flow_idle) || cm100_task_started) {
            start_auto_transition(cm100_task_started ? "CM100-task" : "idle->*");
          }
          was_flow_idle = flow_idle;
          last_cm_code = cm_code;
          last_commissioning_task_code = commissioning_task_code;

          if (flow_idle) {
            // Keep manual-edge memory synchronized while idle.
            was_manual = want_manual;
            last_auto_target_is_cooling = auto_target_is_cooling;
            stable_cnt = 0;
            startup_hold = 0;
            sp_f = NAN;
            last_pi_e = 0.0f;
            id(oq_flow_mode).publish_state(is_cm100_idle ? "CM100 idle" : "CM0");
            return;
          }

          const bool is_frost = (cm_code == 98);

          int mode = is_frost ? 2 : 0; // 0=AUTO, 2=FROST
          if (mode != id(oq_flow_last_mode)) {
            id(oq_flow_i) = 0.0f;
            sp_f = NAN;
            last_pi_e = 0.0f;
            stable_cnt = 0;
          }
          if (!want_manual && !is_frost && auto_target_is_cooling != last_auto_target_is_cooling) {
            ESP_LOGI("flow", "AUTO target switched to %s flow setpoint", auto_target_is_cooling ? "cooling" : "normal");
            start_auto_transition(auto_target_is_cooling ? "AUTO->cooling" : "AUTO->normal");
          }
          last_auto_target_is_cooling = auto_target_is_cooling;
          id(oq_flow_last_mode) = mode;

          // Autotune temporarily overrides PWM (flow_control remains output owner).
          if (id(oq_flow_autotune_active) && (cm_code == 100) && (id(oq_commissioning_task_code) == oq_commissioning::TASK_FLOW_AUTOTUNE) && !is_frost) {
            int at_pwm = clamp_iPWM((int) id(oq_flow_autotune_pwm));
            id(oq_flow_last_pwm) = at_pwm;
            stable_cnt = 0;
            pi_failsafe = false;
            write_pump_pwm_if_changed(id(hp1_pump_speed), at_pwm);
            if (${flow_secondary_enabled} != 0) {
              write_pump_pwm_if_changed(id(${secondary_pump_speed_id}), at_pwm);
            }
            if (last_mode != "AUTOTUNE") {
              id(oq_flow_mode).publish_state("AUTOTUNE");
              last_mode = "AUTOTUNE";
            }
            return;
          }

          // Air purge owns the temporary iPWM target, flow_control remains output owner.
          if (id(oq_air_purge_active) &&
              (cm_code == 100) &&
              (id(oq_commissioning_task_code) == oq_commissioning::TASK_AIR_PURGE) &&
              !is_frost) {
            int purge_pwm = clamp_iPWM((int) id(oq_air_purge_target_ipwm));
            id(oq_flow_last_pwm) = purge_pwm;
            stable_cnt = 0;
            pi_failsafe = false;
            write_pump_pwm_if_changed(id(hp1_pump_speed), purge_pwm);
            if (${flow_secondary_enabled} != 0) {
              write_pump_pwm_if_changed(id(${secondary_pump_speed_id}), purge_pwm);
            }
            if (last_mode != "AIR PURGE") {
              id(oq_flow_mode).publish_state("AIR PURGE");
              last_mode = "AIR PURGE";
            }
            return;
          }

          // Edge 2: leaving MANUAL to AUTO
          if (was_manual && !want_manual) {
            start_auto_transition("MANUAL->AUTO");
          }
          was_manual = want_manual;

          int pwm = clamp_iPWM((int) id(oq_flow_last_pwm));
          FlowExecMode exec_mode = FLOW_MODE_AUTO;

          // Manual-flow service deliberately keeps the PI path in control even
          // when the normal installation setting is fixed Manual PWM.
          if (want_manual && !manual_flow_owns_pi && !is_frost) {
            pwm = (int) roundf(id(oq_flow_manual_pwm).state);
            pwm = clamp_iPWM(pwm);
            stable_cnt = 0;
            pi_failsafe = false;
            sp_f = NAN;
            last_pi_e = 0.0f;
            exec_mode = FLOW_MODE_MANUAL;
          } else if (is_frost) {
            pwm = (int) roundf(id(oq_flow_frost_pwm).state);
            pwm = clamp_iPWM(pwm);
            stable_cnt = 0;
            pi_failsafe = false;
            last_pi_e = 0.0f;
            exec_mode = FLOW_MODE_FROST;
          } else {
            pwm = run_auto_pi(pwm);
            if (pi_failsafe) {
              exec_mode = FLOW_MODE_AUTO_FAILSAFE;
            } else if (startup_hold > 0) {
              exec_mode = FLOW_MODE_AUTO_STARTING;
            } else {
              exec_mode = FLOW_MODE_AUTO;
            }
          }

          pwm = clamp_iPWM(pwm);
          id(oq_flow_last_pwm) = pwm;

          write_pump_pwm_if_changed(id(hp1_pump_speed), pwm);
          if (${flow_secondary_enabled} != 0) {
            write_pump_pwm_if_changed(id(${secondary_pump_speed_id}), pwm);
          }

          // External mode text has explicit priority and updates only on change.
          std::string mode_txt;
          switch (exec_mode) {
            case FLOW_MODE_FROST: mode_txt = "CM98"; break;
            case FLOW_MODE_MANUAL: mode_txt = "MANUAL"; break;
            case FLOW_MODE_AUTO_FAILSAFE: mode_txt = "AUTO (failsafe)"; break;
            case FLOW_MODE_AUTO_STARTING: mode_txt = "AUTO (starting)"; break;
            default: mode_txt = manual_flow_owns_pi ? "MANUAL FLOW" : "AUTO"; break;
          }
          if (mode_txt != last_mode) {
            id(oq_flow_mode).publish_state(mode_txt.c_str());
            ESP_LOGI("flow", "Flow mode changed: %s (cm=%s manual=%d failsafe=%d hold=%d pwm=%d)",
                     mode_txt.c_str(), id(oq_control_mode).state.c_str(), (int)want_manual, (int)pi_failsafe, startup_hold, pwm);
            last_mode = mode_txt;
          }
