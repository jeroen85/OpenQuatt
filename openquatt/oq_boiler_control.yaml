# ==============================================================================
# OpenQuatt – Boiler Control (auxiliary heating)
# ==============================================================================
#
# Goal:
#   Controls the electric inline heater (boiler) as auxiliary heating in CM3
#   and during the explicit CM100 boiler power test.
#
# Role in architecture:
#   Owner of the boiler relay; boiler control is passive and follows CM status from supervisory.
#
# What this package DOES do:
#   - Switch boiler relay via configured output pin (`oq_boiler_relay_pin`)
#   - Enables boiler at CM3; disables in all other CMs
#   - Follow the shared water-temperature guardrail state from `oq_strategy_manager`
#   - Publish optional diagnostics (for example boiler status / optionally derived power)
#
# What this package DOES NOT do:
#   - Does not determine Control Mode (supervisory does)
#   - Does not control heat pumps or flow
#   - Does not regulate temperature setpoints
#
# Key assumptions:
#   - Boiler is hydraulically in series after HP2; `water_supply_temp_selected` is available for max-temp protection
#   - Boiler has its own electrical feed; net-power limiter does not apply to boiler
#
# Interaction with Control Modes:
#   - CM3 -> boiler ON (unless the shared water-temperature guardrail blocks it)
#   - CM100 + boiler power test -> boiler ON only while the commissioning task requests it
#   - CM0/CM1/CM2/CM98 → boiler OFF
#
# Safety / fail-safe:
#   - Boiler is blocked from the configured maximum water temperature onwards
#   - An absolute shared hard trip also forces boiler OFF
#   - In CM1 (flow-holding), boiler is always off (via CM gating)
#
# ==============================================================================

# ----------------------------
# OUTPUTS
# ----------------------------
output:
  - platform: gpio
    id: boiler_relay_out
    pin: ${oq_boiler_relay_pin}

# ----------------------------
# ENTITIES
# ----------------------------
switch:
  - platform: output
    id: boiler_relay
    name: "Boiler relay"
    disabled_by_default: true
    output: boiler_relay_out
    icon: mdi:water-boiler
    restore_mode: ALWAYS_OFF
    entity_category: diagnostic
    web_server:
      sorting_group_id: oq_boiler

binary_sensor:
  - platform: template
    id: boiler_active
    name: "Boiler active"
    icon: mdi:fire
    device_class: heat
    entity_category: diagnostic
    web_server:
      sorting_group_id: oq_boiler
    lambda: |-
      return id(boiler_relay).state;

sensor:
  - platform: template
    id: boiler_heat_power
    name: "Boiler Heat Power"
    icon: mdi:radiator
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 5s
    web_server:
      sorting_group_id: oq_boiler
    lambda: |-
      const int cm_code = id(oq_control_mode_code);
      const bool commissioning_boiler =
          (cm_code == 100) &&
          id(oq_commissioning_active) &&
          (id(oq_commissioning_task_code) == oq_commissioning::TASK_BOILER_POWER_TEST) &&
          id(oq_commissioning_boiler_request);
      const bool in_cm3 = (cm_code == 3);
      if (!id(oq_boiler_assist_enabled).state) return 0.0f;
      if (!in_cm3 && !commissioning_boiler) return 0.0f;

      const float hp2_outlet_c = id(${heatpump_outlet_temp_id}).state;
      const float supply_c = id(water_supply_temp_selected).state;
      const float flow_lph = id(flow_rate_selected).state;

      // With missing measurements: return 0 W instead of NaN (cleaner dashboard + CM3 gate already enforced)
      if (isnan(hp2_outlet_c) || isnan(supply_c) || isnan(flow_lph)) return 0.0f;

      const float cp_j_per_kgk = ${oq_water_cp_j_per_kgk};   // J/(kg·K)
      const float mass_flow_kgps = flow_lph / 3600.0f;       // kg/s (≈ L/h)
      const float delta_t_k = supply_c - hp2_outlet_c;       // K

      // Non-negative power (only added heat)
      const float heat_power_w = mass_flow_kgps * cp_j_per_kgk * delta_t_k;
      return (heat_power_w < 0.0f) ? 0.0f : heat_power_w;

# ----------------------------
# MAIN LOOP
# ----------------------------
interval:
  - interval: ${oq_boiler_loop_s}s
    startup_delay: 4600ms
    then:
      - lambda: |-
          const int cm_code = id(oq_control_mode_code);
          const bool commissioning_boiler =
              (cm_code == 100) &&
              id(oq_commissioning_active) &&
              (id(oq_commissioning_task_code) == oq_commissioning::TASK_BOILER_POWER_TEST) &&
              id(oq_commissioning_boiler_request);
          // Boiler follows Control Mode CM3, but the shared water-temperature model
          // may block it independently from CM ownership.
          const bool in_cm3 = (cm_code == 3);
          const float supply_c = id(water_supply_temp_selected).state;
          const bool has_valid_supply_temp = !isnan(supply_c);
          std::string boiler_block_reason;
          if (!id(oq_boiler_assist_enabled).state) {
            boiler_block_reason = "boiler/CV assist disabled";
          } else if (!has_valid_supply_temp) {
            boiler_block_reason = "water supply temperature unavailable";
          } else if (id(oq_water_temp_boiler_inhibit_active)) {
            boiler_block_reason = "water temperature boiler inhibit active";
          } else if (id(oq_water_temp_hard_trip_active)) {
            boiler_block_reason = "water temperature hard trip active";
          } else if ((cm_code == 100) &&
                     id(oq_commissioning_active) &&
                     (id(oq_commissioning_task_code) == oq_commissioning::TASK_BOILER_POWER_TEST) &&
                     !id(oq_commissioning_boiler_request)) {
            boiler_block_reason = "CM100 boiler commissioning waiting for flow settle";
          } else if (!in_cm3 && !commissioning_boiler) {
            boiler_block_reason = "Control Mode is not CM3";
          }
          const bool boiler_allowed =
              boiler_block_reason.empty();
          static bool last_boiler_allowed = false;
          static std::string last_boiler_block_reason = "";
          if (boiler_allowed != last_boiler_allowed || boiler_block_reason != last_boiler_block_reason) {
          if (boiler_allowed) {
              if (commissioning_boiler) {
                ESP_LOGI("quatt.boiler", "Boiler enabled: CM100 commissioning task and safety guards clear");
              } else {
                ESP_LOGI("quatt.boiler", "Boiler enabled: CM3 and safety guards clear");
              }
            } else if (id(oq_water_temp_hard_trip_active)) {
              ESP_LOGW("quatt.boiler", "Boiler blocked: %s", boiler_block_reason.c_str());
            } else if (boiler_block_reason == "CM100 boiler commissioning waiting for flow settle") {
              ESP_LOGI("quatt.boiler", "Boiler commissioning: waiting for flow to settle");
            } else {
              ESP_LOGI("quatt.boiler", "Boiler blocked: %s", boiler_block_reason.c_str());
            }
            last_boiler_allowed = boiler_allowed;
            last_boiler_block_reason = boiler_block_reason;
          }

          if (boiler_allowed) {
            if (!id(boiler_relay).state) id(boiler_relay).turn_on();
          } else {
            if (id(boiler_relay).state) id(boiler_relay).turn_off();
          }
