title: OpenQuatt
views:
  - title: Overzicht
    path: overzicht
    icon: mdi:view-dashboard
    type: sections
    max_columns: 3
    sections:
      - type: grid
        column_span: 1
        cards:
          - type: heading
            icon: mdi:speedometer
            heading: Live prestaties
            heading_style: title
          - type: markdown
            content: >-
              <details>

              <summary><strong>Uitleg</strong></summary>


              Deze waarden geven live de belangrijkste systeemprestatie:

              - `Power E`: totaal elektrisch ingangsvermogen van de
              warmtepomp(en).

              - `Power H`: totaal thermisch afgegeven vermogen.

              - `COP`: verhouding `Power H / Power E` (momentane efficientie).

              - `Flow`: actuele volumestroom die als basis dient voor
              flowbewaking.

              - `Buitentemp`: geselecteerde bron voor buitentemperatuur in de
              regeling.

              - `Aanvoertemperatuur`: geselecteerde bron voor actuele
              watersupply.


              </details>
            text_only: true
          - type: tile
            entity: sensor.openquatt_total_power_input
            name: Power E
            vertical: false
            features:
              - type: trend-graph
            features_position: bottom
          - type: tile
            entity: sensor.openquatt_total_heat_power
            name: Power H
            vertical: false
            features:
              - type: trend-graph
            features_position: bottom
          - type: tile
            entity: sensor.openquatt_total_cop
            name: COP
            vertical: false
            features:
              - type: trend-graph
            features_position: bottom
          - type: tile
            entity: sensor.openquatt_flow_average_selected
            name: Flow
            vertical: false
            features:
              - type: trend-graph
            features_position: bottom
          - type: tile
            entity: sensor.openquatt_outside_temperature_selected
            name: Buitentemp
            vertical: false
            features:
              - type: trend-graph
            features_position: bottom
          - type: tile
            entity: sensor.openquatt_water_supply_temp_selected
            name: Aanvoertemperatuur
            vertical: false
            features:
              - type: trend-graph
            features_position: bottom
      - type: grid
        cards:
          - type: heading
            heading_style: title
            heading: Systeemstatus
            icon: mdi:state-machine
          - type: markdown
            content: >-
              <details>

              <summary><strong>Uitleg</strong></summary>


              Dit blok toont de actieve regeltoestand:

              - `ControlMode`: huidige bedrijfsmodus/stap van de state machine.

              - `Flow mode`: manier waarop de pomp/flowregeling momenteel werkt.

              - `Verwarmingsstrategie`: bron van de warmtevraag (bijv. Power
              House/curve).

              - `Ketel actief`: geeft aan of ketel-assist actief is.

              - `Stille modus actief`: toont of het stil-venster nu van kracht is.


              </details>
            text_only: true
          - type: tile
            entity: sensor.openquatt_control_mode_label
            name: ControlMode
            vertical: false
            features_position: bottom
          - type: tile
            entity: sensor.openquatt_flow_mode
            name: Flow mode
            vertical: false
            features_position: bottom
          - type: tile
            entity: sensor.openquatt_heating_strategy
            name: Verwarmingsstrategie
            vertical: false
            features_position: bottom
          - type: tile
            entity: binary_sensor.openquatt_boiler_active
            name: Ketel actief
            vertical: false
            features_position: bottom
          - type: tile
            entity: binary_sensor.openquatt_silent_active
            name:
              type: entity
            vertical: false
            features_position: bottom
          - type: heading
            icon: mdi:stethoscope
            heading: Debug
            heading_style: title
          - type: markdown
            content: >-
              <details>

              <summary><strong>Uitleg</strong></summary><ha-alert
              alert-type="warning">Pas op, dit overruled de ControlMode van
              OpenQuatt!</ha-alert>


              `CM override`: handmatige mode-override; normaal op `Auto` laten.


              </details>
            text_only: true
          - type: tile
            entity: select.openquatt_cm_override
            name:
              type: entity
            hide_state: true
            vertical: false
            features:
              - type: select-options
            features_position: inline
      - type: grid
        cards:
          - type: heading
            heading: Thermostaat
            heading_style: title
            icon: mdi:home-thermometer
          - type: markdown
            content: >-
              <details>

              <summary><strong>Uitleg</strong></summary>


              Geselecteerde kamerregelwaarden:

              - `Doeltemperatuur`: gevraagde ruimtetemperatuur.

              - `Huidige temperatuur`: gemeten ruimtetemperatuur.

              Het verschil tussen deze twee bepaalt hoe sterk de warmtevraag
              oploopt.


              </details>
            text_only: true
          - type: custom:mini-graph-card
            name: Huidige kamertemperatuur
            entities:
              - entity: sensor.openquatt_room_temperature_selected
                name: Kamertemperatuur
                show_legend_state: true
              - entity: sensor.openquatt_room_setpoint_selected
                name: Doeltemperatuur
                show_fill: false
                show_legend_state: true
            show:
              icon: true
              name: true
              state: true
              legend: true
              labels: false
            points_per_hour: 30
            hours_to_show: 24
            line_width: 2
            hour24: true
            height: 80
            decimals: 1
          - type: heading
            heading_style: title
            heading: Instellingen stille modus
            icon: mdi:volume-off
          - type: markdown
            content: >-
              <details>

              <summary><strong>Uitleg</strong></summary>


              Dagelijkse instellingen die direct gedrag begrenzen:

              - `Silent end/start time`: tijdvenster voor stille modus.

              - `Day max level`: bovengrens compressorlevel buiten silent-uren.

              - `Silent max level`: bovengrens compressorlevel tijdens
              silent-uren.


              </details>
            text_only: true
          - type: tile
            entity: time.openquatt_silent_end_time
            name:
              type: entity
            vertical: false
          - type: tile
            entity: time.openquatt_silent_start_time
            name:
              type: entity
            vertical: false
          - type: tile
            entity: number.openquatt_day_max_level
            name:
              type: entity
            hide_state: false
            vertical: false
            features:
              - style: slider
                type: numeric-input
            features_position: inline
          - type: tile
            entity: number.openquatt_silent_max_level
            name:
              type: entity
            hide_state: false
            vertical: false
            features:
              - style: slider
                type: numeric-input
            features_position: inline
      - type: grid
        column_span: 2
        cards:
          - type: heading
            icon: mdi:chart-line
            heading: Performance (12h)
            heading_style: title
          - type: markdown
            content: >-
              <details>

              <summary><strong>Uitleg</strong></summary>


              Deze grafiek combineert 12-uurs trends voor:


              - `Power E`: totaal elektrisch ingangsvermogen.

              - `Power H`: totaal thermisch afgegeven vermogen.

              - `COP`: efficientieverhouding (`Power H / Power E`).


              Gebruik dit om te controleren of warmteafgifte het opgenomen
              vermogen volgt en of COP realistisch blijft.

              </details>
            text_only: true
          - type: custom:apexcharts-card
            header:
              show: true
              title: Power E, Power H en COP
              show_states: true
              colorize_states: true
            graph_span: 12h
            update_interval: 30s
            apex_config:
              chart:
                height: 320
                animations:
                  enabled: false
              legend:
                show: true
                position: bottom
                clusterGroupedSeries: false
              yaxis:
                - id: watts
                  min: 0
                  decimalsInFloat: 0
                  title:
                    text: Vermogen (W)
                - id: cop
                  opposite: true
                  min: 0
                  decimalsInFloat: 1
                  title:
                    text: COP
              stroke:
                width: 2
                curve: smooth
              tooltip:
                shared: true
            series:
              - entity: sensor.openquatt_total_power_input
                name: Power E
                color: '#3B82F6'
                yaxis_id: watts
                type: line
                extend_to: end
                show:
                  legend_value: false
                group_by:
                  func: avg
                  duration: 5min
                  fill: last
              - entity: sensor.openquatt_total_heat_power
                name: Power H
                color: '#F59E0B'
                yaxis_id: watts
                type: line
                extend_to: end
                show:
                  legend_value: false
                group_by:
                  func: avg
                  duration: 5min
                  fill: last
              - entity: sensor.openquatt_total_cop
                name: COP
                color: '#10B981'
                yaxis_id: cop
                type: line
                extend_to: end
                show:
                  legend_value: false
                group_by:
                  func: avg
                  duration: 5min
                  fill: last
            grid_options:
              columns: full
    cards: []
    header:
      card:
        type: markdown
        content: |-
          <img src="https://raw.githubusercontent.com/jeroen85/OpenQuatt/main/docs/assets/openquatt_logo.png" width="300" />

          ## <ha-icon icon="mdi:view-dashboard"></ha-icon> Overzicht
          Snel en praktisch zicht op prestaties, status en bediening.
        text_only: true
      layout: center
      badges_position: top
      badges_wrap: wrap
    badges:
      - type: entity
        show_name: false
        show_state: true
        show_icon: false
        entity: sensor.openquatt_openquatt_version
        name:
          - type: device
          - type: entity
        state_content:
          - name
          - state
  - title: Energie
    path: energy
    icon: mdi:lightning-bolt-circle
    type: sections
    max_columns: 3
    sections:
      - type: grid
        cards:
          - type: heading
            icon: mdi:gauge
            heading: Huidig
            heading_style: title
          - type: heading
            icon: mdi:heat-pump
            heading: Warmtepomp
            heading_style: subtitle
          - type: entities
            show_header_toggle: false
            entities:
              - entity: sensor.openquatt_total_power_input
                name: Elektrisch ingangsvermogen
              - entity: sensor.openquatt_total_heat_power
                name: Warmteafgifte
              - entity: sensor.openquatt_total_cop
                name: Huidige COP
          - type: heading
            icon: mdi:water-boiler
            heading: CV-ketel
            heading_style: subtitle
          - type: entities
            show_header_toggle: false
            entities:
              - entity: sensor.openquatt_boiler_heat_power
                name: Warmteafgifte
          - type: heading
            icon: mdi:sigma
            heading: Systeem
            heading_style: subtitle
          - type: entities
            show_header_toggle: false
            entities:
              - entity: sensor.openquatt_system_heat_power
                name: Warmteafgifte
      - type: grid
        cards:
          - type: heading
            icon: mdi:calendar-today
            heading_style: title
            heading: Vandaag
          - &ref_0
            type: heading
            icon: mdi:heat-pump
            heading: Warmtepomp
            heading_style: subtitle
          - type: entities
            show_header_toggle: false
            entities:
              - entity: sensor.openquatt_electrical_energy_daily
                name: Elektriciteit vandaag
              - entity: sensor.openquatt_heatpump_thermal_energy_daily
                name: Warmte vandaag
              - entity: sensor.openquatt_heatpump_cop_daily
                name: COP vandaag
          - &ref_1
            type: heading
            icon: mdi:water-boiler
            heading: CV-ketel
            heading_style: subtitle
          - type: entities
            show_header_toggle: false
            entities:
              - entity: sensor.openquatt_boiler_thermal_energy_daily
                name: Warmte vandaag
          - &ref_2
            type: heading
            icon: mdi:sigma
            heading: Systeem
            heading_style: subtitle
          - type: entities
            show_header_toggle: false
            entities:
              - entity: sensor.openquatt_system_thermal_energy_daily
                name: Warmte vandaag
      - type: grid
        cards:
          - type: heading
            icon: mdi:sigma
            heading: Cumulatief
            heading_style: title
          - *ref_0
          - type: entities
            show_header_toggle: false
            entities:
              - entity: sensor.openquatt_electrical_energy_cumulative
                name: Elektriciteit cumulatief
              - entity: sensor.openquatt_heatpump_thermal_energy_cumulative
                name: Warmte cumulatief
              - entity: sensor.openquatt_heatpump_cop_cumulative
                name: COP cumulatief
          - *ref_1
          - type: entities
            show_header_toggle: false
            entities:
              - entity: sensor.openquatt_boiler_thermal_energy_cumulative
                name: Warmte cumulatief
          - *ref_2
          - type: entities
            show_header_toggle: false
            entities:
              - entity: sensor.openquatt_system_thermal_energy_cumulative
                name: Warmte cumulatief
      - type: grid
        cards:
          - type: heading
            heading: Trends (24 uur)
            heading_style: title
            icon: mdi:trending-up
          - type: history-graph
            title: Warmtepomptrends (24 uur)
            hours_to_show: 24
            refresh_interval: 60
            entities:
              - entity: sensor.openquatt_total_heat_power
                name: Warmteafgifte
              - entity: sensor.openquatt_heatpump_cop_daily
                name: COP vandaag
              - entity: sensor.openquatt_heatpump_thermal_energy_daily
                name: Warmte vandaag
          - type: history-graph
            title: Keteltrends (24 uur)
            hours_to_show: 24
            refresh_interval: 60
            entities:
              - entity: sensor.openquatt_boiler_heat_power
                name: Warmteafgifte
              - entity: sensor.openquatt_boiler_thermal_energy_daily
                name: Warmte vandaag
          - type: history-graph
            title: Systeemtrends (24 uur)
            hours_to_show: 24
            refresh_interval: 60
            entities:
              - entity: sensor.openquatt_total_power_input
                name: Elektrisch ingangsvermogen
              - entity: sensor.openquatt_system_heat_power
                name: Warmteafgifte
              - entity: sensor.openquatt_system_thermal_energy_daily
                name: Warmte vandaag
        column_span: 3
      - type: grid
        column_span: 3
        cards:
          - type: heading
            icon: mdi:chart-bar
            heading: Energietrends (7d/30d)
            heading_style: title
          - type: markdown
            content: >-
              <details>


              <summary><strong>Uitleg</strong></summary>


              Dagaggregatie voor energie:

              - Elektriciteit en warmte als dagelijkse kWh (afgeleid uit
              cumulatieve sensoren)

              - `COP vandaag` als daggemiddelde


              </details>
            text_only: true
          - type: custom:apexcharts-card
            header:
              show: true
              title: Energietrends (7 dagen)
              show_states: false
            graph_span: 7d
            update_interval: 120s
            yaxis:
              - id: energy
                min: 0
                decimals: 1
                apex_config:
                  title:
                    text: kWh/dag
              - id: cop
                opposite: true
                min: 0
                max: 8
                decimals: 2
                apex_config:
                  tickAmount: 4
                  title:
                    text: COP vandaag
            apex_config:
              chart:
                height: 320
              legend:
                show: true
                position: top
                clusterGroupedSeries: false
              stroke:
                width: 2
                curve: smooth
              tooltip:
                shared: true
            series:
              - entity: sensor.openquatt_electrical_energy_cumulative
                name: Elektriciteit/dag
                color: '#3B82F6'
                yaxis_id: energy
                type: column
                group_by:
                  func: delta
                  duration: 1d
              - entity: sensor.openquatt_heatpump_thermal_energy_cumulative
                name: Warmtepomp warmte/dag
                color: '#F59E0B'
                yaxis_id: energy
                type: column
                group_by:
                  func: delta
                  duration: 1d
              - entity: sensor.openquatt_boiler_thermal_energy_cumulative
                name: Ketelwarmte/dag
                color: '#EF4444'
                yaxis_id: energy
                type: column
                group_by:
                  func: delta
                  duration: 1d
              - entity: sensor.openquatt_system_thermal_energy_cumulative
                name: Systeemwarmte/dag
                color: '#10B981'
                yaxis_id: energy
                type: line
                group_by:
                  func: delta
                  duration: 1d
              - entity: sensor.openquatt_heatpump_cop_daily
                name: COP vandaag
                color: '#A855F7'
                yaxis_id: cop
                type: line
                group_by:
                  func: avg
                  duration: 1d
            grid_options:
              columns: full
          - type: custom:apexcharts-card
            header:
              show: true
              title: Energietrends (30 dagen)
              show_states: false
            graph_span: 30d
            update_interval: 300s
            yaxis:
              - id: energy
                min: 0
                decimals: 1
                apex_config:
                  title:
                    text: kWh/dag
              - id: cop
                opposite: true
                min: 0
                max: 8
                decimals: 2
                apex_config:
                  tickAmount: 4
                  title:
                    text: COP vandaag
            apex_config:
              chart:
                height: 320
              legend:
                show: true
                position: top
                clusterGroupedSeries: false
              stroke:
                width: 2
                curve: smooth
              tooltip:
                shared: true
            series:
              - entity: sensor.openquatt_electrical_energy_cumulative
                name: Elektriciteit/dag
                color: '#3B82F6'
                yaxis_id: energy
                type: column
                group_by:
                  func: delta
                  duration: 1d
              - entity: sensor.openquatt_heatpump_thermal_energy_cumulative
                name: Warmtepomp warmte/dag
                color: '#F59E0B'
                yaxis_id: energy
                type: column
                group_by:
                  func: delta
                  duration: 1d
              - entity: sensor.openquatt_boiler_thermal_energy_cumulative
                name: Ketelwarmte/dag
                color: '#EF4444'
                yaxis_id: energy
                type: column
                group_by:
                  func: delta
                  duration: 1d
              - entity: sensor.openquatt_system_thermal_energy_cumulative
                name: Systeemwarmte/dag
                color: '#10B981'
                yaxis_id: energy
                type: line
                group_by:
                  func: delta
                  duration: 1d
              - entity: sensor.openquatt_heatpump_cop_daily
                name: COP vandaag
                color: '#A855F7'
                yaxis_id: cop
                type: line
                group_by:
                  func: avg
                  duration: 1d
            grid_options:
              columns: full
    cards: []
    header:
      card:
        type: markdown
        content: >-
          # <ha-icon icon="mdi:lightning-bolt-circle"></ha-icon> Energie

          Energie-overzicht van Warmtepomp, boiler en totaal systeem (dag +
          cumulatief).
  - title: Flow
    path: flow
    icon: mdi:waves
    type: sections
    max_columns: 3
    sections:
      - type: grid
        cards:
          - type: heading
            icon: mdi:waves-arrow-right
            heading: Flowstatus en regeling
            heading_style: title
          - type: heading
            icon: ''
            heading: Status
            heading_style: subtitle
          - type: markdown
            content: >-
              <details>

              <summary><strong>Uitleg</strong></summary>


              Flowstatus in een oogopslag:


              - `Flow mode`: actieve werking van de flowregeling.

              - `ControlMode`: actieve supervisory control state.

              - `Low flow alarm`: beveiligingsalarm bij te lage flow.

              - `Flow (gemiddeld)`: geselecteerde gemiddelde flow voor
              regeling/beveiliging.

              </details>
            text_only: true
          - type: tile
            entity: sensor.openquatt_flow_mode
            name:
              type: entity
            show_entity_picture: false
            hide_state: false
            vertical: false
            features_position: bottom
          - type: tile
            entity: sensor.openquatt_control_mode_label
            name: ControlMode
            vertical: false
            features_position: bottom
          - type: tile
            entity: binary_sensor.openquatt_lowflow_fault_active
            name: Low flow alarm
            vertical: false
            features_position: bottom
          - type: tile
            entity: sensor.openquatt_flow_average_selected
            name: Flow (gemiddeld)
            vertical: false
            features_position: bottom
          - type: heading
            icon: ''
            heading: Regeling
            heading_style: subtitle
          - type: markdown
            content: >-
              <details>

              <summary><strong>Uitleg</strong></summary>


              Belangrijkste flowinstellingen:


              - `Flow control mode`: kies automatische flowregeling of
              handmatige werking.

              - `Flow setpoint`: doel-flow in L/h voor automatische regeling.

              - `Handmatige iPWM`: stel iPWM waarde in voor handbediening.

              </details>
            text_only: true
          - type: tile
            entity: select.openquatt_flow_control_mode
            name:
              type: entity
            hide_state: true
            vertical: false
            features:
              - type: select-options
            features_position: inline
          - type: tile
            entity: number.openquatt_flow_setpoint
            name:
              type: entity
            hide_state: false
            vertical: false
            features:
              - style: slider
                type: numeric-input
            features_position: inline
          - type: tile
            entity: number.openquatt_manual_ipwm
            name:
              type: entity
            hide_state: false
            vertical: false
            features:
              - style: slider
                type: numeric-input
            features_position: inline
      - type: grid
        cards:
          - type: heading
            icon: mdi:chart-line
            heading: Flowtrends
            heading_style: title
          - type: markdown
            content: |-
              <details>

              <summary><strong>Uitleg</strong></summary>

              - `Flowmetingen` vergelijkt actuele flow met setpoint over tijd.

              - `Pompsturing` toont iPWM-uitsturing van HP1.

              </details>
            text_only: true
            grid_options:
              columns: full
          - type: history-graph
            title: Flowmetingen (4 uur)
            hours_to_show: 4
            refresh_interval: 30
            entities:
              - entity: sensor.openquatt_flow_average_selected
                name: Flow
              - entity: number.openquatt_flow_setpoint
                name: Flow setpoint
            grid_options:
              columns: full
          - type: history-graph
            title: Pompsturing (4 uur)
            hours_to_show: 4
            refresh_interval: 30
            entities:
              - entity: number.openquatt_hp1_set_pump_speed
                name: HP1 iPWM
            grid_options:
              columns: full
        column_span: 2
    cards: []
    header:
      card:
        type: markdown
        content: |-
          # <ha-icon icon="mdi:waves"></ha-icon> Flow
          Bediening, status en trends van flowregeling en pompsturing.
      layout: center
      badges_position: bottom
      badges_wrap: wrap
    badges: []
  - title: Warmteregeling
    path: warmtecontrol
    icon: mdi:radiator
    type: sections
    max_columns: 3
    sections:
      - type: grid
        cards:
          - type: heading
            icon: mdi:radiator
            heading: Warmteregeling
            heading_style: title
          - type: heading
            icon: mdi:tune-variant
            heading: Regelinstellingen
            heading_style: subtitle
          - type: markdown
            content: >-
              <details>

              <summary><strong>Uitleg</strong></summary>


              - `ControlMode`: kiest welke strategie de warmtevraag opbouwt
              (bijv. Stooklijn of PH).

              - Bij stooklijnregeling verschijnt ook `Heating Curve Control
              Profile` voor de ingebouwde regelkarakteristiek.

              - Controleer daarna bij `Kern KPI` hoe dit doorwerkt in `P_req`,
              `P_house` en `Tekort`.

              </details>
            text_only: true
          - type: tile
            entity: select.openquatt_heating_control_mode
            name: ControlMode
            hide_state: true
            vertical: false
            features:
              - type: select-options
            features_position: inline
          - type: tile
            visibility:
              - condition: state
                entity: select.openquatt_heating_control_mode
                state: Water Temperature Control (heating curve)
            entity: select.openquatt_heating_curve_control_profile
            name:
              type: entity
            show_entity_picture: false
            hide_state: true
            vertical: false
            features:
              - type: select-options
            features_position: inline
          - type: heading
            icon: mdi:view-dashboard-outline
            heading: Kern KPI
