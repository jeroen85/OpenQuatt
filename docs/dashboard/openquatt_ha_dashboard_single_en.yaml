title: OpenQuatt
views:
  - title: Overview
    path: overview
    icon: mdi:view-dashboard
    type: sections
    max_columns: 3
    sections:
      - type: grid
        column_span: 1
        cards:
          - type: heading
            icon: mdi:speedometer
            heading: Live performance
            heading_style: title
          - type: markdown
            content: >-
              <details>

              <summary><strong>Explanation</strong></summary>


              These values show the key system performance in real time:

              - `Power E`: total electrical input power of the heat pump(s).

              - `Power H`: total delivered thermal output power.

              - `COP`: ratio `Power H / Power E` (instant efficiency).

              - `Flow`: current volume flow used as the basis for flow safety.

              - `Outside temp`: selected outdoor temperature source used in control.

              - `Supply temperature`: selected source for current water supply
              temperature.


              </details>
            text_only: true
          - type: tile
            entity: sensor.openquatt_total_power_input
            name: Power E
            vertical: false
            features:
              - type: trend-graph
            features_position: bottom
          - type: tile
            entity: sensor.openquatt_total_heat_power
            name: Power H
            vertical: false
            features:
              - type: trend-graph
            features_position: bottom
          - type: tile
            entity: sensor.openquatt_total_cop
            name: COP
            vertical: false
            features:
              - type: trend-graph
            features_position: bottom
          - type: tile
            entity: sensor.openquatt_flow_average_selected
            name: Flow
            vertical: false
            features:
              - type: trend-graph
            features_position: bottom
          - type: tile
            entity: sensor.openquatt_outside_temperature_selected
            name: Outside temp
            vertical: false
            features:
              - type: trend-graph
            features_position: bottom
          - type: tile
            entity: sensor.openquatt_water_supply_temp_selected
            name: Supply temperature
            vertical: false
            features:
              - type: trend-graph
            features_position: bottom
      - type: grid
        cards:
          - type: heading
            heading_style: title
            heading: Supervisory status
            icon: mdi:state-machine
          - type: markdown
            content: >-
              <details>

              <summary><strong>Explanation</strong></summary>


              This block shows the active control state:

              - `Control mode`: current operating mode/state machine step.

              - `Flow mode`: how pump/flow control is currently operating.

              - `Heating strategy`: source of heating demand (for example PH/curve).

              - `Boiler active`: indicates whether boiler assist is active.

              - `Silent active`: shows whether the silent window is currently active.


              </details>
            text_only: true
          - type: tile
            entity: sensor.openquatt_control_mode_label
            name: Control mode
            vertical: false
            features_position: bottom
          - type: tile
            entity: sensor.openquatt_flow_mode
            name: Flow mode
            vertical: false
            features_position: bottom
          - type: tile
            entity: sensor.openquatt_heating_strategy
            name: Heating strategy
            vertical: false
            features_position: bottom
          - type: tile
            entity: binary_sensor.openquatt_boiler_active
            name: Boiler active
            vertical: false
            features_position: bottom
          - type: tile
            entity: binary_sensor.openquatt_silent_active
            name:
              type: entity
            vertical: false
            features_position: bottom
          - type: heading
            icon: mdi:stethoscope
            heading: Debug
            heading_style: title
          - type: markdown
            content: >-
              <details>

              <summary><strong>Explanation</strong></summary><ha-alert
              alert-type="warning">Pas op, dit overruled de ControlMode van
              OpenQuatt!</ha-alert>


              `CM override`: handmatige mode-override; normaal op `Auto` laten.


              </details>
            text_only: true
          - type: tile
            entity: select.openquatt_cm_override
            name:
              type: entity
            hide_state: true
            vertical: false
            features:
              - type: select-options
            features_position: inline
      - type: grid
        cards:
          - type: heading
            heading: Thermostat
            heading_style: title
            icon: mdi:home-thermometer
          - type: markdown
            content: >-
              <details>

              <summary><strong>Explanation</strong></summary>


              Selected room-control values:

              - `Setpoint`: requested room temperature.

              - `Current temperature`: measured room temperature.

              The difference between these two determines how strongly heating demand increases.


              </details>
            text_only: true
          - type: custom:mini-graph-card
            name: Current room temperature
            entities:
              - entity: sensor.openquatt_room_temperature_selected
                name: Room temperature
                show_legend_state: true
              - entity: sensor.openquatt_room_setpoint_selected
                name: Setpoint
                show_fill: false
                show_legend_state: true
            show:
              icon: true
              name: true
              state: true
              legend: true
              labels: false
            points_per_hour: 30
            hours_to_show: 24
            line_width: 2
            hour24: true
            height: 80
            decimals: 1
          - type: heading
            heading_style: title
            heading: Silent mode settings
            icon: mdi:volume-off
          - type: markdown
            content: >-
              <details>

              <summary><strong>Explanation</strong></summary>


              Daily settings that directly limit behavior:

              - `Silent end/start time`: time window for silent mode.

              - `Day max level`: maximum compressor level outside silent hours.

              - `Silent max level`: maximum compressor level during silent hours.


              </details>
            text_only: true
          - type: tile
            entity: time.openquatt_silent_end_time
            name:
              type: entity
            vertical: false
          - type: tile
            entity: time.openquatt_silent_start_time
            name:
              type: entity
            vertical: false
          - type: tile
            entity: number.openquatt_day_max_level
            name:
              type: entity
            hide_state: false
            vertical: false
            features:
              - style: slider
                type: numeric-input
            features_position: inline
          - type: tile
            entity: number.openquatt_silent_max_level
            name:
              type: entity
            hide_state: false
            vertical: false
            features:
              - style: slider
                type: numeric-input
            features_position: inline
      - type: grid
        column_span: 2
        cards:
          - type: heading
            icon: mdi:chart-line
            heading: Performance (12h)
            heading_style: title
          - type: markdown
            content: |-
              <details>
              <summary><strong>Explanation</strong></summary>

              This chart combines 12-hour trends for:

              - `Power E`: total electrical input power.
              - `Power H`: total thermal output power.
              - `COP`: efficiency ratio (`Power H / Power E`).

              Use this to check whether delivered heat follows input power and whether COP stays in a realistic range.
              </details>
            text_only: true
          - type: custom:apexcharts-card
            header:
              show: true
              title: Power E, Power H en COP
              show_states: true
              colorize_states: true
            graph_span: 12h
            update_interval: 30s
            apex_config:
              chart:
                height: 320
                animations:
                  enabled: false
              legend:
                show: true
                position: bottom
                clusterGroupedSeries: false
              yaxis:
                - id: watts
                  min: 0
                  decimalsInFloat: 0
                  title:
                    text: Vermogen (W)
                - id: cop
                  opposite: true
                  min: 0
                  decimalsInFloat: 1
                  title:
                    text: COP
              stroke:
                width: 2
                curve: smooth
              tooltip:
                shared: true
            series:
              - entity: sensor.openquatt_total_power_input
                name: Power E
                color: '#3B82F6'
                yaxis_id: watts
                type: line
                extend_to: end
                show:
                  legend_value: false
                group_by:
                  func: avg
                  duration: 5min
                  fill: last
              - entity: sensor.openquatt_total_heat_power
                name: Power H
                color: '#F59E0B'
                yaxis_id: watts
                type: line
                extend_to: end
                show:
                  legend_value: false
                group_by:
                  func: avg
                  duration: 5min
                  fill: last
              - entity: sensor.openquatt_total_cop
                name: COP
                color: '#10B981'
                yaxis_id: cop
                type: line
                extend_to: end
                show:
                  legend_value: false
                group_by:
                  func: avg
                  duration: 5min
                  fill: last
            grid_options:
              columns: full
    cards: []
    header:
      card:
        type: markdown
        content: |-
          <img src="https://raw.githubusercontent.com/jeroen85/OpenQuatt/main/docs/assets/openquatt_logo.png" width="300" />

          ## <ha-icon icon="mdi:view-dashboard"></ha-icon> Overview
          Quick and practical view of performance, status, and control.
        text_only: true
      layout: center
      badges_position: top
      badges_wrap: wrap
    badges:
      - type: entity
        show_name: false
        show_state: true
        show_icon: false
        entity: sensor.openquatt_openquatt_version
        name:
          - type: device
          - type: entity
        state_content:
          - name
          - state
  - title: Energy
    path: energy
    icon: mdi:lightning-bolt-circle
    type: sections
    max_columns: 3
    sections:
      - type: grid
        cards:
          - type: heading
            icon: mdi:gauge
            heading: Current
            heading_style: title
          - type: heading
            icon: mdi:heat-pump
            heading: Heat pump
            heading_style: subtitle
          - type: entities
            show_header_toggle: false
            entities:
              - entity: sensor.openquatt_total_power_input
                name: Electrical input power
              - entity: sensor.openquatt_total_heat_power
                name: Heat output power
              - entity: sensor.openquatt_total_cop
                name: Current COP
          - type: heading
            icon: mdi:water-boiler
            heading: Boiler
            heading_style: subtitle
          - type: entities
            show_header_toggle: false
            entities:
              - entity: sensor.openquatt_boiler_heat_power
                name: Heat output power
          - type: heading
            icon: mdi:sigma
            heading: System
            heading_style: subtitle
          - type: entities
            show_header_toggle: false
            entities:
              - entity: sensor.openquatt_system_heat_power
                name: Heat output power
      - type: grid
        cards:
          - type: heading
            icon: mdi:calendar-today
            heading_style: title
            heading: Today
          - type: heading
            icon: mdi:heat-pump
            heading: Heat pump
            heading_style: subtitle
          - type: entities
            show_header_toggle: false
            entities:
              - entity: sensor.openquatt_electrical_energy_daily
                name: Electricity today
              - entity: sensor.openquatt_heatpump_thermal_energy_daily
                name: Heat today
              - entity: sensor.openquatt_heatpump_cop_daily
                name: COP today
          - type: heading
            icon: mdi:water-boiler
            heading: Boiler
            heading_style: subtitle
          - type: entities
            show_header_toggle: false
            entities:
              - entity: sensor.openquatt_boiler_thermal_energy_daily
                name: Heat today
          - type: heading
            icon: mdi:sigma
            heading: System
            heading_style: subtitle
          - type: entities
            show_header_toggle: false
            entities:
              - entity: sensor.openquatt_system_thermal_energy_daily
                name: Heat today
      - type: grid
        cards:
          - type: heading
            icon: mdi:sigma
            heading: Cumulative
            heading_style: title
          - type: heading
            icon: mdi:heat-pump
            heading: Heat pump
            heading_style: subtitle
          - type: entities
            show_header_toggle: false
            entities:
              - entity: sensor.openquatt_electrical_energy_cumulative
                name: Electricity cumulative
              - entity: sensor.openquatt_heatpump_thermal_energy_cumulative
                name: Heat cumulative
              - entity: sensor.openquatt_heatpump_cop_cumulative
                name: COP cumulative
          - type: heading
            icon: mdi:water-boiler
            heading: Boiler
            heading_style: subtitle
          - type: entities
            show_header_toggle: false
            entities:
              - entity: sensor.openquatt_boiler_thermal_energy_cumulative
                name: Heat cumulative
          - type: heading
            icon: mdi:sigma
            heading: System
            heading_style: subtitle
          - type: entities
            show_header_toggle: false
            entities:
              - entity: sensor.openquatt_system_thermal_energy_cumulative
                name: Heat cumulative
      - type: grid
        cards:
          - type: heading
            heading: Trends (24h)
            heading_style: title
            icon: mdi:trending-up
          - type: history-graph
            title: Heat pump trends (24h)
            hours_to_show: 24
            refresh_interval: 60
            entities:
              - entity: sensor.openquatt_total_heat_power
                name: Heat output power
              - entity: sensor.openquatt_heatpump_cop_daily
                name: COP today
              - entity: sensor.openquatt_heatpump_thermal_energy_daily
                name: Heat today
          - type: history-graph
            title: Boiler trends (24h)
            hours_to_show: 24
            refresh_interval: 60
            entities:
              - entity: sensor.openquatt_boiler_heat_power
                name: Heat output power
              - entity: sensor.openquatt_boiler_thermal_energy_daily
                name: Heat today
          - type: history-graph
            title: System trends (24h)
            hours_to_show: 24
            refresh_interval: 60
            entities:
              - entity: sensor.openquatt_total_power_input
                name: Electrical input power
              - entity: sensor.openquatt_system_heat_power
                name: Heat output power
              - entity: sensor.openquatt_system_thermal_energy_daily
                name: Heat today
        column_span: 3
      - type: grid
        column_span: 3
        cards:
          - type: heading
            icon: mdi:chart-bar
            heading: Energy trends (7d/30d)
            heading_style: title
          - type: markdown
            content: |-
              <details>

              <summary><strong>Explanation</strong></summary>

              Daily aggregation for energy:
              - Electricity and heat as daily kWh (derived from cumulative sensors)
              - `COP today` as daily average

              </details>
            text_only: true
          - type: custom:apexcharts-card
            header:
              show: true
              title: Energy trends (7 days)
              show_states: false
            graph_span: 7d
            update_interval: 120s
            yaxis:
              - id: energy
                min: 0
                decimals: 1
                apex_config:
                  title:
                    text: kWh/day
              - id: cop
                opposite: true
                min: 0
                max: 8
                decimals: 2
                apex_config:
                  tickAmount: 4
                  title:
                    text: COP today
            apex_config:
              chart:
                height: 320
              legend:
                show: true
                position: top
                clusterGroupedSeries: false
              stroke:
                width: 2
                curve: smooth
              tooltip:
                shared: true
            series:
              - entity: sensor.openquatt_electrical_energy_cumulative
                name: Electricity/day
                color: '#3B82F6'
                yaxis_id: energy
                type: column
                group_by:
                  func: delta
                  duration: 1d
              - entity: sensor.openquatt_heatpump_thermal_energy_cumulative
                name: Heat pump heat/day
                color: '#F59E0B'
                yaxis_id: energy
                type: column
                group_by:
                  func: delta
                  duration: 1d
              - entity: sensor.openquatt_boiler_thermal_energy_cumulative
                name: Boiler heat/day
                color: '#EF4444'
                yaxis_id: energy
                type: column
                group_by:
                  func: delta
                  duration: 1d
              - entity: sensor.openquatt_system_thermal_energy_cumulative
                name: System heat/day
                color: '#10B981'
                yaxis_id: energy
                type: line
                group_by:
                  func: delta
                  duration: 1d
              - entity: sensor.openquatt_heatpump_cop_daily
                name: COP today
                color: '#A855F7'
                yaxis_id: cop
                type: line
                group_by:
                  func: avg
                  duration: 1d
            grid_options:
              columns: full
          - type: custom:apexcharts-card
            header:
              show: true
              title: Energy trends (30 days)
              show_states: false
            graph_span: 30d
            update_interval: 300s
            yaxis:
              - id: energy
                min: 0
                decimals: 1
                apex_config:
                  title:
                    text: kWh/day
              - id: cop
                opposite: true
                min: 0
                max: 8
                decimals: 2
                apex_config:
                  tickAmount: 4
                  title:
                    text: COP today
            apex_config:
              chart:
                height: 320
              legend:
                show: true
                position: top
                clusterGroupedSeries: false
              stroke:
                width: 2
                curve: smooth
              tooltip:
                shared: true
            series:
              - entity: sensor.openquatt_electrical_energy_cumulative
                name: Electricity/day
                color: '#3B82F6'
                yaxis_id: energy
                type: column
                group_by:
                  func: delta
                  duration: 1d
              - entity: sensor.openquatt_heatpump_thermal_energy_cumulative
                name: Heat pump heat/day
                color: '#F59E0B'
                yaxis_id: energy
                type: column
                group_by:
                  func: delta
                  duration: 1d
              - entity: sensor.openquatt_boiler_thermal_energy_cumulative
                name: Boiler heat/day
                color: '#EF4444'
                yaxis_id: energy
                type: column
                group_by:
                  func: delta
                  duration: 1d
              - entity: sensor.openquatt_system_thermal_energy_cumulative
                name: System heat/day
                color: '#10B981'
                yaxis_id: energy
                type: line
                group_by:
                  func: delta
                  duration: 1d
              - entity: sensor.openquatt_heatpump_cop_daily
                name: COP today
                color: '#A855F7'
                yaxis_id: cop
                type: line
                group_by:
                  func: avg
                  duration: 1d
            grid_options:
              columns: full
    cards: []
    header:
      card:
        type: markdown
        content: >-
          # <ha-icon icon="mdi:lightning-bolt-circle"></ha-icon> Energy

          Energy overview of heat pump, boiler, and total system (daily + cumulative).
  - title: Flow
    path: flow
    icon: mdi:waves
    type: sections
    max_columns: 3
    sections:
      - type: grid
        cards:
          - type: heading
            icon: mdi:waves-arrow-right
            heading: Flow status & control
            heading_style: title
          - type: heading
            icon: ''
            heading: Status
            heading_style: subtitle
          - type: markdown
            content: |-
              <details>
              <summary><strong>Explanation</strong></summary>

              Flow status at a glance:

              - `Flow mode`: active flow-control behavior.
              - `Control Mode`: active supervisory control state.
              - `Low Flow alarm`: safety alarm for insufficient flow.
              - `Flow (average)`: selected average flow used in control/safety.
              </details>
            text_only: true
          - type: tile
            entity: sensor.openquatt_flow_mode
            name:
              type: entity
            show_entity_picture: false
            hide_state: false
            vertical: false
            features_position: bottom
          - type: tile
            entity: sensor.openquatt_control_mode_label
            name: Control Mode
            vertical: false
            features_position: bottom
          - type: tile
            entity: binary_sensor.openquatt_lowflow_fault_active
            name: Low Flow alarm
            vertical: false
            features_position: bottom
          - type: tile
            entity: sensor.openquatt_flow_average_selected
            name: Flow (average)
            vertical: false
            features_position: bottom
          - type: heading
            icon: ''
            heading: Control
            heading_style: subtitle
          - type: markdown
            content: |-
              <details>
              <summary><strong>Explanation</strong></summary>

              Main flow-control settings:

              - `Flow control mode`: choose automatic flow control or manual behavior.
              - `Flow setpoint`: target flow in L/h for automatic control.
              - `Manual iPWM`: set iPWM value for manual control.
              </details>
            text_only: true
          - type: tile
            entity: select.openquatt_flow_control_mode
            name:
              type: entity
            hide_state: true
            vertical: false
            features:
              - type: select-options
            features_position: inline
          - type: tile
            entity: number.openquatt_flow_setpoint
            name:
              type: entity
            hide_state: false
            vertical: false
            features:
              - style: slider
                type: numeric-input
            features_position: inline
          - type: tile
            entity: number.openquatt_manual_ipwm
            name:
              type: entity
            hide_state: false
            vertical: false
            features:
              - style: slider
                type: numeric-input
            features_position: inline
      - type: grid
        cards:
          - type: heading
            icon: mdi:chart-line
            heading: Flow trends
            heading_style: title
          - type: markdown
            content: |-
              <details>

              <summary><strong>Explanation</strong></summary>

              - `Flow measurements` compares actual flow versus setpoint over
              time.

              - `Pump control` shows iPWM command output for HP1.

              </details>
            text_only: true
            grid_options:
              columns: full
          - type: history-graph
            title: Flow measurements (4h)
            hours_to_show: 4
            refresh_interval: 30
            entities:
              - entity: sensor.openquatt_flow_average_selected
                name: Flowrate
              - entity: number.openquatt_flow_setpoint
                name: Flow setpoint
            grid_options:
              columns: full
          - type: history-graph
            title: Pump control (4h)
            hours_to_show: 4
            refresh_interval: 30
            entities:
              - entity: number.openquatt_hp1_set_pump_speed
                name: HP1 iPWM
            grid_options:
              columns: full
        column_span: 2
    cards: []
    header:
      card:
        type: markdown
        content: |-
          # <ha-icon icon="mdi:waves"></ha-icon> Flow
          Control, status, and trends for flow and pump behavior.
      layout: center
      badges_position: bottom
      badges_wrap: wrap
    badges: []
  - title: Heat control
    path: heat-control
    icon: mdi:radiator
    type: sections
    max_columns: 3
    sections:
      - type: grid
        cards:
          - type: heading
            icon: mdi:radiator
            heading: Heat control status
            heading_style: title
          - type: heading
            icon: mdi:tune-variant
            heading: Control settings
            heading_style: subtitle
          - type: markdown
            content: |-
              <details>
              <summary><strong>Explanation</strong></summary>

              - `Heating mode`: selects which strategy drives heat demand generation (for example Heating Curve or PH).
              </details>
            text_only: true
          - type: tile
            entity: select.openquatt_heating_control_mode
            name: Heating mode
            hide_state: true
            vertical: false
            features:
              - type: select-options
            features_position: inline
          - type: tile
            visibility:
              - condition: state
                entity: select.openquatt_heating_control_mode
                state: Water Temperature Control (heating curve)
            entity: select.openquatt_heating_curve_control_profile
            name:
              type: entity
            show_entity_picture: false
            hide_state: true
            vertical: false
            features:
              - type: select-options
            features_position: inline
          - type: heading
            icon: mdi:view-dashboard-outline
            heading: Core KPIs
            heading_style: subtitle
          - type: markdown
            content: |-
              <details>
              <summary><strong>Explanation</strong></summary>

              Core heat-balance indicators:

              - `P_req`: requested heating power after smoothing/ramp limits.
              - `P_house`: modeled house heat demand.
              - `Max HP capacity`: estimated available HP heating capacity.
              - `Deficit`: positive value means demand is above available/delivered heat.
              </details>
            text_only: true
          - square: false
            type: grid
            cards:
              - type: gauge
                entity: sensor.openquatt_total_power_input
                min: 0
                max: 3600
                needle: false
                name:
                  type: entity
                severity:
                  green: 0
                  yellow: 1200
                  red: 2400
              - type: gauge
                entity: sensor.openquatt_total_heat_power
                min: 0
                max: 12000
                needle: false
                name:
                  type: entity
                severity:
                  green: 0
                  yellow: 4000
                  red: 8000
              - type: gauge
                entity: sensor.openquatt_power_house_p_house
                min: 0
                max: 12000
                needle: false
                name:
                  type: entity
                severity:
                  green: 0
                  yellow: 4000
                  red: 8000
              - type: gauge
                entity: sensor.openquatt_power_house_p_req
                min: 0
                max: 12000
                needle: false
                name:
                  type: entity
                severity:
                  green: 0
                  yellow: 4000
                  red: 8000
              - type: gauge
                entity: sensor.openquatt_hp_capacity_w
                name: Max HP capacity
                min: 0
                max: 12000
                needle: false
              - type: gauge
                entity: sensor.openquatt_hp_deficit_w
                name: Deficit
                min: 0
                max: 8000
                needle: false
                severity:
                  green: 0
                  yellow: 800
                  red: 2000
            columns: 2
      - type: grid
