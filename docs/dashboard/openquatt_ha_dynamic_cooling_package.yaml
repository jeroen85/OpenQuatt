          {% set direct = direct_raw if direct_raw is number else direct_raw | trim | replace(',', '.') | float(none) if direct_raw is string else none %}
          {% if room <= count and direct is not none %}
            {{ direct | round(2) }}
          {% else %}
            {% set temp_selector = states('input_text.openquatt_source_cooling_room_1_temperature') | trim %}
            {% set temp_entity, temp_attr = (temp_selector.split('|', 1) + [''])[:2] %}
            {% set temp_entity = temp_entity | trim %}
            {% set temp_attr = temp_attr | trim %}
            {% set temp_raw = state_attr(temp_entity, temp_attr) if temp_attr else states(temp_entity) %}
            {% set temp = temp_raw if temp_raw is number else temp_raw | trim | replace(',', '.') | float(none) if temp_raw is string else none %}
            {% set humidity_selector = states('input_text.openquatt_source_cooling_room_1_humidity') | trim %}
            {% set humidity_entity, humidity_attr = (humidity_selector.split('|', 1) + [''])[:2] %}
            {% set humidity_entity = humidity_entity | trim %}
            {% set humidity_attr = humidity_attr | trim %}
            {% set humidity_raw = state_attr(humidity_entity, humidity_attr) if humidity_attr else states(humidity_entity) %}
            {% set humidity = humidity_raw if humidity_raw is number else humidity_raw | trim | replace(',', '.') | float(none) if humidity_raw is string else none %}
            {% if room <= count and temp is not none and humidity is not none and humidity > 0 and humidity <= 100 %}
              {% set gamma = log(humidity / 100) + ((17.62 * temp) / (243.12 + temp)) %}
              {{ ((243.12 * gamma) / (17.62 - gamma)) | round(2) }}
            {% else %}
              {{ 0 }}
            {% endif %}
          {% endif %}

