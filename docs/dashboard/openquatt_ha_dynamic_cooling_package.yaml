# ==============================================================================
# OpenQuatt - Home Assistant Dynamic Cooling Source Proxies
# ==============================================================================
#
# Purpose:
#   - Users can configure up to 6 cooling-room source groups in Home Assistant.
#   - Per room, users may provide either:
#       1) a direct dew point entity, or
#       2) a temperature + humidity entity pair.
#   - Home Assistant calculates the highest valid dew point and publishes one
#     stable aggregate proxy consumed by OpenQuatt ESPHome:
#       sensor.openquatt_ext_cooling_dew_point
#       binary_sensor.openquatt_ext_cooling_dew_point_valid
#
# Install (Home Assistant):
#   1) Enable packages in configuration.yaml:
#        homeassistant:
#          packages: !include_dir_named packages
#   2) Copy this file to: /config/packages/openquatt_dynamic_cooling.yaml
#   3) Reload Template Entities (or restart Home Assistant).
#   4) Set room count and the per-room source helpers.
#
# Notes:
#   - Trigger interval is 15s to support dynamic entity_id references.
#   - Invalid or empty source values publish 0; companion *_valid exposes
#     whether the aggregate can be used by OpenQuatt.
#   - Optional attribute syntax is supported:
#       entity_id|attribute_name
#     Whitespace around "|" is ignored.
#   - For climate entities, use explicit attributes such as:
#       climate.living_room|current_temperature
#       climate.living_room|current_humidity
# ==============================================================================

input_number:
  openquatt_cooling_room_count:
    name: OpenQuatt cooling room count
    icon: mdi:counter
    min: 0
    max: 6
    step: 1
    mode: box

