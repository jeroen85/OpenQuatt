      - name: OpenQuatt HA Dynamic Cooling Package Active
        unique_id: openquatt_ha_dynamic_cooling_package_active
        state: "on"
        icon: mdi:check-circle

  - trigger:
      - platform: state
        entity_id:
          - input_number.openquatt_cooling_room_count
          - input_text.openquatt_source_cooling_room_1_dew_point
          - input_text.openquatt_source_cooling_room_1_temperature
          - input_text.openquatt_source_cooling_room_1_humidity
          - input_text.openquatt_source_cooling_room_2_dew_point
          - input_text.openquatt_source_cooling_room_2_temperature
          - input_text.openquatt_source_cooling_room_2_humidity
          - input_text.openquatt_source_cooling_room_3_dew_point
          - input_text.openquatt_source_cooling_room_3_temperature
          - input_text.openquatt_source_cooling_room_3_humidity
          - input_text.openquatt_source_cooling_room_4_dew_point
          - input_text.openquatt_source_cooling_room_4_temperature
          - input_text.openquatt_source_cooling_room_4_humidity
          - input_text.openquatt_source_cooling_room_5_dew_point
          - input_text.openquatt_source_cooling_room_5_temperature
          - input_text.openquatt_source_cooling_room_5_humidity
          - input_text.openquatt_source_cooling_room_6_dew_point
          - input_text.openquatt_source_cooling_room_6_temperature
          - input_text.openquatt_source_cooling_room_6_humidity
      - platform: time_pattern
        seconds: "/15"
    sensor:
      - name: OpenQuatt Ext Cooling Dew Point
        unique_id: openquatt_ext_cooling_dew_point
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        icon: mdi:water-thermometer
        state: >-
          {% set count = states('input_number.openquatt_cooling_room_count') | int(0) %}
          {% set ns = namespace(values=[]) %}
          {% for room in range(1, 7) %}
            {% if room <= count %}
              {% set direct_selector = states('input_text.openquatt_source_cooling_room_' ~ room ~ '_dew_point') | trim %}
              {% set direct_entity, direct_attr = (direct_selector.split('|', 1) + [''])[:2] %}
              {% set direct_entity = direct_entity | trim %}
              {% set direct_attr = direct_attr | trim %}
              {% set direct_raw = state_attr(direct_entity, direct_attr) if direct_attr else states(direct_entity) %}
              {% set direct = direct_raw if direct_raw is number else direct_raw | trim | replace(',', '.') | float(none) if direct_raw is string else none %}
              {% if direct is not none %}
                {% set ns.values = ns.values + [direct] %}
              {% else %}
                {% set temp_selector = states('input_text.openquatt_source_cooling_room_' ~ room ~ '_temperature') | trim %}
                {% set temp_entity, temp_attr = (temp_selector.split('|', 1) + [''])[:2] %}
                {% set temp_entity = temp_entity | trim %}
                {% set temp_attr = temp_attr | trim %}
                {% set temp_raw = state_attr(temp_entity, temp_attr) if temp_attr else states(temp_entity) %}
                {% set temp = temp_raw if temp_raw is number else temp_raw | trim | replace(',', '.') | float(none) if temp_raw is string else none %}
                {% set humidity_selector = states('input_text.openquatt_source_cooling_room_' ~ room ~ '_humidity') | trim %}
                {% set humidity_entity, humidity_attr = (humidity_selector.split('|', 1) + [''])[:2] %}
                {% set humidity_entity = humidity_entity | trim %}
                {% set humidity_attr = humidity_attr | trim %}
                {% set humidity_raw = state_attr(humidity_entity, humidity_attr) if humidity_attr else states(humidity_entity) %}
                {% set humidity = humidity_raw if humidity_raw is number else humidity_raw | trim | replace(',', '.') | float(none) if humidity_raw is string else none %}
                {% if temp is not none and humidity is not none and humidity > 0 and humidity <= 100 %}
                  {% set gamma = log(humidity / 100) + ((17.62 * temp) / (243.12 + temp)) %}
                  {% set dew_point = (243.12 * gamma) / (17.62 - gamma) %}
                  {% set ns.values = ns.values + [dew_point] %}
                {% endif %}
              {% endif %}
            {% endif %}
          {% endfor %}
          {{ ns.values | max | round(2) if ns.values | count > 0 else 0 }}

      - name: OpenQuatt HA Cooling Room 1 Dew Point Effective
        unique_id: openquatt_ha_cooling_room_1_dew_point_effective
