name: Pages Deploy

on:
  push:
    branches: [dev]
    paths:
      - "docs/**"
      - "scripts/prepare_pages_site.sh"
      - ".github/workflows/pages-deploy.yml"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-pages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout site source
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Download latest stable factory binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .tmp/pages-firmware
          gh release download \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "*.firmware.factory.bin" \
            --dir .tmp/pages-firmware \
            --clobber

      - name: Assemble Pages site
        run: ./scripts/prepare_pages_site.sh site .tmp/pages-firmware

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-pages:
    runs-on: ubuntu-latest
    needs: build-pages

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
