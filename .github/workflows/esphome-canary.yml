name: ESPHome Canary

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  latest-compatibility:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install latest ESPHome
        run: |
          pip install --upgrade esphome
          esphome version

      - name: Validate configs
        run: |
          esphome config openquatt_waveshare.yaml
          esphome config openquatt_heatpump_listener.yaml

      - name: Compile configs
        run: |
          esphome compile openquatt_waveshare.yaml
          esphome compile openquatt_heatpump_listener.yaml
