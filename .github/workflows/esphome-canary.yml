name: ESPHome Canary

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  latest-compatibility:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install latest ESPHome
        run: |
          pip install --upgrade esphome
          esphome version

      - name: Validate configs
        run: |
          while IFS= read -r config; do
            esphome config "$config"
          done < <(python3 scripts/build_targets.py list-configs --status enabled)

      - name: Compile configs
        run: |
          while IFS= read -r config; do
            esphome compile "$config"
          done < <(python3 scripts/build_targets.py list-configs --status enabled)
