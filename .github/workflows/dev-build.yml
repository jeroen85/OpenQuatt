name: Dev Build

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dev-release
  cancel-in-progress: true

jobs:
  compute-meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.dev_meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute dev version
        id: dev_meta
        run: |
          BASE_VERSION="$(awk -F'\"' '/^project_version: / { print $2 }' openquatt/oq_substitutions_common.yaml)"
          SHORT_SHA="${GITHUB_SHA::7}"
          DEV_VERSION="${BASE_VERSION}-dev.${GITHUB_RUN_NUMBER}+${SHORT_SHA}"
          echo "version=${DEV_VERSION}" >> "$GITHUB_OUTPUT"

  compile-profiles:
    needs: compute-meta
    uses: ./.github/workflows/esphome-build.yml
    with:
      artifact_suffix: dev-release
      project_version: ${{ needs.compute-meta.outputs.version }}
      release_channel: dev
      release_manifest_tag: dev-latest

  publish-dev-release:
    runs-on: ubuntu-latest
    needs: [compute-meta, compile-profiles]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download firmware artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: openquatt-*-dev-release
          path: dist

      - name: Prepare dev release assets and manifests
        run: |
          TAG="dev-latest"
          REPO="${GITHUB_REPOSITORY}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"
          RELEASE_URL="https://github.com/${REPO}/releases/tag/${TAG}"
          ./scripts/prepare_release_assets.sh "${{ needs.compute-meta.outputs.version }}" "${BASE_URL}" "${RELEASE_URL}"

      - name: Move dev release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa dev-latest -m "Development channel" "${GITHUB_SHA}"
          git push origin refs/tags/dev-latest --force

      - name: Create or update dev release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES=$(cat <<EOF
          Mutable development-channel release for the \`dev\` branch.

          Commit: \`${GITHUB_SHA}\`
          Version: \`${{ needs.compute-meta.outputs.version }}\`
          EOF
          )

          if gh release view dev-latest >/dev/null 2>&1; then
            gh release edit dev-latest \
              --title "Development Channel" \
              --notes "$NOTES" \
              --prerelease
          else
            gh release create dev-latest \
              --title "Development Channel" \
              --notes "$NOTES" \
              --prerelease
          fi

      - name: Upload dev release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload dev-latest \
            ./*-ota.manifest.json \
            dist/*.firmware.ota.bin \
            dist/*.firmware.factory.bin \
            --clobber
