name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile-profiles:
    uses: ./.github/workflows/esphome-build.yml
    with:
      artifact_suffix: release

  publish-release:
    runs-on: ubuntu-latest
    needs: compile-profiles

    steps:
      - name: Checkout scripts
        uses: actions/checkout@v6

      - name: Download firmware artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: openquatt-*-release
          path: dist

      - name: Prepare release assets and manifests
        run: |
          TAG="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"
          RELEASE_URL="https://github.com/${REPO}/releases/tag/${TAG}"
          ./scripts/prepare_release_assets.sh "${TAG}" "${BASE_URL}" "${RELEASE_URL}"

      - name: Create release if needed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" --generate-notes
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            ./*-ota.manifest.json \
            dist/*.firmware.ota.bin \
            dist/*.firmware.factory.bin \
            --clobber
