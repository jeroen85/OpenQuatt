name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile-profiles:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile:
          - id: duo-waveshare
            config: openquatt_duo_waveshare.yaml
            build_path: .esphome/build/openquatt_duo_waveshare
          - id: duo-heatpump-listener
            config: openquatt_duo_heatpump_listener.yaml
            build_path: .esphome/build/openquatt_duo_heatpump_listener
          - id: single-waveshare
            config: openquatt_single_waveshare.yaml
            build_path: .esphome/build/openquatt_single_waveshare
          - id: single-heatpump-listener
            config: openquatt_single_heatpump_listener.yaml
            build_path: .esphome/build/openquatt_single_heatpump_listener

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ESPHome
        run: |
          ESPHOME_VERSION="$(cat .github/requirements-esphome.txt | sed 's/^esphome==//')"
          pip install --upgrade "esphome==${ESPHOME_VERSION}"
          esphome version

      - name: Validate config
        run: esphome config ${{ matrix.profile.config }}

      - name: Compile firmware
        run: esphome compile ${{ matrix.profile.config }}

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openquatt-${{ matrix.profile.id }}-release
          if-no-files-found: error
          path: |
            ${{ matrix.profile.build_path }}/.pioenvs/openquatt/firmware.bin
            ${{ matrix.profile.build_path }}/.pioenvs/openquatt/firmware.ota.bin
            ${{ matrix.profile.build_path }}/.pioenvs/openquatt/firmware.factory.bin

  publish-release:
    runs-on: ubuntu-latest
    needs: compile-profiles

    steps:
      - name: Download Duo Waveshare artifacts
        uses: actions/download-artifact@v4
        with:
          name: openquatt-duo-waveshare-release
          path: dist/openquatt-duo-waveshare

      - name: Download Duo Heatpump Listener artifacts
        uses: actions/download-artifact@v4
        with:
          name: openquatt-duo-heatpump-listener-release
          path: dist/openquatt-duo-heatpump-listener

      - name: Prepare release asset filenames
        run: |
          mkdir -p dist
          cp dist/openquatt-duo-waveshare/firmware.bin dist/openquatt-waveshare.firmware.bin
          cp dist/openquatt-duo-waveshare/firmware.ota.bin dist/openquatt-waveshare.firmware.ota.bin
          cp dist/openquatt-duo-waveshare/firmware.factory.bin dist/openquatt-waveshare.firmware.factory.bin
          cp dist/openquatt-duo-heatpump-listener/firmware.bin dist/openquatt-heatpump-listener.firmware.bin
          cp dist/openquatt-duo-heatpump-listener/firmware.ota.bin dist/openquatt-heatpump-listener.firmware.ota.bin
          cp dist/openquatt-duo-heatpump-listener/firmware.factory.bin dist/openquatt-heatpump-listener.firmware.factory.bin

      - name: Generate OTA manifest
        run: |
          OTA_S3_BIN="dist/openquatt-waveshare.firmware.ota.bin"
          OTA_ESP32_BIN="dist/openquatt-heatpump-listener.firmware.ota.bin"
          OTA_S3_MD5="$(md5sum "$OTA_S3_BIN" | awk '{print $1}')"
          OTA_ESP32_MD5="$(md5sum "$OTA_ESP32_BIN" | awk '{print $1}')"
          TAG="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"
          cat > openquatt.manifest.json << EOF
          {
            "name": "OpenQuatt",
            "version": "${TAG}",
            "builds": [
              {
                "chipFamily": "ESP32-S3",
                "ota": {
                  "path": "https://github.com/${REPO}/releases/download/${TAG}/openquatt-waveshare.firmware.ota.bin",
                  "md5": "${OTA_S3_MD5}",
                  "release_url": "https://github.com/${REPO}/releases/tag/${TAG}",
                  "summary": "OpenQuatt Waveshare firmware ${TAG}"
                }
              },
              {
                "chipFamily": "ESP32",
                "ota": {
                  "path": "https://github.com/${REPO}/releases/download/${TAG}/openquatt-heatpump-listener.firmware.ota.bin",
                  "md5": "${OTA_ESP32_MD5}",
                  "release_url": "https://github.com/${REPO}/releases/tag/${TAG}",
                  "summary": "OpenQuatt Heatpump Listener firmware ${TAG}"
                }
              }
            ]
          }
          EOF

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            openquatt.manifest.json
            dist/openquatt-waveshare.firmware.bin
            dist/openquatt-waveshare.firmware.ota.bin
            dist/openquatt-waveshare.firmware.factory.bin
            dist/openquatt-heatpump-listener.firmware.bin
            dist/openquatt-heatpump-listener.firmware.ota.bin
            dist/openquatt-heatpump-listener.firmware.factory.bin
