substitutions:
  <<: !include openquatt/oq_substitutions_common.yaml
  device_name: ot-test-esp32s3
  friendly_name: OT Test ESP32-S3
  release_channel: dev
  esp_board: esp32-s3-devkitc-1
  esp_flash_size: 4MB
  esp_variant: esp32s3
  uart_tx_pin: GPIO17
  uart_rx_pin: GPIO18
  uart_rts_pin: GPIO21
  oq_ot_thermostat_in_pin: GPIO12
  oq_ot_thermostat_out_pin: GPIO13
  ds18b20_pin: GPIO2
  oq_boiler_relay_pin: GPIO47
  oq_modbus_update_interval_s: "5"
  oq_cic_restore_mode_default: "RESTORE_DEFAULT_ON"
  oq_local_temp_update_interval_s: "3600"

esphome:
  build_path: build/ot_test_esp32s3

packages:
  openquatt_base: !include openquatt_base.yaml
