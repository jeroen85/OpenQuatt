# ==============================================================================
# OpenQuatt - Shared Base Config
# ==============================================================================
# Common ESPHome/ESP32 runtime shared by all hardware profiles.
# Hardware-specific pin/board substitutions are provided by profile files.
# ==============================================================================

# ==============================================================================
# PACKAGES
# ==============================================================================
substitutions:
  <<: !include openquatt/topology/oq_topology_duo.yaml
  oq_topology_build_flag: "-DOQ_TOPOLOGY_DUO=1"
  main_release_manifest_url: "https://github.com/jeroen85/OpenQuatt/releases/latest/download/openquatt-duo-ota.manifest.json"
  dev_release_manifest_url: "https://github.com/jeroen85/OpenQuatt/releases/download/dev-latest/openquatt-duo-ota.manifest.json"
  # Stable OTA channel by default. Dev builds should override both substitutions
  # via `esphome -s release_channel dev -s release_manifest_url ... compile ...`.
  release_manifest_url: "https://github.com/jeroen85/OpenQuatt/releases/latest/download/openquatt-duo-ota.manifest.json"

packages:
  base_common: !include openquatt_base_common.yaml
  <<: !include openquatt/oq_packages_common.yaml
  <<: !include openquatt/topology/oq_topology_packages_duo.yaml
